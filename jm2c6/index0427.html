<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🧪 酸碱虚拟实验室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI','Microsoft YaHei',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px;color:#2f3542}
.container{width:100%;max-width:680px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.5);overflow:hidden;display:flex;flex-direction:column;min-height:600px}
.header{background:linear-gradient(90deg,#16a085,#1abc9c);color:#fff;padding:14px 18px;text-align:center}
.header h1{font-size:20px;margin-bottom:3px}
.header p{font-size:11px;opacity:0.9}
.body{padding:12px;display:flex;flex-direction:column;gap:10px;flex:1}
/* //峇株吧辖华仁中学蔡逸众制作 */
.sel-bar{background:#34495e;color:#fff;padding:8px 12px;border-radius:10px;font-size:12px;display:flex;justify-content:space-between;align-items:center;min-height:40px;flex-wrap:wrap;gap:8px}
.pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.pill{background:#3498db;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:bold}
.beaker{background:linear-gradient(180deg,rgba(173,216,230,0.3),rgba(135,206,235,0.5));border:4px solid #3498db;border-top:none;border-radius:0 0 30px 30px;height:240px;position:relative;overflow:hidden;box-shadow:inset 0 0 30px rgba(52,152,219,0.3);transition:background 1s}
.beaker::before{content:'';position:absolute;top:0;left:-4px;right:-4px;height:6px;background:#3498db}
.b-tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(52,152,219,0.6);font-size:12px;font-weight:bold;text-align:center;pointer-events:none}
.b-lbl{position:absolute;bottom:5px;right:10px;color:rgba(52,152,219,0.5);font-size:11px;font-weight:bold}
.mol{position:absolute;animation:mf 4s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))}
.mol.fly{animation:mfly 0.8s ease-in forwards;z-index:10}
.mol.exp{animation:mexp 0.5s ease-out forwards}
.mol.app{animation:mapp 0.6s ease-out}
@keyframes mf{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(5deg)}}
@keyframes mfly{0%{transform:translate(0,0) scale(1)}100%{transform:translate(var(--fx),var(--fy)) scale(1.3)}}
@keyframes mexp{0%{transform:scale(1);opacity:1}50%{transform:scale(2);opacity:0.7}100%{transform:scale(0.3);opacity:0}}
@keyframes mapp{0%{transform:scale(0) rotate(-180deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
/* //Made by ecchua79 */
.bub{position:absolute;color:#74b9ff;font-size:18px;font-weight:bold;animation:bup 2s ease-out forwards;pointer-events:none}
@keyframes bup{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-220px);opacity:0}}
.flash{position:absolute;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.95),rgba(255,193,7,0.7),transparent);animation:fl 0.8s ease-out forwards;pointer-events:none;z-index:5}
@keyframes fl{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.cb{padding:9px 14px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:12px;color:#fff;transition:transform 0.2s}
.cb:hover{transform:translateY(-2px)}
.cb:disabled{opacity:0.4;cursor:not-allowed}
.cb.r{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.cb.c{background:linear-gradient(135deg,#7f8c8d,#95a5a6)}
.cb.h{background:linear-gradient(135deg,#f39c12,#e67e22)}
.eq{background:linear-gradient(135deg,#fffacd,#fff3a8);border:2px solid #f39c12;border-radius:12px;padding:12px;display:none;animation:pop 0.5s}
.eq.show{display:block}
@keyframes pop{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}
.eq-h{font-size:13px;color:#d35400;font-weight:bold;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
/* //华仁中学蔡逸众制作 */
.eq-t{padding:2px 8px;background:#e74c3c;color:#fff;border-radius:10px;font-size:11px;font-weight:bold}
.eq-f{font-family:'Cambria Math',serif;font-size:18px;text-align:center;color:#2c3e50;font-weight:bold;margin:8px 0;line-height:1.6}
.eq-f sub{font-size:0.7em}
.eq-a{color:#e74c3c;margin:0 6px;font-weight:bold}
.eq-e{font-size:12px;color:#7d3c00;line-height:1.6;background:rgba(255,255,255,0.7);padding:10px;border-radius:8px;margin-top:8px}
.shelf{background:linear-gradient(180deg,#f1f2f6,#dfe4ea);border-radius:12px;padding:10px}
.tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.tab{padding:5px 10px;background:#fff;border:1px solid #ced6e0;border-radius:15px;font-size:11px;cursor:pointer;color:#57606f;font-weight:bold}
.tab.on{background:#3498db;color:#fff;border-color:#3498db}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px}
/* //峇株吧辖蔡逸众制作 */
.rb{padding:8px 4px;background:#fff;border:2px solid #dfe4ea;border-radius:10px;cursor:pointer;text-align:center;font-weight:bold;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.rb:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,0.15)}
.rb .f{font-size:13px}
.rb .n{font-size:9px;color:#7f8c8d}
.rb.acid{border-color:#ff4757;color:#ff4757}
.rb.base{border-color:#1e90ff;color:#1e90ff}
.rb.metal{border-color:#7f8c8d;color:#2c3e50}
.rb.salt{border-color:#ffa502;color:#e67e22}
.rb.indicator{border-color:#9b59b6;color:#9b59b6}
.log{background:#1e272e;color:#2ed573;padding:8px 12px;border-radius:8px;font-family:'Courier New',monospace;font-size:11px;max-height:90px;overflow-y:auto}
.log div{margin:2px 0}
.lw{color:#f1c40f}.li{color:#74b9ff}.ls{color:#2ed573}
@media(max-width:480px){.container{border-radius:14px;min-height:100vh}.beaker{height:200px}.grid{grid-template-columns:repeat(auto-fill,minmax(62px,1fr))}.eq-f{font-size:15px}.rb{padding:6px 3px}.rb .f{font-size:11px}.rb .n{font-size:8px}}
</style>
</head>

</div>
<div class="grid" id="grid"></div>
</div>
<div class="log" id="log"><div class="li">📋 [系统] 实验室就绪，从试剂架选取粒子开始实验！</div></div>
</div>
</div>

let S={sel:[],rc:0};

function fmt(k){return k.replace(/(\d+)/g,'<sub>$1</sub>')}
function fmtT(k){const sub={'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};return k.replace(/(\d)/g,d=>sub[d]||d)}

function tab(el,c){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  shelf(c);
}

function shelf(c){
  const g=document.getElementById('grid');g.innerHTML='';
  Object.entries(P).forEach(([k,p])=>{
    if(p.c!==c)return;
    const b=document.createElement('div');
    b.className='rb '+c;
    b.innerHTML='<div style="height:32px;display:flex;align-items:center;justify-content:center">'+p.s+'</div><div class="f">'+fmt(k)+'</div><div class="n">'+p.n+'</div>';
    b.onclick=()=>add(k);
    g.appendChild(b);
  });
}

function add(k){
  if(S.sel.length>=3){log('⚠️ 最多选3种','lw');return}
  if(P[k].c==='indicator'&&S.sel.some(s=>P[s].c==='indicator')){log('⚠️ 一次只能加一种指示剂','lw');return}
  if(S.sel.includes(k)){log('⚠️ 已经在烧杯里了','lw');return}
  S.sel.push(k);
//华仁中学蔡逸众制作
  spawn(k,P[k].c==='indicator'?1:3);
  upd();
  log('➕ 加入: '+P[k].n+' ('+fmtT(k)+')','li');
  document.getElementById('tip').style.display='none';
  if(S.sel.length>=2)document.getElementById('rbtn').disabled=false;
}

function spawn(k,n){
  const bk=document.getElementById('beaker');
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const e=document.createElement('div');
      e.className='mol app';e.dataset.k=k;e.innerHTML=P[k].s;
      const w=bk.offsetWidth,h=bk.offsetHeight;
      e.style.left=(25+Math.random()*(w-90))+'px';
      e.style.top=(50+Math.random()*(h-110))+'px';
      e.style.animationDelay=(Math.random()*2)+'s';
      bk.appendChild(e);
    },i*150);
  }
}

function upd(){
  const p=document.getElementById('pills');p.innerHTML='';
  if(!S.sel.length){p.innerHTML='<span style="color:#95a5a6;font-size:11px">（还未选择）</span>';return}
  S.sel.forEach(k=>{
    const e=document.createElement('div');e.className='pill';e.innerHTML=fmt(k);p.appendChild(e);
  });
}

function clr(){
  S.sel=[];
  document.querySelectorAll('.mol').forEach(e=>e.remove());
  upd();
  document.getElementById('rbtn').disabled=true;
  document.getElementById('eqbox').classList.remove('show');
  document.getElementById('beaker').style.background='linear-gradient(180deg,rgba(173,216,230,0.3),rgba(135,206,235,0.5))';
  document.getElementById('tip').style.display='block';
  log('🔄 已清空','li');
}

function wash(){clr();log('🧹 烧杯已清洗','li')}

function react(){
  if(S.sel.length<2){log('⚠️ 至少需要2种粒子','lw');return}
  const rx=find(S.sel);
  if(!rx){log('🚫 这些粒子不会反应','lw');showFail();return}
  S.rc++;log('⚡ [反应#'+S.rc+'] '+rx.t,'ls');
  anim(rx);
}

function find(sel){
  const ss=[...sel].sort();
  for(const r of R){
    const sr=[...r.r].sort();
    if(ss.length===sr.length&&ss.every((v,i)=>v===sr[i]))return r;
  }
  return null;
}

//峇株吧辖蔡逸众制作
function anim(rx){
  const bk=document.getElementById('beaker');
  const cx=bk.offsetWidth/2,cy=bk.offsetHeight/2;
  document.querySelectorAll('.mol').forEach(e=>{
    const fx=cx-e.offsetLeft-e.offsetWidth/2;
    const fy=cy-e.offsetTop-e.offsetHeight/2;
    e.style.setProperty('--fx',fx+'px');
    e.style.setProperty('--fy',fy+'px');
    e.classList.add('fly');
  });
  setTimeout(()=>{
    const f=document.createElement('div');f.className='flash';
    f.style.left=(cx-50)+'px';f.style.top=(cy-50)+'px';
    bk.appendChild(f);setTimeout(()=>f.remove(),800);
    document.querySelectorAll('.mol').forEach(e=>{e.classList.remove('fly');e.classList.add('exp')});
  },800);
  setTimeout(()=>{
    document.querySelectorAll('.mol').forEach(e=>e.remove());
    if(rx.v){
      color(rx.v);
      const ind=S.sel.find(s=>P[s].c==='indicator');
      const ab=S.sel.find(s=>P[s].c!=='indicator');
      if(ind)spawnP(ind,2);
      if(ab)spawnP(ab,2);
    }
    if(rx.p&&rx.p.length){
      rx.p.forEach((pi,i)=>{
        for(let c=0;c<pi[1];c++){
          setTimeout(()=>spawnP(pi[0],1),i*150+c*120);
        }
      });
    }
    showEq(rx);
  },1400);
}

function spawnP(k,n){
  const bk=document.getElementById('beaker');
  const p=P[k];if(!p)return;
  for(let i=0;i<n;i++){
    const e=document.createElement('div');
    e.className='mol app';e.dataset.k=k;e.innerHTML=p.s;
    const w=bk.offsetWidth,h=bk.offsetHeight;
    const x=30+Math.random()*(w-100);
    e.style.left=x+'px';
    e.style.top=(60+Math.random()*(h-130))+'px';
    e.style.animationDelay=(Math.random()*2)+'s';
    bk.appendChild(e);
    if(p.c==='g'){
      setTimeout(()=>{
//Made by ecchua79
        e.style.transition='all 2s ease-out';
        e.style.top='-60px';e.style.opacity='0';
        for(let b=0;b<3;b++){
          setTimeout(()=>{
            const bu=document.createElement('div');bu.className='bub';bu.innerText='○';
            bu.style.left=(x+Math.random()*30-10)+'px';bu.style.bottom='20px';
            bk.appendChild(bu);setTimeout(()=>bu.remove(),2000);
          },b*250);
        }
        setTimeout(()=>e.remove(),2000);
      },1000);
    }
  }
}

function color(v){
  const cm={
    'red':'linear-gradient(180deg,rgba(255,99,99,0.4),rgba(231,76,60,0.7))',
    'blue':'linear-gradient(180deg,rgba(116,185,255,0.5),rgba(52,152,219,0.8))',
    'pink':'linear-gradient(180deg,rgba(253,121,168,0.5),rgba(232,67,147,0.8))',
    'clear':'linear-gradient(180deg,rgba(220,220,220,0.3),rgba(189,195,199,0.5))'
  };
  document.getElementById('beaker').style.background=cm[v];
}

function showEq(rx){
  const b=document.getElementById('eqbox');
  document.getElementById('eqt').innerText=rx.t;
  document.getElementById('eqt').style.background=rx.cl;
  let f=rx.e.replace(/([A-Za-z\)])(\d+)/g,'$1<sub>$2</sub>')
    .replace(/→/g,'<span class="eq-a">→</span>')
    .replace(/↑/g,'<span style="color:#3498db;font-weight:bold">↑</span>');
  document.getElementById('eqf').innerHTML=f;
  document.getElementById('eqe').innerHTML=rx.x.replace(/\n/g,'<br>');
  b.classList.add('show');
//峇株吧辖华仁中学蔡逸众制作
}

function showFail(){
  document.querySelectorAll('.mol').forEach(e=>{
    e.style.animation='shake 0.5s';
    setTimeout(()=>{e.style.animation='mf 4s ease-in-out infinite'},500);
  });
  const b=document.getElementById('eqbox');
  document.getElementById('eqt').innerText='🚫 不反应';
  document.getElementById('eqt').style.background='#7f8c8d';
  document.getElementById('eqf').innerHTML='😶 这些物质之间没有反应';
  document.getElementById('eqe').innerHTML='💡 试试这些组合：<br>• <strong>酸+碱</strong> = 中和反应（如HCl+NaOH）<br>• <strong>酸+活泼金属</strong>(Zn/Mg/Fe) = 置换反应<br>• <strong>酸+碳酸盐</strong>(Na₂CO₃/CaCO₃) = 复分解反应<br>• <strong>酸/碱+指示剂</strong> = 显色反应<br><br>⚠️ 注意：铜(Cu)排在H后面，不能和稀酸反应！';
  b.classList.add('show');
}

function hint(){
  const t=['🤝 试试 HCl + NaOH，看经典中和反应','⚡ 试试 HCl + Zn，看冒氢气泡','🌀 试试 HCl + Na₂CO₃，看冒CO₂','🎨 试试 NaOH + 酚酞，看溶液变红','🚫 试试 HCl + Cu，验证铜不反应','🌊 试试 H₂SO₄ + NaOH，注意系数','🥚 试试 HCl + CaCO₃（鸡蛋壳成分）','🌈 试试 HCl + 石蕊，看石蕊变红','⚡ 试试 H₂SO₄ + Mg，看剧烈反应','🤝 试试 HCl + Ca(OH)₂，注意配平'];
  log('💡 [建议] '+t[Math.floor(Math.random()*t.length)],'lw');
}

//华仁中学蔡逸众制作
function log(m,c){
  const l=document.getElementById('log');
  const d=document.createElement('div');
  d.className=c||'';
  d.innerText='['+new Date().toLocaleTimeString('zh-CN',{hour12:false})+'] '+m;
//峇株吧辖蔡逸众制作
  l.insertBefore(d,l.firstChild);
  while(l.children.length>10)l.removeChild(l.lastChild);
}

shelf('acid');
