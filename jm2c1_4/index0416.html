//华仁中学蔡逸众制作
const isHollow=(li,r,c)=>li===2&&r>=3&&r<=5&&c>=3&&c<=5;

/* ── Pure helpers ───────────────────────────────────────────────────────────── */
const rng=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;};
const fmt=s=>`${String(0|s/60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const fmtDT=d=>{const p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}年${p(d.getMonth()+1)}月${p(d.getDate())}日 ${p(d.getHours())}:${p(d.getMinutes())}`;};

//Made by ecchua79
const straight=(p1,p2,b)=>{
  if(p1.r===p2.r){for(let c=Math.min(p1.c,p2.c)+1;c<Math.max(p1.c,p2.c);c++)if(b[p1.r][c])return false;return true;}
  if(p1.c===p2.c){for(let r=Math.min(p1.r,p2.r)+1;r<Math.max(p1.r,p2.r);r++)if(b[r][p1.c])return false;return true;}
  return false;
};
const findPath=(p1,p2,b,N)=>{
  if((p1.r===p2.r||p1.c===p2.c)&&straight(p1,p2,b))return[p1,p2];
  for(const cn of[{r:p1.r,c:p2.c},{r:p2.r,c:p1.c}])
    if(!b[cn.r][cn.c]&&straight(p1,cn,b)&&straight(cn,p2,b))return[p1,cn,p2];
  for(let c=0;c<N;c++){if(c===p1.c)continue;const c1={r:p1.r,c};if(b[c1.r][c1.c])continue;
    if(straight(p1,c1,b)){const c2={r:p2.r,c};if(!b[c2.r][c2.c]&&straight(c1,c2,b)&&straight(c2,p2,b))return[p1,c1,c2,p2];}}
  for(let r=0;r<N;r++){if(r===p1.r)continue;const c1={r,c:p1.c};if(b[c1.r][c1.c])continue;
    if(straight(p1,c1,b)){const c2={r,c:p2.c};if(!b[c2.r][c2.c]&&straight(c1,c2,b)&&straight(c2,p2,b))return[p1,c1,c2,p2];}}
  return null;
};

//峇株吧辖华仁中学蔡逸众制作
const findHint=(b,bs,N,li=0)=>{
  const t=[];
  for(let r=1;r<=bs;r++)for(let c=1;c<=bs;c++)if(b[r][c]&&!isHollow(li,r,c))t.push({r,c,tile:b[r][c]});
  for(let i=0;i<t.length;i++)for(let j=i+1;j<t.length;j++){
    const{tile:a,r:r1,c:c1}=t[i],{tile:z,r:r2,c:c2}=t[j];
    if(a.id===z.id&&a.type!==z.type&&findPath({r:r1,c:c1},{r:r2,c:c2},b,N))return[{r:r1,c:c1},{r:r2,c:c2}];
  }return null;
};
const hasMoves=(b,bs,N,li=0)=>!!findHint(b,bs,N,li);

const doShuffle=(b,bs,N,li=0)=>{
  let nb=b.map(r=>[...r]);
  for(let a=0;a<15;a++){
    const t=[],p=[];
    for(let r=1;r<=bs;r++)for(let c=1;c<=bs;c++)if(nb[r][c]&&!isHollow(li,r,c)){t.push(nb[r][c]);p.push({r,c});}
    const s=rng(t);p.forEach((x,i)=>{nb[x.r][x.c]=s[i];});
    if(hasMoves(nb,bs,N,li))break;
  }return nb;
};

//华仁中学蔡逸众制作
const buildBoard=(cfg,li)=>{
  const{bs,pairs}=cfg,N=bs+2;
  let t=[];
  EL.slice(0,pairs).forEach(e=>{
    t.push({id:e.id,type:'name',value:e.name,cat:e.cat});
    t.push({id:e.id,type:'symbol',value:e.symbol,cat:e.cat});
  });
  t=rng(t);
  let b=Array(N).fill(0).map(()=>Array(N).fill(null));
  let i=0;for(let r=1;r<=bs;r++)for(let c=1;c<=bs;c++){if(isHollow(li,r,c))continue;b[r][c]=t[i++];}
  if(!hasMoves(b,bs,N,li))b=doShuffle(b,bs,N,li);
  return b;
};

/* ── Canvas line drawing (fixed outside overflow:hidden) ───────────────────── */
//Made by ecchua79
function drawLine(path,boardEl,bs){
  const canvas=document.getElementById('line-canvas');
  if(!canvas||!boardEl)return;
  const W=canvas.width=window.innerWidth;
  const H=canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!path||path.length<2)return;
  const rect=boardEl.getBoundingClientRect();
  const pad=5;
  const cellW=(rect.width-pad*2)/bs;
  const cellH=(rect.height-pad*2)/bs;
  const px=p=>rect.left+pad+(p.c-1)*cellW+cellW/2;
  const py=p=>rect.top +pad+(p.r-1)*cellH+cellH/2;
  const pts=path.map(p=>({x:px(p),y:py(p)}));

  const stroke=(color,width,blur,alpha)=>{
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=color;ctx.lineWidth=width;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.globalAlpha=alpha;ctx.shadowColor='#00f5ff';ctx.shadowBlur=blur;
    ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
  };
  stroke('#00f5ff',32,40,.10);
  stroke('#00f5ff',16,20,.30);
  stroke('#00f5ff', 7, 8,.70);
  stroke('#ffffff', 2, 0,1.0);

  pts.forEach((p,i)=>{
    const isEnd=i===0||i===pts.length-1;
    ctx.beginPath();ctx.arc(p.x,p.y,isEnd?10:5,0,Math.PI*2);
    ctx.fillStyle='rgba(0,245,255,0.3)';ctx.shadowColor='#00f5ff';ctx.shadowBlur=16;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,isEnd?5:3,0,Math.PI*2);
    ctx.fillStyle='#ffffff';ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;
  });
}
function clearLine(){
  const canvas=document.getElementById('line-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* ══════════════════════════════════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════════════════════════════════ */
//华仁中学蔡逸众制作
function App(){
  const[screen,setScreen]=useState('welcome'); // welcome | playing | certificate
  const[levelIdx,setLevelIdx]=useState(0);
  const[board,setBoard]=useState(null);
  const[selected,setSelected]=useState(null);
  const[pathPts,setPathPts]=useState([]);
  const[matches,setMatches]=useState(0);
  const[busy,setBusy]=useState(false);
  const[fading,setFading]=useState([]);
  const[timeElapsed,setTimeElapsed]=useState(0);
  const[hintN,setHintN]=useState(0);
  const[shuffleN,setShuffleN]=useState(0);
  const[swapN,setSwapN]=useState(0);
  const[swapMode,setSwapMode]=useState(false);
  const[swapFirst,setSwapFirst]=useState(null);
  const[hintTiles,setHintTiles]=useState([]);
  const[notice,setNotice]=useState('');
  const[particles,setParticles]=useState([]);
  const[phase,setPhase]=useState('playing'); // playing | levelComplete | bonusChoice | nameInput
  const[completedLevels,setCompletedLevels]=useState(0); // how many levels done (3 or 4)
  const[totalTime,setTotalTime]=useState(0);
  const[totalSkills,setTotalSkills]=useState({hint:0,shuffle:0,swap:0});
  const skillsNow=useRef({hint:0,shuffle:0,swap:0});
  const[playerName,setPlayerName]=useState('');
  const[completedAt,setCompletedAt]=useState('');
  const boardRef=useRef(null);
  const pid=useRef(0);

  const cfg=LEVELS[levelIdx]||LEVELS[3];
  const bs=cfg.bs, N=bs+2;

  /* redraw / clear canvas whenever pathPts changes */
  useEffect(()=>{
    if(pathPts.length>=2) drawLine(pathPts,boardRef.current,bs);
    else clearLine();
  },[pathPts,bs]);

  /* clear canvas on unmount */
  useEffect(()=>()=>clearLine(),[]);

  const notify=useCallback((m)=>{setNotice(m);setTimeout(()=>setNotice(''),2200);},[]);

  const spawnParticles=useCallback((pos1,pos2)=>{
    const step=100/bs;
    const colors=['#00f5ff','#7c3aed','#10b981','#f59e0b','#ec4899'];
    const np=[];
    [pos1,pos2].forEach(({r,c})=>{
      const x=(c-1)*step+step/2,y=(r-1)*step+step/2;
      for(let i=0;i<8;i++){
        const a=(Math.PI*2*i)/8;
        np.push({id:pid.current++,x,y,
          dx:Math.cos(a)*(15+Math.random()*25),dy:Math.sin(a)*(15+Math.random()*25),
          sz:4+Math.random()*4,color:colors[0|Math.random()*colors.length],
          dur:500+Math.random()*300,delay:Math.random()*100});
      }
    });
    setParticles(p=>[...p,...np]);
    setTimeout(()=>{const ids=np.map(x=>x.id);setParticles(p=>p.filter(x=>!ids.includes(x.id)));},1000);
  },[bs]);

  const initLevel=useCallback((idx,carryTime=0)=>{
    const c=LEVELS[idx];
    setBoard(buildBoard(c,idx));
    setSelected(null);setPathPts([]);setMatches(0);setTimeElapsed(carryTime);
    setHintN(c.hint);setShuffleN(c.shuffle);setSwapN(c.swap);
    setSwapMode(false);setSwapFirst(null);setHintTiles([]);
    setNotice('');setParticles([]);setFading([]);
    setPhase('playing');
    skillsNow.current={hint:0,shuffle:0,swap:0};
  },[]);

  const resetAll=useCallback(()=>{
    setLevelIdx(0);setTotalTime(0);setTotalSkills({hint:0,shuffle:0,swap:0});
    setCompletedLevels(0);setScreen('welcome');clearLine();
  },[]);

  const startGame=()=>{setScreen('playing');initLevel(0,0);};

  /* timer */
  useEffect(()=>{
    if(screen!=='playing'||phase!=='playing')return;
    const t=setInterval(()=>setTimeElapsed(p=>p+1),1000);
    return()=>clearInterval(t);
  },[screen,phase]);

  /* ── Skills ── */
  const handleShuffle=useCallback((isAuto=false)=>{
    if(!board)return;
    if(!isAuto&&shuffleN<=0)return;
    setBoard(doShuffle(board,bs,N,levelIdx));
    setSelected(null);setHintTiles([]);setSwapMode(false);setSwapFirst(null);setPathPts([]);
    if(isAuto)notify('💥 死锁！已自动洗牌');
    else{setShuffleN(p=>p-1);skillsNow.current.shuffle++;}
  },[board,bs,N,levelIdx,shuffleN,notify]);

  const handleHint=()=>{
    if(hintN<=0||busy||!board)return;
    const pair=findHint(board,bs,N,levelIdx);
    if(pair){setHintTiles(pair);setHintN(p=>p-1);skillsNow.current.hint++;
      setTimeout(()=>setHintTiles([]),3000);}
    else notify('⚠️ 暂无可消除的对');
  };

  const handleSwapToggle=()=>{
    if(swapN<=0)return;
    const e=!swapMode;setSwapMode(e);
    if(!e)setSwapFirst(null);else notify('🔀 点选两张牌互换位置');
  };

  /* ── Level complete logic ── */
  const onLevelDone=useCallback(()=>{
    const newSkills={
      hint:totalSkills.hint+skillsNow.current.hint,
      shuffle:totalSkills.shuffle+skillsNow.current.shuffle,
      swap:totalSkills.swap+skillsNow.current.swap,
    };
    setTotalSkills(newSkills);
    setTotalTime(timeElapsed);
    const done=levelIdx+1; // 1-indexed count of finished levels
    setCompletedLevels(done);
    if(done===3){
      // Offer bonus choice
      setPhase('bonusChoice');
    } else {
      setPhase('levelComplete');
    }
  },[timeElapsed,levelIdx,totalSkills]);

  const handleNext=()=>{
    // Called from LevelComplete (levels 1,2, and 4)
    if(levelIdx===3){
      // Bonus level done
      setCompletedAt(fmtDT(new Date()));
      setPhase('nameInput');
    } else {
      const next=levelIdx+1;
      setLevelIdx(next);setPhase('playing');initLevel(next,timeElapsed);
    }
  };

  const handleBonusYes=()=>{
    setLevelIdx(3);setPhase('playing');initLevel(3,timeElapsed);
  };

  const handleBonusNo=()=>{
    setCompletedAt(fmtDT(new Date()));
    setPhase('nameInput');
  };

  /* ── Tile click ── */
  const handleTile=(r,c)=>{
    if(busy||!board[r][c])return;
    if(swapMode){
      if(!swapFirst){setSwapFirst({r,c});return;}
      if(swapFirst.r===r&&swapFirst.c===c){setSwapFirst(null);return;}
      const nb=board.map(x=>[...x]);
      const tmp=nb[swapFirst.r][swapFirst.c];nb[swapFirst.r][swapFirst.c]=nb[r][c];nb[r][c]=tmp;
      setBoard(nb);setSwapN(p=>p-1);skillsNow.current.swap++;
      setSwapMode(false);setSwapFirst(null);notify('✅ 换位成功！');return;
    }
    if(!selected){setSelected({r,c});return;}
    if(selected.r===r&&selected.c===c){setSelected(null);return;}
    const t1=board[selected.r][selected.c],t2=board[r][c];
    if(t1.id===t2.id&&t1.type!==t2.type){
      const vp=findPath(selected,{r,c},board,N);
      if(vp){
        setPathPts(vp);setBusy(true);setHintTiles([]);
        const s={...selected},e={r,c};
        setTimeout(()=>{
          spawnParticles({r:s.r,c:s.c},{r:e.r,c:e.c});
          setFading([`${s.r}-${s.c}`,`${e.r}-${e.c}`]);
          setTimeout(()=>{
            const nb=board.map(x=>[...x]);nb[s.r][s.c]=null;nb[e.r][e.c]=null;
            setBoard(nb);setPathPts([]);setSelected(null);setFading([]);
            setMatches(prev=>{
              const nm=prev+1;
              if(nm===cfg.pairs){setTimeout(()=>onLevelDone(),300);}
              else if(!hasMoves(nb,bs,N,levelIdx)){setTimeout(()=>handleShuffle(true),400);}
              return nm;
            });
            setBusy(false);
          },250);
        },500);
        return;
      }
    }
    setSelected({r,c});
  };

  /* ── Render ── */
  const step=100/bs;
  const progress=matches/cfg.pairs;

  if(screen==='welcome') return <Welcome onStart={startGame}/>;

  if(screen==='playing'&&phase==='nameInput')
    return <NameInput levelCount={completedLevels}
      onConfirm={n=>{setPlayerName(n);setScreen('certificate');}}/>;

  if(screen==='certificate')
    return <Certificate name={playerName} totalTime={totalTime} skillsUsed={totalSkills}
      completedAt={completedAt} levelCount={completedLevels} onRestart={resetAll}/>;

  /* playing screen */
  const showBonus=phase==='bonusChoice';
  const showLevelComplete=phase==='levelComplete';
  const isBonus=levelIdx===3;

  return(
    <div style={{background:'linear-gradient(135deg,#0a0e1a 0%,#0d1530 50%,#0a0e1a 100%)',minHeight:'100vh',
      display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 8px',userSelect:'none'}}>

      {/* Header */}
      <div style={{width:'100%',maxWidth:'640px',marginBottom:'8px'}}>
        <div style={{background:'rgba(255,255,255,.04)',border:`1px solid ${isBonus?'rgba(245,158,11,.25)':'rgba(0,245,255,.14)'}`,
          backdropFilter:'blur(10px)',borderRadius:'14px',padding:'9px 13px',
          display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'6px'}}>
          <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
            {LEVELS.map((lv,i)=>{
              if(lv.bonus&&completedLevels<3&&i!==levelIdx) return null;
              return(
                <div key={i} style={{padding:'4px 8px',borderRadius:'8px',display:'flex',alignItems:'center',gap:'4px',
                  background:i===levelIdx?`${lv.color}15`:i<levelIdx?'rgba(16,185,129,.1)':'rgba(255,255,255,.04)',
                  border:`1px solid ${i===levelIdx?lv.color+'55':i<levelIdx?'rgba(16,185,129,.3)':'rgba(255,255,255,.06)'}`}}>
                  <span style={{fontSize:'12px'}}>{i<levelIdx?'✅':i===levelIdx?lv.emoji:'○'}</span>
                  <span style={{fontSize:'11px',fontWeight:700,color:i===levelIdx?lv.color:i<levelIdx?'#10b981':'rgba(148,163,184,.35)'}}>
                    第{['一','二','三','四'][i]}关{lv.bonus?' 💎':''}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:'13px',alignItems:'center'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'10px',color:'rgba(148,163,184,.5)',display:'flex',alignItems:'center',gap:'2px',marginBottom:'1px'}}>
                <IcTrophy s={9}/>进度</div>
              <div style={{fontSize:'15px',fontWeight:800,color:'#10b981',fontVariantNumeric:'tabular-nums'}}>
                {matches}<span style={{color:'rgba(148,163,184,.35)',fontSize:'10px'}}>/{cfg.pairs}</span></div>
            </div>
            <div style={{width:'1px',height:'24px',background:'rgba(148,163,184,.1)'}}/>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'10px',color:'rgba(148,163,184,.5)',display:'flex',alignItems:'center',gap:'2px',marginBottom:'1px'}}>
                <IcClock s={9}/>耗时</div>
              <div style={{fontSize:'15px',fontWeight:800,color:'#00f5ff',fontFamily:'monospace'}}>{fmt(timeElapsed)}</div>
            </div>
          </div>
        </div>
        <div style={{height:'3px',background:'rgba(255,255,255,.05)',borderRadius:'99px',marginTop:'5px',overflow:'hidden'}}>
          <div style={{height:'100%',width:`${progress*100}%`,
            background:isBonus?'linear-gradient(90deg,#d97706,#f59e0b)':'linear-gradient(90deg,#00f5ff,#7c3aed)',
            borderRadius:'99px',transition:'width .5s cubic-bezier(.4,0,.2,1)',
            boxShadow:isBonus?'0 0 8px #f59e0b88':'0 0 8px #00f5ff88'}}/>
        </div>
      </div>

      {/* Board */}
      <div style={{width:'100%',maxWidth:'640px',position:'relative'}}>
        <div ref={boardRef} style={{background:'rgba(255,255,255,.025)',
          border:`1px solid ${swapMode?'rgba(168,85,247,.45)':isBonus?'rgba(245,158,11,.2)':'rgba(0,245,255,.1)'}`,
          borderRadius:'14px',padding:'5px',position:'relative',
          aspectRatio:'1',transition:'border-color .3s',
          backgroundImage:'linear-gradient(rgba(0,245,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.02) 1px,transparent 1px)',
          backgroundSize:`${step}% ${step}%`}}>

          <Particles p={particles}/>

          {board&&(
            <div style={{display:'grid',width:'100%',height:'100%',position:'relative',zIndex:10,
              gridTemplateColumns:`0 repeat(${bs},1fr) 0`,gridTemplateRows:`0 repeat(${bs},1fr) 0`}}>
              {board.map((row,r)=>row.map((cell,c)=>{
                if(r===0||r===N-1||c===0||c===N-1)
                  return <div key={`${r}-${c}`} style={{width:0,height:0,overflow:'hidden'}}/>;

                const isSel=selected&&selected.r===r&&selected.c===c;
                const isHi=hintTiles.some(p=>p.r===r&&p.c===c);
                const isDis=fading.includes(`${r}-${c}`);
                const isSwF=swapFirst&&swapFirst.r===r&&swapFirst.c===c;
                const hol=isHollow(levelIdx,r,c);
                const cat=cell?(CC[cell.cat]||'#64748b'):'#64748b';
                const symFS=bs===4?'clamp(22px,5.5vw,48px)':bs===6?'clamp(16px,3.8vw,36px)':bs===7?'clamp(17px,3.6vw,34px)':'clamp(13px,2.6vw,26px)';
                const namFS=bs===4?'clamp(19px,4.5vw,40px)':bs===6?'clamp(14px,3.2vw,30px)':bs===7?'clamp(15px,3.0vw,28px)':'clamp(11px,2.1vw,22px)';
                const numFS=bs===4?'clamp(11px,1.5vw,15px)':bs===6?'clamp(9px,1.2vw,13px)':'clamp(9px,1.1vw,12px)';
                const dotSz=bs===4?8:bs===6?7:7;

                if(hol) return(
                  <div key={`${r}-${c}`} style={{padding:'3px'}}>
                    <div style={{width:'100%',height:'100%',borderRadius:'8px',
                      background:'rgba(0,245,255,.04)',border:'1px dashed rgba(0,245,255,.18)',
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <div style={{width:'30%',height:'30%',borderRadius:'50%',
                        background:'rgba(0,245,255,.12)',boxShadow:'0 0 12px 4px rgba(0,245,255,.12)'}}/>
                    </div>
                  </div>
                );

                const cls=['tile-btn',isDis?'td':'',isSwF&&!isDis?'tw':'',
                  isSel&&!isDis&&!swapMode?'ts':'',isHi&&!isSel&&!isDis?'th':''].filter(Boolean).join(' ');

                return(
                  <div key={`${r}-${c}`} style={{padding:'3px'}}>
                    {cell?(
                      <button onClick={()=>handleTile(r,c)} className={cls}
                        style={{position:'relative',width:'100%',height:'100%',borderRadius:'8px',
                          display:'flex',alignItems:'center',justifyContent:'center',
                          background:cell.type==='name'
                            ?'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,41,59,.93))'
                            :'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,27,75,.93))',
                          border:isSwF?'2px solid #a855f7':isSel?'1.5px solid #00f5ff':isHi?'1.5px solid #fbbf24':swapMode?'1px solid rgba(168,85,247,.2)':'1px solid rgba(255,255,255,.07)'}}>
                        <div style={{position:'absolute',top:'4px',right:'4px',width:dotSz+'px',height:dotSz+'px',
                          borderRadius:'50%',background:cat,opacity:.9,boxShadow:`0 0 ${dotSz}px ${cat}88`}}/>
                        <div style={{position:'absolute',top:'3px',left:'4px',fontSize:numFS,
                          color:'rgba(148,163,184,.48)',fontFamily:'monospace',fontWeight:700,lineHeight:1}}>{cell.id}</div>
                        <span style={{fontWeight:800,lineHeight:1,
                          fontSize:cell.type==='symbol'?symFS:namFS,
                          color:cell.type==='symbol'?'#00f5ff':'#e2e8f0',
                          fontFamily:cell.type==='symbol'?'monospace':'inherit',
                          textShadow:cell.type==='symbol'?'0 0 10px #00f5ff88':'none'}}>
                          {cell.value}
                        </span>
                      </button>
                    ):(
                      <div style={{width:'100%',height:'100%'}}/>
                    )}
                  </div>
                );
              }))}
            </div>
          )}

          {notice&&<div style={{position:'absolute',top:'10px',left:'50%',zIndex:60,
            background:'rgba(0,0,0,.88)',border:'1px solid rgba(0,245,255,.3)',borderRadius:'99px',
            padding:'5px 16px',fontSize:'12px',fontWeight:700,color:'#00f5ff',whiteSpace:'nowrap',
            backdropFilter:'blur(8px)',animation:'slideDown .3s ease-out'}}>{notice}</div>}

          {showLevelComplete&&
            <LevelComplete level={cfg.level} time={fmt(timeElapsed)} onNext={handleNext}
              isBonus={isBonus}/>}
        </div>

        {swapMode&&(
          <div style={{marginTop:'7px',padding:'7px 12px',background:'rgba(168,85,247,.1)',
            border:'1px solid rgba(168,85,247,.3)',borderRadius:'10px',fontSize:'12px',color:'#c084fc',
            fontWeight:600,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
            <span>🔀 {swapFirst?'再点第二张牌完成换位':'请点选第一张牌'}</span>
            <button onClick={()=>{setSwapMode(false);setSwapFirst(null);}}
              style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',
                borderRadius:'6px',padding:'2px 8px',color:'#c084fc',cursor:'pointer',fontSize:'11px',fontWeight:700}}>取消</button>
          </div>
        )}
      </div>

      {/* Controls */}
      <div style={{width:'100%',maxWidth:'640px',marginTop:'9px',display:'flex',justifyContent:'center',flexWrap:'wrap',gap:'6px'}}>
        <SkBtn icon={<IcBulb s={14}/>} label="提示" count={hintN} color="#fbbf24"
          disabled={busy||hintN<=0||phase!=='playing'} onClick={handleHint}/>
        <SkBtn icon={<IcShuffle s={14}/>} label="洗牌" count={shuffleN} color="#00f5ff"
          disabled={busy||shuffleN<=0||phase!=='playing'} onClick={()=>handleShuffle(false)}/>
        {cfg.swap>0&&<SkBtn icon={<IcSwap s={14}/>} label="换位" count={swapN} color="#a855f7"
          active={swapMode} disabled={swapN<=0||phase!=='playing'} onClick={handleSwapToggle}/>}
        <SkBtn icon={<IcRotate s={14}/>} label="重新开始" count={null} color="#f87171"
          disabled={false} onClick={resetAll}/>
      </div>

      {showBonus&&<BonusChoice time={fmt(totalTime)} onBonus={handleBonusYes} onCert={handleBonusNo}/>}
    </div>
  );
}

//峇株吧辖蔡逸众制作
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
