<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>两性花解剖结构教学图</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --panel: #ffffff;
      --text: #2c3e50;
      --accent: #3498db;
      --hover: rgba(52, 152, 219, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 24px;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 0.95rem; }
    .diagram-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-start;
    }
    .svg-container {
      flex: 1 1 400px;
      min-width: 300px;
    }
    svg {
      width: 100%;
      height: auto;
      background: #fcfcfc;
      border-radius: 8px;
      border: 1px solid #eee;
    }
    .info-panel {
      flex: 1 1 250px;
      min-width: 220px;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 16px;
      border-left: 4px solid var(--accent);
      transition: all 0.3s ease;
    }
    .info-panel h3 { margin-bottom: 8px; color: var(--accent); }
    .info-panel p { margin-bottom: 6px; font-size: 0.95rem; }
    .info-panel .tag {
      display: inline-block;
      background: #e2e8f0;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-right: 4px;
      margin-bottom: 4px;
    }
    .legend {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 0.9rem;
      color: #555;
      text-align: center;
    }
    /* SVG交互样式 */
    .floral-part {
      cursor: pointer;
      transition: filter 0.2s, opacity 0.2s;
    }
    .floral-part:hover {
      filter: brightness(1.15) drop-shadow(0 0 6px rgba(0,0,0,0.2));
    }
    .dimmed { opacity: 0.35; }
    .label-line { stroke: #7f8c8d; stroke-width: 1.2; stroke-dasharray: 4 3; }
    .label-text {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      fill: #2c3e50;
      font-weight: 500;
    }
    .highlight-ring {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 6 3;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .active .highlight-ring { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌸 两性花（完全花）解剖结构</h1>
      <p class="subtitle">将鼠标悬停或点击花朵各部位，查看结构名称与生理功能</p>
    </header>

    <div class="diagram-wrapper">
      <div class="svg-container">
        <svg viewBox="0 0 600 720" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <style>
              .floral-part { transition: all 0.2s ease; }
            </style>
          </defs>
          
          <!-- 背景 -->
          <rect width="600" height="720" fill="#fafbfc"/>
          
          <!-- 花柄 -->
          <line class="floral-part" id="pedicel" x1="300" y1="560" x2="300" y2="690" stroke="#5a6b4a" stroke-width="10" stroke-linecap="round"/>
          
          <!-- 花托 -->
          <ellipse class="floral-part" id="receptacle" cx="300" cy="560" rx="65" ry="22" fill="#6b8e6b"/>
          
          <!-- 萼片 (4片) -->
          <g class="floral-part" id="sepals">
            <path d="M300,560 Q240,510 210,545 Q240,585 300,560" fill="#3a8c3f" opacity="0.9"/>
            <path d="M300,560 Q360,510 390,545 Q360,585 300,560" fill="#3a8c3f" opacity="0.9"/>
            <path d="M300,560 Q270,480 230,500 Q260,550 300,560" fill="#2e7d32" opacity="0.85"/>
            <path d="M300,560 Q330,480 370,500 Q340,550 300,560" fill="#2e7d32" opacity="0.85"/>
          </g>
          
          <!-- 花瓣 (4片) - 向上向外展开 -->
          <g class="floral-part" id="petals">
            <!-- 左侧花瓣 -->
            <path d="M300,540 Q200,450 180,350 Q220,380 260,420 Q285,470 300,540" fill="#ff8fa3" opacity="0.9"/>
            <!-- 右侧花瓣 -->
            <path d="M300,540 Q400,450 420,350 Q380,380 340,420 Q315,470 300,540" fill="#ff8fa3" opacity="0.9"/>
            <!-- 前侧花瓣 -->
            <path d="M300,540 Q300,380 300,300 Q340,340 360,400 Q340,470 300,540" fill="#ff6b81" opacity="0.95"/>
            <!-- 后侧花瓣 -->
            <path d="M300,540 Q300,380 300,300 Q260,340 240,400 Q260,470 300,540" fill="#ff6b81" opacity="0.85"/>
          </g>
          
          <!-- 雄蕊群 (6枚) - 全部在花瓣内 -->
          <g class="floral-part" id="stamens">
            <line x1="285" y1="535" x2="265" y2="450" stroke="#d4af37" stroke-width="3"/>
            <ellipse cx="265" cy="450" rx="7" ry="5" fill="#ffd700"/>
            
            <line x1="315" y1="535" x2="335" y2="450" stroke="#d4af37" stroke-width="3"/>
            <ellipse cx="335" cy="450" rx="7" ry="5" fill="#ffd700"/>
            
            <line x1="300" y1="535" x2="300" y2="420" stroke="#d4af37" stroke-width="3"/>
            <ellipse cx="300" cy="420" rx="7" ry="5" fill="#ffd700"/>
            
            <line x1="275" y1="535" x2="260" y2="470" stroke="#d4af37" stroke-width="3"/>
            <ellipse cx="260" cy="470" rx="6" ry="4" fill="#ffd700"/>
            
            <line x1="325" y1="535" x2="340" y2="470" stroke="#d4af37" stroke-width="3"/>
            <ellipse cx="340" cy="470" rx="6" ry="4" fill="#ffd700"/>
            
            <line x1="300" y1="535" x2="285" y2="490" stroke="#d4af37" stroke-width="3"/>
            <ellipse cx="285" cy="490" rx="6" ry="4" fill="#ffd700"/>
          </g>
          
          <!-- 雌蕊 - 完全在花瓣内 -->
          <g class="floral-part" id="pistil">
            <!-- 子房 -->
            <ellipse cx="300" cy="545" rx="28" ry="24" fill="#4a90e2" opacity="0.85"/>
            <!-- 胚珠 -->
            <circle cx="292" cy="540" r="4.5" fill="#f39c12"/>
            <circle cx="308" cy="540" r="4.5" fill="#f39c12"/>
            <circle cx="300" cy="555" r="4.5" fill="#f39c12"/>
            <!-- 花柱 -->
            <line x1="300" y1="521" x2="300" y2="360" stroke="#4a90e2" stroke-width="6"/>
            <!-- 柱头 -->
            <ellipse cx="300" cy="360" rx="14" ry="8" fill="#2e86de"/>
          </g>
          
          <!-- 标注线 -->
          <g id="labels">
            <line class="label-line" x1="180" y1="640" x2="260" y2="620"/>
            <text class="label-text" x="170" y="645">花柄</text>
            
            <line class="label-line" x1="420" y1="570" x2="340" y2="565"/>
            <text class="label-text" x="430" y="575">花托</text>
            
            <line class="label-line" x1="160" y1="530" x2="230" y2="545"/>
            <text class="label-text" x="140" y="535">萼片</text>
            
            <line class="label-line" x1="440" y1="380" x2="370" y2="400"/>
            <text class="label-text" x="450" y="385">花瓣</text>
            
            <line class="label-line" x1="150" y1="460" x2="230" y2="470"/>
            <text class="label-text" x="120" y="465">雄蕊</text>
            
            <line class="label-line" x1="450" y1="420" x2="340" y2="450"/>
            <text class="label-text" x="460" y="425">雌蕊</text>
          </g>
        </svg>
      </div>

      <div class="info-panel" id="infoPanel">
        <h3>📖 结构说明</h3>
        <p>请将鼠标悬停在花朵的任意部位，此处将显示对应的解剖学名称、位置特征与生理功能。</p>
        <div style="margin-top:12px; font-size:0.85rem; color:#666;">
          <span class="tag">🟢 花萼</span>
          <span class="tag">🌸 花冠</span>
          <span class="tag">🟡 雄蕊群</span>
          <span class="tag">🔵 雌蕊群</span>
        </div>
      </div>
    </div>

    <div class="legend">
      💡 教学提示：两性花（完全花）同时具备雄蕊与雌蕊，是植物有性生殖的核心器官。外层起保护与吸引传粉者作用，内层负责配子形成与受精。
    </div>
  </div>

  <script>
    const parts = {
      pedicel: {
        name: "花柄 (Pedicel)",
        pos: "花朵最下方，连接茎与花托",
        func: "支撑花朵，输导水分、无机盐与有机物，使花朵处于适宜传粉的位置。"
      },
      receptacle: {
        name: "花托 (Receptacle)",
        pos: "花柄顶端膨大部分",
        func: "着生花萼、花冠、雄蕊和雌蕊，是花各部分营养输送的枢纽。"
      },
      sepals: {
        name: "萼片 / 花萼 (Sepal / Calyx)",
        pos: "花的最外层，通常绿色",
        func: "花蕾期保护内部幼嫩结构；部分植物萼片具光合功能或特化为吸引昆虫的结构。"
      },
      petals: {
        name: "花瓣 / 花冠 (Petal / Corolla)",
        pos: "花萼内侧，通常色彩鲜艳",
        func: "通过颜色、气味和蜜腺吸引传粉昆虫或鸟类；部分具紫外线引导斑纹。"
      },
      stamens: {
        name: "雄蕊群 (Stamen / Androecium)",
        pos: "花冠内侧，环绕雌蕊",
        func: "雄性生殖器官。花丝支撑花药，花药内产生花粉粒（含精子细胞）。"
      },
      pistil: {
        name: "雌蕊 (Pistil / Gynoecium)",
        pos: "花中央，通常为最高结构",
        func: "雌性生殖器官。柱头接受花粉，花柱提供花粉管通道，子房内含胚珠（发育为种子）。"
      }
    };

    const infoPanel = document.getElementById('infoPanel');
    const floralParts = document.querySelectorAll('.floral-part');

    function updateInfo(key) {
      const data = parts[key];
      if (!data) return;
      infoPanel.innerHTML = `
        <h3>${data.name}</h3>
        <p><strong>📍 位置：</strong>${data.pos}</p>
        <p><strong>🔬 功能：</strong>${data.func}</p>
      `;
    }

    floralParts.forEach(part => {
      part.addEventListener('mouseenter', () => {
        floralParts.forEach(p => p.classList.add('dimmed'));
        part.classList.remove('dimmed');
        updateInfo(part.id);
      });
      part.addEventListener('mouseleave', () => {
        floralParts.forEach(p => p.classList.remove('dimmed'));
        infoPanel.innerHTML = `
          <h3>📖 结构说明</h3>
          <p>请将鼠标悬停在花朵的任意部位，此处将显示对应的解剖学名称、位置特征与生理功能。</p>
          <div style="margin-top:12px; font-size:0.85rem; color:#666;">
            <span class="tag">🟢 花</span>
            <span class="tag">🌸 花冠</span>
            <span class="tag">🟡 雄蕊群</span>
            <span class="tag">🔵 雌蕊群</span>
          </div>
        `;
      });
      part.addEventListener('click', () => updateInfo(part.id));
    });
  </script>
</body>
</html>
