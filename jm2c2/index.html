<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学闯关大冒险 ⚗️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap');
:root{
  --bg:#08060f;--panel:#100d1a;--card:#15112000;--cardb:#151120cc;
  --border:#261f38;--text:#ede8f8;--muted:#8878aa;--hint:#5a4e78;
  --gold:#fbbf24;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);user-select:none;-webkit-user-select:none;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ── SHARED TOAST ── */
#toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-14px);
  background:rgba(15,13,26,.97);border:1px solid var(--border);backdrop-filter:blur(14px);
  color:var(--text);padding:8px 22px;border-radius:50px;font-weight:800;font-size:.85rem;
  z-index:900;opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SHARED TOPBAR ── */
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;background:rgba(8,6,15,.92);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;z-index:20;}
.t-logo{font-family:'Fredoka One',cursive;font-size:1rem;white-space:nowrap;
  background:linear-gradient(135deg,#a78bfa,#f472b6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.t-center{display:flex;flex-direction:column;align-items:center;gap:2px;}
.t-level-name{font-family:'Fredoka One',cursive;font-size:.82rem;color:var(--purple);}
.t-timer{font-family:'Fredoka One',cursive;font-size:.88rem;color:var(--gold);letter-spacing:.04em;}
.t-score{font-family:'Fredoka One',cursive;color:var(--gold);font-size:.9rem;white-space:nowrap;}
.level-dots{display:flex;gap:6px;}
.ldot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;transition:all .3s;}
.ldot.done{background:var(--green);border-color:var(--green);color:#000;}
.ldot.active{border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px rgba(251,191,36,.4);}
.ldot.locked{color:var(--muted);}

/* ── HOME ── */
#home{align-items:center;justify-content:center;background:var(--bg);}
.home-inner{display:flex;flex-direction:column;align-items:center;gap:20px;padding:24px 20px;max-width:460px;width:100%;}
.home-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,3.2rem);
  background:linear-gradient(135deg,#a78bfa,#f472b6,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.1;filter:drop-shadow(0 0 30px rgba(167,139,250,.4));}
.home-sub{font-size:.9rem;color:var(--muted);text-align:center;}
.home-levels{display:flex;flex-direction:column;gap:10px;width:100%;}
.lv-card{border-radius:18px;border:1.5px solid var(--border);padding:16px 20px;
  cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.025);position:relative;overflow:hidden;}
.lv-card:hover:not(.locked-card){transform:translateY(-3px);}
.lv-card.lv1{border-color:rgba(96,165,250,.3);} .lv-card.lv1:hover:not(.locked-card){border-color:var(--blue);box-shadow:0 6px 24px rgba(96,165,250,.2);}
.lv-card.lv2{border-color:rgba(251,191,36,.3);} .lv-card.lv2:hover:not(.locked-card){border-color:var(--gold);box-shadow:0 6px 24px rgba(251,191,36,.2);}
.lv-card.lv3{border-color:rgba(167,139,250,.3);} .lv-card.lv3:hover:not(.locked-card){border-color:var(--purple);box-shadow:0 6px 24px rgba(167,139,250,.2);}
.lv-card.locked-card{opacity:.45;cursor:not-allowed;}
.lv-icon{font-size:2rem;flex-shrink:0;}
.lv-info{flex:1;}
.lv-num{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);font-weight:800;}
.lv-name{font-family:'Fredoka One',cursive;font-size:1.1rem;}
.lv-desc{font-size:.78rem;color:var(--muted);margin-top:2px;}
.lv-badge{font-size:.75rem;padding:3px 10px;border-radius:20px;font-weight:800;flex-shrink:0;}
.lv-badge.done-badge{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);}
.lv-badge.lock-badge{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}
.lv-badge.go-badge{background:rgba(251,191,36,.12);color:var(--gold);border:1px solid rgba(251,191,36,.3);}
.home-start-btn{
  background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border:none;
  font-family:'Fredoka One',cursive;font-size:1.1rem;padding:14px 44px;
  border-radius:50px;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 24px rgba(167,139,250,.4);}
.home-start-btn:hover{transform:scale(1.05);filter:brightness(1.1);}

/* ── GAME WRAPPER ── */
#game-wrap{background:var(--bg);}
#game-root{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}

/* ── LEVEL TRANSITION ── */
#lvl-transition{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);display:none;
  flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;}
#lvl-transition.show{display:flex;}
.lt-emoji{font-size:4rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
.lt-title{font-family:'Fredoka One',cursive;font-size:2.2rem;animation:popIn .4s ease .1s both;}
.lt-sub{color:var(--muted);font-size:.9rem;animation:popIn .4s ease .18s both;}
.lt-next{background:linear-gradient(135deg,var(--green),#16a34a);color:#000;border:none;
  font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px 40px;border-radius:50px;
  cursor:pointer;transition:all .2s;animation:popIn .4s ease .3s both;
  box-shadow:0 4px 20px rgba(74,222,128,.35);}
.lt-next:hover{transform:scale(1.05);}

/* ── NAME DIALOG ── */
#name-dialog{position:fixed;inset:0;z-index:600;background:rgba(8,6,15,.9);backdrop-filter:blur(14px);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#name-dialog.show{display:flex;}
.nd-box{background:rgba(15,13,26,.98);border:2px solid rgba(167,139,250,.4);border-radius:24px;
  padding:32px 28px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 0 40px rgba(167,139,250,.2);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.nd-emoji{font-size:3.5rem;margin-bottom:10px;}
.nd-title{font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:6px;}
.nd-sub{color:var(--muted);font-size:.85rem;margin-bottom:20px;}
.nd-input{width:100%;background:rgba(255,255,255,.06);border:2px solid var(--border);
  color:var(--text);font-family:'Fredoka One',cursive;font-size:1.1rem;
  padding:12px 16px;border-radius:14px;outline:none;text-align:center;
  transition:border-color .2s;margin-bottom:14px;}
.nd-input:focus{border-color:var(--purple);}
.nd-btn{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border:none;
  font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px;border-radius:14px;
  cursor:pointer;transition:all .2s;width:100%;box-shadow:0 4px 18px rgba(167,139,250,.35);}
.nd-btn:hover{transform:scale(1.03);}

/* ── CERTIFICATE ── */
#cert-screen{background:var(--bg);align-items:center;justify-content:center;overflow-y:auto;}
.cert-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:16px;max-width:520px;width:100%;margin:auto;}
.cert-card{
  width:100%;border-radius:24px;
  background:linear-gradient(145deg,#1a1130,#0f0d1a);
  border:2px solid rgba(167,139,250,.4);
  box-shadow:0 0 50px rgba(167,139,250,.2), inset 0 1px 0 rgba(167,139,250,.15);
  padding:28px 24px;text-align:center;
  animation:popIn .6s cubic-bezier(.34,1.56,.64,1);}
.cert-header{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:18px;}
.cert-seal{font-size:3rem;}
.cert-title-top{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:800;}
.cert-big{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4vw,1.9rem);
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cert-divider{width:80%;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.4),transparent);margin:10px auto;}
.cert-name-label{font-size:.72rem;color:var(--muted);letter-spacing:.06em;margin-bottom:4px;}
.cert-name{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,5vw,2rem);color:#fff;
  text-shadow:0 0 20px rgba(167,139,250,.5);}
.cert-sub{font-size:.8rem;color:var(--muted);margin-top:6px;}
.cert-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.cs-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:12px 8px;}
.cs-val{font-family:'Fredoka One',cursive;font-size:1.4rem;display:block;line-height:1.25;}
#cert-date{font-size:1.15rem;}
.cs-lbl{font-size:.65rem;color:var(--muted);margin-top:2px;letter-spacing:.04em;}
.cert-levels{display:flex;justify-content:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.cl-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;
  font-size:.8rem;font-weight:800;border:1px solid;}
.cert-footer{font-size:.68rem;color:var(--muted);line-height:1.6;}
.cert-stars{font-size:1.4rem;margin:4px 0;}
.cert-play-again{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border:none;
  font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px 40px;border-radius:50px;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(167,139,250,.35);width:100%;max-width:320px;}
.cert-play-again:hover{transform:scale(1.04);}

/* ── ANIMATIONS ── */
@keyframes popIn{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}
@keyframes floatUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes shakeX{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.shake{animation:shakeX .38s ease;}
.particle{position:fixed;pointer-events:none;z-index:800;animation:pFly .9s ease-out forwards;}
@keyframes pFly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.1);}}
/* L1 atom converge */
@keyframes l1AtomConverge{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.25);}}
/* L1 molecule burst */
@keyframes l1MolBurst{0%{opacity:0;transform:translate(-50%,-50%) scale(.1);}45%{opacity:1;transform:translate(-50%,-50%) scale(1.25);}70%{transform:translate(-50%,-50%) scale(.95);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes l1MolFade{0%{opacity:1;}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4);}}

/* ════════════════════════════════
   LEVEL 1 — CHEMICAL VALENCE
════════════════════════════════ */
#l1-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#l1-mission{text-align:center;padding:8px 16px 6px;flex-shrink:0;background:rgba(8,6,15,.5);}
.l1-mlabel{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);margin-bottom:2px;}
#l1-mol{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff;text-shadow:0 0 20px rgba(79,195,247,.5);}
#l1-hint{font-size:.78rem;color:var(--muted);margin-top:2px;text-shadow:0 1px 6px rgba(0,0,0,.8);}
#l1-main{flex:1;display:flex;align-items:stretch;overflow:hidden;position:relative;}
#l1-pool-left,#l1-pool-right{width:90px;flex-shrink:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:12px;padding:8px 5px;position:relative;z-index:10;}
#l1-reaction-zone{flex:1;position:relative;display:flex;align-items:center;justify-content:center;}
#l1-drop-target{width:clamp(180px,36vw,280px);height:clamp(180px,36vw,280px);border-radius:50%;
  border:3px dashed rgba(79,195,247,.3);background:radial-gradient(circle,rgba(79,195,247,.04) 0%,transparent 70%);
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:border-color .3s,background .3s;z-index:5;}
#l1-drop-target.drag-over{border-color:rgba(79,195,247,.8);background:radial-gradient(circle,rgba(79,195,247,.12) 0%,transparent 70%);box-shadow:0 0 50px rgba(79,195,247,.2);}
.l1-drop-label{font-size:.72rem;color:var(--hint);letter-spacing:.06em;text-transform:uppercase;position:absolute;bottom:22px;}
#l1-drop-atoms{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px;max-width:82%;min-height:70px;}
#l1-synth-btn{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#4fc3f7,#0288d1);color:#000;border:none;
  font-family:'Fredoka One',cursive;font-size:1rem;padding:10px 28px;border-radius:50px;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(79,195,247,.4);white-space:nowrap;z-index:20;}
#l1-synth-btn:hover{transform:translateX(-50%) scale(1.06);filter:brightness(1.1);}
#l1-clear-btn{position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);
  background:transparent;color:var(--muted);border:1px solid var(--border);
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.78rem;padding:6px 18px;
  border-radius:50px;cursor:pointer;transition:all .2s;white-space:nowrap;z-index:20;}
#l1-clear-btn:hover{border-color:var(--red);color:var(--red);}
.l1-atom-chip{width:52px;height:52px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:grab;font-family:'Fredoka One',cursive;
  transition:transform .15s,box-shadow .15s;position:relative;flex-shrink:0;border:2px solid transparent;z-index:10;}
.l1-atom-chip:hover{transform:scale(1.12);}
.l1-atom-chip.placed{width:44px;height:44px;cursor:pointer;animation:popIn .2s cubic-bezier(.34,1.56,.64,1);}
.l1-atom-chip.placed:hover::after{content:'✕';position:absolute;inset:0;background:rgba(0,0,0,.5);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;font-family:'Nunito',sans-serif;color:#fff;}
.l1-sym{font-size:1.1rem;line-height:1;} .l1-val{font-size:.58rem;opacity:.75;font-family:'Nunito',sans-serif;font-weight:800;}
.l1-placed-sym{font-size:.95rem;line-height:1;}
/* atom colors */
.ac-H{background:radial-gradient(circle at 35% 35%,#ff8a80,#ff6b6b);box-shadow:0 4px 14px rgba(255,107,107,.5);border-color:rgba(255,107,107,.4);color:#fff;}
.ac-O{background:radial-gradient(circle at 35% 35%,#80d8ff,#4fc3f7);box-shadow:0 4px 14px rgba(79,195,247,.5);border-color:rgba(79,195,247,.4);color:#000;}
.ac-N{background:radial-gradient(circle at 35% 35%,#ce93d8,#ab47bc);box-shadow:0 4px 14px rgba(171,71,188,.5);border-color:rgba(171,71,188,.4);color:#fff;}
.ac-C{background:radial-gradient(circle at 35% 35%,#a5d6a7,#66bb6a);box-shadow:0 4px 14px rgba(102,187,106,.5);border-color:rgba(102,187,106,.4);color:#fff;}
.ac-Na{background:radial-gradient(circle at 35% 35%,#ffcc80,#ffa726);box-shadow:0 4px 14px rgba(255,167,38,.5);border-color:rgba(255,167,38,.4);color:#000;}
.ac-Cl{background:radial-gradient(circle at 35% 35%,#80deea,#26c6da);box-shadow:0 4px 14px rgba(38,198,218,.5);border-color:rgba(38,198,218,.4);color:#000;}
.ac-Ca{background:radial-gradient(circle at 35% 35%,#ef9a9a,#ef5350);box-shadow:0 4px 14px rgba(239,83,80,.5);border-color:rgba(239,83,80,.4);color:#fff;}
.ac-S{background:radial-gradient(circle at 35% 35%,#fff176,#ffee58);box-shadow:0 4px 14px rgba(255,238,88,.5);border-color:rgba(255,238,88,.4);color:#333;}
#l1-feedback{margin-top:18px;padding:14px 18px;border-radius:12px;font-weight:700;display:none;animation:popIn .3s ease;}
#l1-feedback.correct{display:block;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);color:var(--green);}
#l1-feedback.wrong{display:block;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:var(--red);}
.l1-next-btn{margin-top:12px;background:var(--text);color:var(--bg);border:none;
  font-family:'Fredoka One',cursive;font-size:.95rem;padding:11px 26px;border-radius:12px;cursor:pointer;
  transition:all .2s;display:block;width:100%;}
.l1-next-btn:hover{transform:scale(1.03);}
#l1-float-bg{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden;}

/* ════════════════════════════════
   LEVEL 2 — MOLECULAR MASS
════════════════════════════════ */
#l2-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8px 12px 6px;gap:8px;}
#l2-mol-visual{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;flex-shrink:0;flex-wrap:wrap;min-height:120px;}
.l2-mol-ball{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;
  font-family:'Fredoka One',cursive;position:relative;transition:transform .2s,box-shadow .3s;flex-shrink:0;}
.l2-sym{font-size:1rem;line-height:1;} .l2-cnt{font-size:.6rem;font-weight:800;font-family:'Nunito',sans-serif;}
.l2-tag{position:absolute;bottom:-17px;font-size:.58rem;font-weight:700;font-family:'Nunito',sans-serif;white-space:nowrap;opacity:.7;}
.l2-bond{width:22px;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);flex-shrink:0;align-self:center;margin:0 -2px;}
#l2-counters{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;flex-shrink:0;}
.l2-counter{background:rgba(17,24,39,.8);border:1.5px solid var(--border);border-radius:14px;
  padding:9px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:84px;
  transition:border-color .3s,box-shadow .3s;}
.l2-counter.s-ok{border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,.2);}
.l2-counter.s-ok::before{background:rgba(74,222,128,.05);opacity:1;}
.l2-counter.s-over{border-color:var(--red);box-shadow:0 0 12px rgba(248,113,113,.2);}
.l2-counter.s-under{border-color:var(--gold);}
.l2-csym{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1rem;}
.l2-cformula{font-size:.68rem;color:var(--muted);}
.l2-crun{font-family:'Fredoka One',cursive;font-size:.95rem;transition:color .3s;}
.l2-crun.ok{color:var(--green);} .l2-crun.over{color:var(--red);} .l2-crun.under{color:var(--gold);}
#l2-steppers{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;flex-shrink:0;}
.l2-stepper{display:flex;align-items:center;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:30px;overflow:hidden;}
.l2-slbl{padding:0 10px;font-family:'Fredoka One',cursive;font-size:.78rem;border-right:1px solid var(--border);color:var(--text);white-space:nowrap;background:rgba(255,255,255,.02);}
.l2-sbtn{width:30px;height:30px;background:none;border:none;color:var(--text);font-size:1.1rem;cursor:pointer;font-family:'Fredoka One',cursive;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.l2-sbtn:hover{background:rgba(251,191,36,.15);color:var(--gold);}
.l2-sbtn.plus{border-left:1px solid var(--border);}
.l2-sval{min-width:26px;text-align:center;font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text);}
#l2-total{background:rgba(17,24,39,.8);border:1.5px solid var(--border);border-radius:14px;
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;
  transition:border-color .4s,box-shadow .4s;}
#l2-total.bar-ok{border-color:var(--green);box-shadow:0 0 18px rgba(74,222,128,.2);}
#l2-total.bar-over{border-color:var(--red);box-shadow:0 0 18px rgba(248,113,113,.2);}
.l2-tlbl{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.l2-teq{font-family:'Fredoka One',cursive;font-size:.88rem;color:var(--muted);flex:1;padding:0 10px;line-height:1.5;}
.l2-tnum{font-family:'Fredoka One',cursive;font-size:1.8rem;transition:color .3s;min-width:60px;text-align:right;}
.l2-tnum.ok{color:var(--green);text-shadow:0 0 14px rgba(74,222,128,.5);}
.l2-tnum.over{color:var(--red);}
.l2-tnum.zero{color:var(--muted);}
.l2-tgt{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:3px 9px;
  font-family:'Fredoka One',cursive;font-size:.75rem;color:var(--gold);white-space:nowrap;}
#l2-confirm{background:linear-gradient(135deg,#fbbf24,#d97706);color:#000;border:none;
  font-family:'Fredoka One',cursive;font-size:1rem;padding:12px;border-radius:13px;cursor:pointer;
  transition:all .2s;flex-shrink:0;box-shadow:0 4px 18px rgba(251,191,36,.3);}
#l2-confirm:hover{transform:scale(1.03);filter:brightness(1.1);}

/* ════════════════════════════════
   LEVEL 3 — BALANCING (v2: structural atom animations)
════════════════════════════════ */
#l3-target{display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap;
  padding:6px 16px;background:rgba(251,191,36,.05);border-bottom:1px solid rgba(251,191,36,.15);flex-shrink:0;}
.l3-tb-lbl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:800;white-space:nowrap;}
.l3-tb-mol{display:inline-flex;align-items:center;gap:4px;background:rgba(251,191,36,.08);
  border:1.5px solid rgba(251,191,36,.28);border-radius:20px;padding:2px 10px 2px 7px;
  font-family:'Fredoka One',cursive;font-size:.82rem;color:var(--gold);}
.l3-tb-plus{color:rgba(251,191,36,.45);font-family:'Fredoka One',cursive;font-size:.9rem;}
.l3-tb-hint{font-size:.6rem;color:rgba(251,191,36,.4);white-space:nowrap;}
#l3-eq-strip{flex-shrink:0;background:rgba(8,6,15,.82);border-bottom:1px solid var(--border);padding:5px 12px;}
.l3-eq-lbl{font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);text-align:center;margin-bottom:2px;}
#l3-eq-row{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;
  font-family:'Fredoka One',cursive;font-size:clamp(.76rem,2.2vw,.95rem);min-height:24px;}
.l3-eq-chip{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:8px;border:1.5px solid var(--border);background:rgba(255,255,255,.03);transition:border-color .3s,box-shadow .3s;}
.l3-eq-chip.slot-ok{border-color:rgba(74,222,128,.4);box-shadow:0 0 6px rgba(74,222,128,.15);}
.l3-eq-n{font-family:'Fredoka One',cursive;min-width:13px;text-align:center;color:var(--muted);transition:all .35s cubic-bezier(.34,1.56,.64,1);}
.l3-eq-n.revealed{color:var(--gold);}
.l3-eq-n.is-one.revealed{color:rgba(251,191,36,.45);}
.l3-eq-f{font-size:.88em;}
.l3-eq-plus,.l3-eq-arrow{color:var(--muted);padding:0 1px;}
.l3-eq-arrow{color:#a78bfa;font-size:1.1em;}
#l3-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#l3-bench{flex-shrink:0;display:flex;align-items:flex-start;justify-content:center;padding:8px 10px 4px;gap:8px;flex-wrap:wrap;}
.l3-rcol{display:flex;flex-direction:column;align-items:center;gap:4px;}
.l3-rcol-lbl{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);font-weight:800;}
.l3-slot{width:clamp(78px,18vw,104px);min-height:clamp(85px,18vw,110px);border-radius:16px;
  border:2.5px dashed rgba(167,139,250,.28);background:rgba(13,10,22,.7);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:6px 4px 4px;position:relative;transition:border-color .2s,box-shadow .2s,background .2s;overflow:hidden;gap:2px;}
.l3-slot.drag-over{border-color:rgba(167,139,250,.85);box-shadow:0 0 22px rgba(167,139,250,.28);background:rgba(167,139,250,.06);}
.l3-sbadge{position:absolute;top:5px;left:50%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:.78rem;padding:1px 9px;border-radius:20px;
  border:1.5px solid var(--border);background:rgba(8,6,16,.85);color:var(--muted);
  transition:color .25s,border-color .25s,box-shadow .25s;white-space:nowrap;z-index:3;}
.l3-stacked{width:100%;background:rgba(255,255,255,.04);border-radius:9px;
  display:flex;align-items:center;justify-content:center;gap:4px;padding:3px 5px;
  font-family:'Fredoka One',cursive;font-size:.72rem;cursor:pointer;transition:background .15s;flex-shrink:0;
  animation:popIn .2s cubic-bezier(.34,1.56,.64,1);}
.l3-stacked:hover{background:rgba(248,113,113,.12);}
.l3-stacked:hover::after{content:' ✕';font-size:.62rem;color:var(--red);opacity:.8;}
.l3-stacked.l3-struct{padding:3px 4px;flex-direction:column;gap:2px;}
.l3-bench-plus{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--muted);align-self:center;margin-top:26px;flex-shrink:0;}
.l3-prod-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.l3-prod-card{display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:14px;
  padding:7px 12px;border:2px solid transparent;background:transparent;position:relative;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);min-width:clamp(76px,16vw,100px);min-height:clamp(84px,16vw,108px);}
.l3-prod-card.hidden{opacity:0;transform:scale(.5);}
.l3-prod-card.revealed{opacity:1;transform:scale(1);border-color:rgba(74,222,128,.45);background:rgba(74,222,128,.07);box-shadow:0 0 22px rgba(74,222,128,.2);}
.l3-pc-cnt{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:.65rem;
  padding:1px 8px;border-radius:20px;border:1.5px solid rgba(74,222,128,.5);background:rgba(8,6,16,.9);color:var(--green);white-space:nowrap;opacity:0;transition:opacity .4s ease .2s;}
.l3-prod-card.revealed .l3-pc-cnt{opacity:1;}
.l3-pc-icon{font-size:1.6rem;line-height:1;} .l3-pc-name{font-family:'Fredoka One',cursive;font-size:.68rem;text-align:center;}
.l3-bench-arrow{font-family:'Fredoka One',cursive;font-size:1.5rem;color:#a78bfa;align-self:center;margin-top:26px;flex-shrink:0;}
#l3-react-btn{flex-shrink:0;align-self:center;margin-top:24px;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border:none;
  font-family:'Fredoka One',cursive;font-size:.9rem;padding:9px 20px;border-radius:50px;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 16px rgba(167,139,250,.38);white-space:nowrap;}
#l3-react-btn:hover{transform:scale(1.05);filter:brightness(1.1);}
#l3-react-btn:active{transform:scale(.96);}
#l3-react-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
#l3-pool{flex:1;overflow:hidden;min-height:0;display:flex;align-items:center;justify-content:center;align-content:center;flex-wrap:wrap;gap:8px;padding:8px 12px;}
.l3-mol-card{border-radius:15px;border:2px solid transparent;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:filter .15s,transform .15s;
  width:auto;min-width:clamp(62px,13vw,78px);max-width:clamp(110px,24vw,140px);
  height:clamp(62px,14vw,80px);padding:5px 7px;}
.l3-mol-card:hover{filter:brightness(1.18);transform:scale(1.1);}
.l3-mc-icon{font-size:1.5rem;line-height:1;} .l3-mc-name{font-family:'Fredoka One',cursive;font-size:.65rem;text-align:center;color:#fff;}
.l3-mc-slabel{font-family:'Fredoka One',cursive;font-size:.55rem;color:rgba(255,255,255,.5);}
#l3-rxn-ov{position:fixed;inset:0;z-index:300;display:none;pointer-events:none;}
#l3-rxn-ov.show{display:block;}
.rxn-flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(167,139,250,.22) 0%,transparent 70%);animation:fPulse .65s ease-out forwards;}
@keyframes fPulse{0%{opacity:0;}30%{opacity:1;}100%{opacity:0;}}

/* ── L3 ATOM CIRCLES ── */
.l3-a-h {width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffa07a,#c0392b);border:1.5px solid #f87171;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.38rem;font-weight:900;color:#fff;box-shadow:0 0 5px rgba(248,113,113,.5);flex-shrink:0;}
.l3-a-o {width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#60cfff,#1a7fbf);border:2px solid #38bdf8;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.5rem;font-weight:900;color:#fff;box-shadow:0 0 7px rgba(56,189,248,.6);flex-shrink:0;}
.l3-a-fe{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c4b5fd,#6d28d9);border:2px solid #a78bfa;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.42rem;font-weight:900;color:#fff;box-shadow:0 0 7px rgba(167,139,250,.55);flex-shrink:0;}
.l3-a-c {width:17px;height:17px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#86efac,#15803d);border:2px solid #4ade80;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.42rem;font-weight:900;color:#fff;box-shadow:0 0 6px rgba(74,222,128,.5);flex-shrink:0;}
.l3-a-cl{width:17px;height:17px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#67e8f9,#0e7490);border:2px solid #22d3ee;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.38rem;font-weight:900;color:#fff;box-shadow:0 0 6px rgba(34,211,238,.5);flex-shrink:0;}
.l3-a-al{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e2e8f0,#64748b);border:2px solid #94a3b8;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.4rem;font-weight:900;color:#fff;box-shadow:0 0 6px rgba(148,163,184,.5);flex-shrink:0;}
.l3-bond {width:7px;height:2.5px;background:rgba(255,255,255,.4);border-radius:2px;flex-shrink:0;}
.l3-bond-d{display:flex;flex-direction:column;gap:2px;width:7px;flex-shrink:0;}
.l3-bond-d span{height:2px;background:rgba(255,255,255,.38);border-radius:1px;display:block;}
.l3-bond-t{display:flex;flex-direction:column;gap:1.5px;width:7px;flex-shrink:0;}
.l3-bond-t span{height:1.5px;background:rgba(255,255,255,.35);border-radius:1px;display:block;}
/* H2O bent */
.l3-h2o-s{display:flex;align-items:center;justify-content:center;position:relative;width:50px;height:32px;}
.l3-h2o-s .l3-a-o{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
.l3-h2o-s .ahl{position:absolute;left:1px;top:2px;}
.l3-h2o-s .ahr{position:absolute;right:1px;top:2px;}
.l3-h2o-s .bhl{position:absolute;width:10px;height:2px;background:rgba(255,255,255,.5);border-radius:2px;left:13px;top:11px;transform:rotate(-38deg);}
.l3-h2o-s .bhr{position:absolute;width:10px;height:2px;background:rgba(255,255,255,.5);border-radius:2px;right:13px;top:11px;transform:rotate(38deg);}
/* Molecule row containers */
.l3-ms{display:flex;align-items:center;gap:1px;}
/* Flying atoms for reaction animation */
.l3-atom-fly{position:fixed;pointer-events:none;z-index:510;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-weight:900;color:#fff;}
@keyframes l3AtomBreak{0%{opacity:1;transform:translate(0,0) scale(1);}18%{transform:translate(calc(var(--dx)*.08),calc(var(--dy)*.08)) scale(1.3);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.35);}}
@keyframes l3AtomForm{0%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(.25);}30%{opacity:1;}100%{opacity:1;transform:translate(0,0) scale(1);}}
@keyframes l3StructReveal{0%{opacity:0;transform:scale(0) rotate(-15deg);}55%{transform:scale(1.12) rotate(2deg);}100%{opacity:1;transform:scale(1) rotate(0);}}
.l3-struct-reveal{animation:l3StructReveal .55s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes l3BondFlash{0%,100%{opacity:1;}30%{opacity:.12;}60%{opacity:1;}80%{opacity:.28;}}
.l3-breaking{animation:l3BondFlash .32s ease;}
@keyframes l3SparkFly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.1);}}
.l3-spark{position:fixed;pointer-events:none;z-index:520;border-radius:50%;}

/* ── SHARED LEVEL OVERLAY ── */
.lv-overlay{position:fixed;inset:0;z-index:400;background:rgba(8,6,15,.94);backdrop-filter:blur(14px);
  display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.lv-overlay.show{display:flex;}
.lvo-emoji{font-size:4rem;margin-bottom:8px;animation:popIn .45s cubic-bezier(.34,1.56,.64,1);}
.lvo-title{font-family:'Fredoka One',cursive;font-size:1.8rem;margin-bottom:5px;animation:popIn .4s ease .1s both;}
.lvo-sub{color:var(--muted);font-size:.85rem;margin-bottom:14px;animation:popIn .4s ease .16s both;}
.lvo-card{background:rgba(13,10,22,.97);border:2px solid rgba(167,139,250,.35);border-radius:18px;
  padding:14px 20px;max-width:400px;width:100%;margin-bottom:14px;animation:popIn .4s ease .22s both;
  font-size:.82rem;line-height:1.7;color:var(--muted);text-align:left;box-shadow:0 0 26px rgba(167,139,250,.15);
  text-shadow:0 1px 4px rgba(0,0,0,.6);}
.lvo-card strong{color:var(--text);}
.lvo-btn{background:linear-gradient(135deg,var(--green),#16a34a);color:#000;border:none;
  font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px 42px;border-radius:50px;cursor:pointer;
  transition:all .2s;animation:popIn .4s ease .28s both;box-shadow:0 4px 20px rgba(74,222,128,.35);}
.lvo-btn:hover{transform:scale(1.05);}
.lvo-btn-gold{background:linear-gradient(135deg,#fbbf24,#d97706);color:#000;box-shadow:0 4px 20px rgba(251,191,36,.35);}
.lvo-eq{font-family:'Fredoka One',cursive;font-size:clamp(.85rem,2.8vw,1.05rem);color:var(--gold);
  background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.18);border-radius:11px;padding:6px 16px;
  margin-bottom:8px;animation:popIn .4s ease .13s both;max-width:90vw;}

/* ── DRAG GHOST ── */
#drag-ghost{position:fixed;z-index:700;pointer-events:none;border-radius:18px;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  width:70px;height:70px;opacity:.88;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;}

@media(max-width:460px){
  .l3-slot{width:72px;min-height:78px;} .l3-mol-card{width:58px;height:58px;}
  #l1-pool-left,#l1-pool-right{width:72px;}
  .l1-atom-chip{width:44px;height:44px;} .l1-sym{font-size:.9rem;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="toast"></div>
<div id="drag-ghost"></div>
<div id="l3-rxn-ov"></div>

<!-- ══════════ HOME ══════════ -->
<div class="screen active" id="home">
  <div class="home-inner">
    <div style="font-size:3rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)">⚗️</div>
    <div class="home-title">化学闯关<br>大冒险</div>
    <div class="home-sub">初中化学 · 三大基础关卡 · 趣味挑战</div>
    <div class="home-levels" id="home-levels"></div>
    <button class="home-start-btn" onclick="startGame()">🚀 开始游戏</button>
  </div>
</div>

<!-- ══════════ GAME WRAPPER ══════════ -->
<div class="screen" id="game-wrap">
  <!-- shared topbar -->
  <div id="topbar">
    <div class="t-logo">⚗️ 化学冒险</div>
    <div class="t-center">
      <div class="t-level-name" id="t-level-name">第一关：化合价</div>
      <div class="t-timer" id="t-timer">00:00</div>
    </div>
    <div class="t-score">⭐ <span id="t-score">0</span></div>
  </div>
  <!-- level progress dots -->
  <div style="display:flex;justify-content:center;gap:8px;padding:5px 0;background:rgba(8,6,15,.7);border-bottom:1px solid var(--border);flex-shrink:0;" id="lv-dots-bar"></div>
  <!-- game content injected here -->
  <div id="game-root"></div>
</div>

<!-- ══════════ LEVEL TRANSITION ══════════ -->
<div id="lvl-transition">
  <div class="lt-emoji" id="lt-emoji">🎉</div>
  <div class="lt-title" id="lt-title">第一关通过！</div>
  <div class="lt-sub" id="lt-sub">太棒了！继续挑战下一关</div>
  <button class="lt-next" id="lt-next" onclick="proceedToNext()">进入下一关 →</button>
</div>

<!-- ══════════ NAME DIALOG ══════════ -->
<div id="name-dialog">
  <div class="nd-box">
    <div class="nd-emoji">🏆</div>
    <div class="nd-title">恭喜全部通关！</div>
    <div class="nd-sub">请输入你的名字，为你生成专属通关证书！</div>
    <input class="nd-input" id="nd-input" type="text" placeholder="你的名字…" maxlength="20"
           onkeydown="if(event.key==='Enter')genCert()">
    <button class="nd-btn" onclick="genCert()">✨ 生成证书</button>
  </div>
</div>

<!-- ══════════ CERTIFICATE ══════════ -->
<div class="screen" id="cert-screen">
  <div class="cert-wrap">
    <div class="cert-card" id="cert-card">
      <div class="cert-header">
        <div class="cert-seal">🏅</div>
        <div class="cert-title-top">初中化学闯关游戏</div>
        <div class="cert-big">通关证书</div>
      </div>
      <div class="cert-divider"></div>
      <div class="cert-name-label">颁发给</div>
      <div class="cert-name" id="cert-name">同学</div>
      <div class="cert-sub">已成功完成全部三个化学关卡的挑战</div>
      <div class="cert-stars">⭐⭐⭐</div>
      <div class="cert-stats">
        <div class="cs-box"><span class="cs-val" id="cert-score" style="color:var(--gold)">0</span><div class="cs-lbl">总积分</div></div>
        <div class="cs-box"><span class="cs-val" id="cert-time" style="color:var(--blue)">0:00</span><div class="cs-lbl">完成用时</div></div>
        <div class="cs-box"><span class="cs-val" id="cert-finish" style="color:var(--purple)">--:--</span><div class="cs-lbl">完成时间</div></div>
        <div class="cs-box"><span class="cs-val" id="cert-date" style="color:var(--green)">----</span><div class="cs-lbl">完成日期</div></div>
      </div>
      <div class="cert-levels" id="cert-levels"></div>
      <div class="cert-divider"></div>
      <div class="cert-footer" id="cert-footer"></div>
    </div>
    <button class="cert-play-again" onclick="playAgain()">🔄 再来一次</button>
  </div>
</div>

<div class="lv-overlay" id="lv-overlay">
  <div class="lvo-emoji" id="lvo-emoji">🎉</div>
  <div class="lvo-eq" id="lvo-eq" style="display:none"></div>
  <div class="lvo-title" id="lvo-title">完成！</div>
  <div class="lvo-sub" id="lvo-sub"></div>
  <div class="lvo-card" id="lvo-card" style="display:none"></div>
  <button class="lvo-btn" id="lvo-btn" onclick="overlayNext()">继续 →</button>
</div>

<script>
// ══════════════════════════════════════════
// GLOBAL STATE
// ══════════════════════════════════════════
let G = {
  currentLevel: 1, // 1,2,3
  clearedLevels: [], // [1,2,3]
  score: 0,
  gameStartTime: null,
  timerInterval: null,
};

// ══════════════════════════════════════════
// CANVAS BG
// ══════════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let bgP = [];
const ATOM_COLORS = {H:'#f87171',O:'#38bdf8',C:'#4ade80',N:'#c084fc',Na:'#fb923c',Cl:'#22d3ee',Ca:'#f472b6',Fe:'#a78bfa',S:'#facc15',Al:'#94a3b8'};
function aC(s){return ATOM_COLORS[s]||'#888';}
function initBg(){
  canvas.width=innerWidth;canvas.height=innerHeight;bgP=[];
  const syms=Object.keys(ATOM_COLORS);
  for(let i=0;i<22;i++){
    const s=syms[Math.floor(Math.random()*syms.length)];
    bgP.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      r:9+Math.random()*13,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,
      s,color:aC(s),alpha:.04+Math.random()*.055,rot:Math.random()*Math.PI*2,vrot:(Math.random()-.5)*.003});
  }
}
function animBg(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of bgP){
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;
    if(p.x<-20)p.x=canvas.width+20;if(p.x>canvas.width+20)p.x=-20;
    if(p.y<-20)p.y=canvas.height+20;if(p.y>canvas.height+20)p.y=-20;
    ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fillStyle=p.color+'22';ctx.fill();
    ctx.strokeStyle=p.color+'44';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=p.color;ctx.font=`bold ${p.r*.85}px 'Fredoka One',cursive`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.s,0,1);ctx.restore();
  }
  requestAnimationFrame(animBg);
}
window.addEventListener('resize',initBg);

function startTimer(){
  G.gameStartTime=Date.now();
  G.timerInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-G.gameStartTime)/1000);
    const m=Math.floor(s/60), ss=s%60;
    document.getElementById('t-timer').textContent=`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  },500);
}
function stopTimer(){clearInterval(G.timerInterval);}
function elapsedStr(){
  const s=Math.floor((Date.now()-G.gameStartTime)/1000);
  const m=Math.floor(s/60),ss=s%60;
  return `${m}分${String(ss).padStart(2,'0')}秒`;
}
function elapsedSecs(){return Math.floor((Date.now()-G.gameStartTime)/1000);}

const LV_META=[
  {n:1,icon:'⚡',name:'化合价',desc:'拖动原子合成化合物，掌握化合价规律'},
  {n:2,icon:'⚖️',name:'相对分子质量',desc:'计算分子质量，理解原子量加法'},
  {n:3,icon:'🔥',name:'化学方程式配平',desc:'拖入正确分子，触发真实反应动画'},
];
function renderHome(){
  const c=document.getElementById('home-levels');
  c.innerHTML=LV_META.map(lv=>{
    const done=G.clearedLevels.includes(lv.n);
    const locked=lv.n>1&&!G.clearedLevels.includes(lv.n-1);
    const badge=done?`<span class="lv-badge done-badge">✓ 已通关</span>`:locked?`<span class="lv-badge lock-badge">🔒 未解锁</span>`:`<span class="lv-badge go-badge">▶ 挑战</span>`;
    return `<div class="lv-card lv${lv.n}${locked?' locked-card':''}" onclick="homeClickLevel(${lv.n})">
      <div class="lv-icon">${lv.icon}</div>
      <div class="lv-info"><div class="lv-num">第${['','一','二','三'][lv.n]}关</div><div class="lv-name">${lv.name}</div><div class="lv-desc">${lv.desc}</div></div>
      ${badge}</div>`;
  }).join('');
}
function homeClickLevel(n){
  if(n>1&&!G.clearedLevels.includes(n-1)){showToast('🔒 请先完成上一关！');return;}
  G.currentLevel=n;
  startGame();
}
function startGame(){
  // If starting fresh (no timer yet)
  if(!G.gameStartTime) startTimer();
  renderLvDots();
  showScreen('game-wrap');
  loadLevel(G.currentLevel);
}

function renderLvDots(){
  document.getElementById('lv-dots-bar').innerHTML=LV_META.map(lv=>{
    const done=G.clearedLevels.includes(lv.n);
    const active=lv.n===G.currentLevel;
    const cls=done?'done':active?'active':'locked';
    return `<div class="ldot ${cls}">${done?'✓':lv.n}</div>`;
  }).join('');
}

function onLevelCleared(lvNum){
  if(!G.clearedLevels.includes(lvNum)) G.clearedLevels.push(lvNum);
  if(lvNum===3){
    // all done — stop timer, show name dialog
    stopTimer();
    setTimeout(()=>showNameDialog(),600);
    return;
  }
  // show transition
  const next=lvNum+1;
  const t=document.getElementById('lvl-transition');
  document.getElementById('lt-emoji').textContent=['','🎉','⭐','🏆'][lvNum];
  document.getElementById('lt-title').textContent=`第${['','一','二','三'][lvNum]}关通过！`;
  document.getElementById('lt-sub').textContent=`进入第${['','一','二','三'][next]}关：${LV_META[next-1].name}`;
  document.getElementById('lt-next').textContent=`进入第${['','一','二','三'][next]}关 →`;
  t.classList.add('show');
}
function proceedToNext(){
  document.getElementById('lvl-transition').classList.remove('show');
  G.currentLevel++;
  loadLevel(G.currentLevel);
}

const L1_MOLECULES=[
  {formula:'H₂O',name:'水',atoms:{H:2,O:1},explain:'<strong>H₂O（水）</strong><br>H化合价+1，O化合价-2。<br>2×(+1)+(-2)=0 ✓',poolAtoms:['H','H','H','O','O','N']},
  {formula:'NaCl',name:'氯化钠（食盐）',atoms:{Na:1,Cl:1},explain:'<strong>NaCl（氯化钠）</strong><br>Na化合价+1，Cl化合价-1。<br>(+1)+(-1)=0 ✓',poolAtoms:['Na','Na','Cl','Cl','H','O']},
  {formula:'CO₂',name:'二氧化碳',atoms:{C:1,O:2},explain:'<strong>CO₂（二氧化碳）</strong><br>C化合价+4，O化合价-2。<br>(+4)+2×(-2)=0 ✓',poolAtoms:['C','C','O','O','O','H']},
  {formula:'NH₃',name:'氨气',atoms:{N:1,H:3},explain:'<strong>NH₃（氨气）</strong><br>N化合价-3，H化合价+1。<br>(-3)+3×(+1)=0 ✓',poolAtoms:['N','N','H','H','H','O']},
  {formula:'CaCl₂',name:'氯化钙',atoms:{Ca:1,Cl:2},explain:'<strong>CaCl₂（氯化钙）</strong><br>Ca化合价+2，Cl化合价-1。<br>(+2)+2×(-1)=0 ✓',poolAtoms:['Ca','Ca','Cl','Cl','Cl','Na']},
];
const L1_ATOM_INFO={
  H:{label:'H',valence:'+1',color:'ac-H'},O:{label:'O',valence:'-2',color:'ac-O'},
  N:{label:'N',valence:'-3',color:'ac-N'},C:{label:'C',valence:'+4',color:'ac-C'},
  Na:{label:'Na',valence:'+1',color:'ac-Na'},Cl:{label:'Cl',valence:'-1',color:'ac-Cl'},
  Ca:{label:'Ca',valence:'+2',color:'ac-Ca'},S:{label:'S',valence:'+6',color:'ac-S'},
};
// ── L1 MOLECULE STRUCTURE BUILDERS ──
// Returns an SVG element showing the molecule structure with colored atom circles + bond lines
const L1_STRUCT_COLOR={H:'#f87171',O:'#38bdf8',N:'#c084fc',C:'#4ade80',Na:'#fb923c',Cl:'#22d3ee',Ca:'#f472b6'};
function l1MakeSVG(formula){
  // Each struct defined as: atoms [{sym,x,y}], bonds [{x1,y1,x2,y2,type}]
  // type: 's'=single, 'd'=double, 'ion'=dashed ionic
  const defs={
    'H₂O':{w:110,h:72,
      atoms:[{sym:'O',x:55,y:36},{sym:'H',x:16,y:12},{sym:'H',x:94,y:12}],
      bonds:[{x1:45,y1:30,x2:22,y2:18,type:'s'},{x1:65,y1:30,x2:88,y2:18,type:'s'}]},
    'NaCl':{w:110,h:50,
      atoms:[{sym:'Na',x:28,y:25},{sym:'Cl',x:82,y:25}],
      bonds:[{x1:44,y1:25,x2:64,y2:25,type:'ion'}]},
    'CO₂':{w:140,h:50,
      atoms:[{sym:'O',x:20,y:25},{sym:'C',x:70,y:25},{sym:'O',x:120,y:25}],
      bonds:[{x1:38,y1:25,x2:53,y2:25,type:'d'},{x1:87,y1:25,x2:102,y2:25,type:'d'}]},
    'NH₃':{w:110,h:88,
      atoms:[{sym:'N',x:55,y:30},{sym:'H',x:16,y:72},{sym:'H',x:55,y:78},{sym:'H',x:94,y:72}],
      bonds:[{x1:47,y1:42,x2:22,y2:66,type:'s'},{x1:55,y1:44,x2:55,y2:68,type:'s'},{x1:63,y1:42,x2:88,y2:66,type:'s'}]},
    'CaCl₂':{w:150,h:50,
      atoms:[{sym:'Ca',x:75,y:25},{sym:'Cl',x:20,y:25},{sym:'Cl',x:130,y:25}],
      bonds:[{x1:36,y1:25,x2:57,y2:25,type:'ion'},{x1:93,y1:25,x2:114,y2:25,type:'ion'}]},
  };
  const def=defs[formula];if(!def)return null;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',def.w);svg.setAttribute('height',def.h);
  svg.setAttribute('viewBox',`0 0 ${def.w} ${def.h}`);
  svg.style.cssText='overflow:visible;filter:drop-shadow(0 0 8px rgba(167,139,250,.3));';

  // Draw bonds first (behind atoms)
  def.bonds.forEach(b=>{
    if(b.type==='d'){
      // double bond: two parallel lines
      [-2.5,2.5].forEach(offset=>{
        const dx=b.x2-b.x1, dy=b.y2-b.y1, len=Math.sqrt(dx*dx+dy*dy);
        const nx=-dy/len*offset, ny=dx/len*offset;
        const ln=document.createElementNS(ns,'line');
        ln.setAttribute('x1',b.x1+nx);ln.setAttribute('y1',b.y1+ny);
        ln.setAttribute('x2',b.x2+nx);ln.setAttribute('y2',b.y2+ny);
        ln.setAttribute('stroke','rgba(255,255,255,.55)');ln.setAttribute('stroke-width','2');ln.setAttribute('stroke-linecap','round');
        svg.appendChild(ln);
      });
    } else if(b.type==='ion'){
      // dashed ionic bond
      const ln=document.createElementNS(ns,'line');
      ln.setAttribute('x1',b.x1);ln.setAttribute('y1',b.y1);ln.setAttribute('x2',b.x2);ln.setAttribute('y2',b.y2);
      ln.setAttribute('stroke','rgba(255,255,255,.4)');ln.setAttribute('stroke-width','2');
      ln.setAttribute('stroke-dasharray','4 3');ln.setAttribute('stroke-linecap','round');
      svg.appendChild(ln);
    } else {
      // single bond
      const ln=document.createElementNS(ns,'line');
      ln.setAttribute('x1',b.x1);ln.setAttribute('y1',b.y1);ln.setAttribute('x2',b.x2);ln.setAttribute('y2',b.y2);
      ln.setAttribute('stroke','rgba(255,255,255,.55)');ln.setAttribute('stroke-width','2.5');ln.setAttribute('stroke-linecap','round');
      svg.appendChild(ln);
    }
  });

  // Draw atoms
  const RSYM={H:13,O:16,N:16,C:15,Na:18,Cl:16,Ca:19};
  def.atoms.forEach(a=>{
    const col=L1_STRUCT_COLOR[a.sym]||'#aaa';
    const r=RSYM[a.sym]||14;
    // glow circle
    const glow=document.createElementNS(ns,'circle');
    glow.setAttribute('cx',a.x);glow.setAttribute('cy',a.y);glow.setAttribute('r',r+5);
    glow.setAttribute('fill',col);glow.setAttribute('opacity','0.18');
    svg.appendChild(glow);
    // main circle
    const circ=document.createElementNS(ns,'circle');
    circ.setAttribute('cx',a.x);circ.setAttribute('cy',a.y);circ.setAttribute('r',r);
    circ.setAttribute('fill',`url(#grad-${a.sym})`);
    circ.setAttribute('stroke',col);circ.setAttribute('stroke-width','1.8');
    svg.appendChild(circ);
    // radial gradient for 3D look
    const defs=svg.querySelector('defs')||svg.insertBefore(document.createElementNS(ns,'defs'),svg.firstChild);
    const gid=`grad-${a.sym}`;
    if(!svg.querySelector(`#${gid}`)){
      const grad=document.createElementNS(ns,'radialGradient');
      grad.setAttribute('id',gid);grad.setAttribute('cx','35%');grad.setAttribute('cy','30%');grad.setAttribute('r','65%');
      const s1=document.createElementNS(ns,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',col);s1.setAttribute('stop-opacity','0.95');
      const s2=document.createElementNS(ns,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',col);s2.setAttribute('stop-opacity','0.55');
      grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);
    }
    // symbol text
    const txt=document.createElementNS(ns,'text');
    txt.setAttribute('x',a.x);txt.setAttribute('y',a.y+1);
    txt.setAttribute('text-anchor','middle');txt.setAttribute('dominant-baseline','middle');
    txt.setAttribute('font-family',"'Fredoka One',cursive");txt.setAttribute('font-size',a.sym.length>1?'9':'11');
    txt.setAttribute('font-weight','900');txt.setAttribute('fill','#fff');
    txt.textContent=a.sym;
    svg.appendChild(txt);
  });
  return svg;
}

function initL1(root){
  l1={idx:0,dropped:[],dragging:null,touchGhost:null,touchSym:null};
  root.innerHTML=`
  <div id="l1-wrap">
    <div id="l1-mission">
      <div class="l1-mlabel">第一关 · 化合价 · 合成分子</div>
      <div id="l1-mol"></div><div id="l1-hint"></div>
    </div>
    <div id="l1-main">
      <div id="l1-pool-left"><div class="pool-title" style="font-size:.6rem;writing-mode:vertical-rl;color:var(--muted);opacity:.4;position:absolute;left:4px;top:50%;transform:translateY(-50%)">原子库</div></div>
      <div id="l1-reaction-zone">
        <canvas id="l1-float-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:2"></canvas>
        <div id="l1-drop-target" ondragover="l1DragOver(event)" ondragleave="l1DragLeave(event)" ondrop="l1Drop(event)">
          <div id="l1-drop-atoms"></div>
          <div class="l1-drop-label">反应圈</div>
          <button id="l1-synth-btn" onclick="l1Synth()">⚗️ 合成！</button>
          <button id="l1-clear-btn" onclick="l1Clear()">✕ 清空</button>
        </div>
      </div>
      <div id="l1-pool-right"><div class="pool-title" style="font-size:.6rem;writing-mode:vertical-rl;color:var(--muted);opacity:.4;position:absolute;right:4px;top:50%;transform:translateY(-50%)">原子库</div></div>
    </div>
  </div>`;
  l1RenderQ();
}

function l1RenderQ(){
  const mol=L1_MOLECULES[l1.idx];
  l1.dropped=[];
  document.getElementById('l1-mol').textContent=mol.formula+' · '+mol.name;
  const needed=Object.entries(mol.atoms).map(([s,n])=>`${n}个${s}`).join(' + ');
  document.getElementById('l1-hint').textContent=`需要：${needed}，拖入反应圈后点击合成！`;
  l1BuildPools(mol);
  l1RenderDrop();
  // hide feedback
  const fb=document.getElementById('l1-feedback');
  if(fb){fb.className='';fb.style.display='none';}
}

function l1BuildPools(mol){
  const left=mol.poolAtoms.slice(0,3),right=mol.poolAtoms.slice(3,6);
  const makeHtml=sym=>{
    const info=L1_ATOM_INFO[sym];
    return `<div class="l1-atom-chip ${info.color}" draggable="true" data-sym="${sym}" style="touch-action:none;">
      <span class="l1-sym">${info.label}</span><span class="l1-val">${info.valence}</span></div>`;
  };
  document.getElementById('l1-pool-left').innerHTML=left.map(makeHtml).join('');
  document.getElementById('l1-pool-right').innerHTML=right.map(makeHtml).join('');
  document.querySelectorAll('#l1-pool-left .l1-atom-chip, #l1-pool-right .l1-atom-chip').forEach(el=>{
    el.addEventListener('dragstart',e=>{l1.dragging=el;el.style.opacity='.3';e.dataTransfer.setData('sym',el.dataset.sym);});
    el.addEventListener('dragend',()=>{if(l1.dragging){l1.dragging.style.opacity='1';l1.dragging=null;}});
    el.addEventListener('touchstart',l1TouchStart,{passive:false});
  });
}

function l1RenderDrop(){
  document.getElementById('l1-drop-atoms').innerHTML=l1.dropped.map((sym,i)=>{
    const info=L1_ATOM_INFO[sym];
    return `<div class="l1-atom-chip placed ${info.color}" onclick="l1RemoveAtom(${i})"><span class="l1-placed-sym">${info.label}</span></div>`;
  }).join('');
}

function l1DragOver(e){e.preventDefault();document.getElementById('l1-drop-target').classList.add('drag-over');}
function l1DragLeave(e){document.getElementById('l1-drop-target').classList.remove('drag-over');}
function l1Drop(e){e.preventDefault();document.getElementById('l1-drop-target').classList.remove('drag-over');const s=e.dataTransfer.getData('sym');if(s)l1AddAtom(s);}

function l1AddAtom(sym){
  const mol=L1_MOLECULES[l1.idx],need=mol.atoms[sym]||0,have=l1.dropped.filter(s=>s===sym).length;
  if(have>=need){showToast(`⚠️ ${sym} 已经够了！`);return;}
  l1.dropped.push(sym);l1RenderDrop();
}
function l1RemoveAtom(idx){l1.dropped.splice(idx,1);l1RenderDrop();}
function l1Clear(){l1.dropped=[];l1RenderDrop();}

function l1Synth(){
  const mol=L1_MOLECULES[l1.idx];
  const counts={};l1.dropped.forEach(s=>counts[s]=(counts[s]||0)+1);
  const needed=mol.atoms,nk=Object.keys(needed),dk=Object.keys(counts);
  const correct=nk.length===dk.length&&nk.every(k=>counts[k]===needed[k]);

  if(correct){
    addScore(20);
    // ── Synthesis animation ──
    const dropTarget=document.getElementById('l1-drop-target');
    const targetRect=dropTarget.getBoundingClientRect();
    const cx=targetRect.left+targetRect.width/2;
    const cy=targetRect.top+targetRect.height/2;

    // 1. Fly each placed atom chip toward center
    const placedEls=document.querySelectorAll('#l1-drop-atoms .l1-atom-chip');
    placedEls.forEach(el=>{
      const r=el.getBoundingClientRect();
      const ax=r.left+r.width/2, ay=r.top+r.height/2;
      const clone=document.createElement('div');
      clone.className=el.className;
      clone.innerHTML=el.innerHTML;
      clone.style.cssText=`position:fixed;left:${ax-22}px;top:${ay-22}px;width:44px;height:44px;z-index:600;pointer-events:none;animation:l1AtomConverge .55s cubic-bezier(.4,0,.6,1) forwards;--tx:${cx-ax}px;--ty:${cy-ay}px;`;
      document.body.appendChild(clone);
      setTimeout(()=>clone.remove(),650);
    });
    // hide original atoms
    document.getElementById('l1-drop-atoms').style.opacity='0';

    // 2. Flash ring glow on drop target
    dropTarget.style.transition='box-shadow .15s, border-color .15s';
    dropTarget.style.borderColor='rgba(167,139,250,.9)';
    dropTarget.style.boxShadow='0 0 60px rgba(167,139,250,.5), inset 0 0 40px rgba(167,139,250,.15)';
    setTimeout(()=>{dropTarget.style.borderColor='';dropTarget.style.boxShadow='';},700);

    // 3. Burst molecule card with structure at center
    setTimeout(()=>{
      const card=document.createElement('div');
      card.style.cssText=`
        position:fixed;left:${cx}px;top:${cy}px;z-index:610;pointer-events:none;
        background:linear-gradient(135deg,rgba(20,14,40,.96),rgba(30,18,55,.96));
        border:2px solid rgba(167,139,250,.75);border-radius:24px;
        padding:18px 26px 14px;text-align:center;
        box-shadow:0 0 50px rgba(167,139,250,.55), 0 0 100px rgba(167,139,250,.18);
        backdrop-filter:blur(12px);
        animation:l1MolBurst .55s cubic-bezier(.34,1.56,.64,1) forwards;
        transform-origin:center;min-width:160px;
      `;
      // Header
      const header=document.createElement('div');
      header.style.cssText='font-family:"Fredoka One",cursive;font-size:1.5rem;color:#fff;text-shadow:0 0 16px rgba(167,139,250,.9);line-height:1;margin-bottom:4px;';
      header.textContent=mol.formula;
      card.appendChild(header);
      const subname=document.createElement('div');
      subname.style.cssText='font-size:.72rem;color:rgba(180,160,255,.75);margin-bottom:12px;font-weight:700;letter-spacing:.04em;';
      subname.textContent=mol.name;
      card.appendChild(subname);
      // Structure SVG
      const svg=l1MakeSVG(mol.formula);
      if(svg){
        const wrap=document.createElement('div');
        wrap.style.cssText='display:flex;justify-content:center;align-items:center;margin-bottom:10px;';
        wrap.appendChild(svg);
        card.appendChild(wrap);
      }
      // Bond type hint
      const bondHint=document.createElement('div');
      const isIonic=mol.formula==='NaCl'||mol.formula==='CaCl₂';
      bondHint.style.cssText='font-size:.62rem;color:rgba(255,255,255,.38);letter-spacing:.06em;';
      bondHint.textContent=isIonic?'— 离子键 —':'— 共价键 —';
      card.appendChild(bondHint);

      document.body.appendChild(card);
      spawnParticles(true);

      setTimeout(()=>{
        card.style.animation='l1MolFade .4s ease forwards';
        setTimeout(()=>{
          card.remove();
          document.getElementById('l1-drop-atoms').style.opacity='1';
          const isLast=l1.idx>=L1_MOLECULES.length-1;
          showLvOverlay({
            emoji:'🎉',
            title:`${mol.formula} 合成成功！`,
            sub:`+20分！化合价代数和为零，分子稳定！`,
            card:`<strong>📖 解析：</strong><br><br>${mol.explain}`,
            btnText:isLast?'完成第一关！':'下一个分子 →',
            gold:isLast,
            onNext:()=>l1Next(),
          });
        },450);
      },1100);
    },400);

  } else {
    spawnParticles(false);
    const hints=[];
    nk.forEach(k=>{const h=counts[k]||0;if(h<needed[k])hints.push(`还需要 ${needed[k]-h} 个 ${k}`);else if(h>needed[k])hints.push(`${k} 多了 ${h-needed[k]} 个`);});
    dk.filter(k=>!needed[k]).forEach(k=>hints.push(`${k} 不属于这个分子`));
    showToast('❌ ' + (hints[0] || '配比不对，再试试！'));
  }
}

function l1Next(){
  l1.idx++;
  if(l1.idx>=L1_MOLECULES.length){
    onLevelCleared(1);
  } else {
    l1RenderQ();
  }
}

// L1 touch drag
function l1TouchStart(e){
  e.preventDefault();
  const el=e.currentTarget,sym=el.dataset.sym,t=e.touches[0];
  l1.touchSym=sym;
  const g=document.getElementById('drag-ghost');
  const info=L1_ATOM_INFO[sym];
  g.style.cssText=`display:flex;width:52px;height:52px;background:${getComputedStyle(document.documentElement).getPropertyValue('--bg')};border-radius:50%;left:${t.clientX}px;top:${t.clientY}px;`;
  g.className='';
  g.innerHTML=`<div class="l1-atom-chip ${info.color}" style="width:48px;height:48px;pointer-events:none"><span class="l1-sym">${info.label}</span></div>`;
  el.style.opacity='.2';
  const tm=(e2)=>{e2.preventDefault();const t2=e2.touches[0];g.style.left=t2.clientX+'px';g.style.top=t2.clientY+'px';
    const dt=document.getElementById('l1-drop-target'),r=dt.getBoundingClientRect();
    dt.classList.toggle('drag-over',t2.clientX>r.left&&t2.clientX<r.right&&t2.clientY>r.top&&t2.clientY<r.bottom);};
  const te=(e2)=>{document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',te);
    g.style.display='none';el.style.opacity='1';
    document.getElementById('l1-drop-target').classList.remove('drag-over');
    const t2=e2.changedTouches[0],dt=document.getElementById('l1-drop-target'),r=dt.getBoundingClientRect();
    if(t2.clientX>r.left&&t2.clientX<r.right&&t2.clientY>r.top&&t2.clientY<r.bottom) l1AddAtom(sym);};
  document.addEventListener('touchmove',tm,{passive:false});
  document.addEventListener('touchend',te);
}

function initL2(root){
  l2={qi:0,counts:{}};
  root.innerHTML=`
  <div id="l2-wrap">

    <div id="l2-counters"></div>

function l2RenderQ(){

  q.atoms.forEach(a=>l2.counts[a.s]=0);
  l2BuildVisual(q);l2BuildCounters(q);l2BuildSteppers(q);l2Update(q);
}

function l2BuildVisual(q){
  const c=document.getElementById('l2-mol-visual');c.innerHTML='';
  // 题目标题：分子名 + 化学式
  const title=document.createElement('div');
  title.style.cssText='width:100%;text-align:center;padding:4px 0 6px;flex-shrink:0;';
  title.innerHTML=`<div style="font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:3px;">计算相对分子质量</div><div style="font-family:'Fredoka One',cursive;font-size:1.55rem;color:#fff;text-shadow:0 0 18px rgba(167,139,250,.5);letter-spacing:.03em;">${q.formula}</div><div style="font-size:.8rem;color:var(--muted);margin-top:1px;">${q.name}</div>`;
  c.appendChild(title);
  // 分隔线
  const sep=document.createElement('div');
  sep.style.cssText='width:80%;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.3),transparent);flex-shrink:0;margin:2px 0 6px;';
  c.appendChild(sep);
  // 原子球行
  const row=document.createElement('div');
  row.style.cssText='display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0;';
  q.atoms.forEach((a,i)=>{
    if(i>0){const b=document.createElement('div');b.className='l2-bond';row.appendChild(b);}
    const d=L2_ATOMS[a.s],sz=a.n>2?66:74;
    const ball=document.createElement('div');ball.className='l2-mol-ball';ball.id=`l2b-${a.s}`;
    ball.style.cssText=`width:${sz}px;height:${sz}px;background:radial-gradient(circle at 35% 32%,${d.color}bb,${d.color});box-shadow:0 4px 20px ${d.color}55;color:${a.s==='S'||a.s==='O'||a.s==='Cl'||a.s==='Na'?'#000':'#fff'}`;
    const sub=a.n>1?`<span class="l2-cnt">×${a.n}</span>`:'';
    ball.innerHTML=`<span class="l2-sym">${a.s}</span>${sub}<span class="l2-tag" style="color:${d.color}">${d.mass}×${a.n}=<span id="l2bt-${a.s}">0</span></span>`;
    row.appendChild(ball);
  });
  c.appendChild(row);
}

function l2BuildCounters(q){
  const c=document.getElementById('l2-counters');c.innerHTML='';
  q.atoms.forEach(a=>{
    const d=L2_ATOMS[a.s];
    const div=document.createElement('div');div.className='l2-counter';div.id=`l2c-${a.s}`;
    div.innerHTML=`<div class="l2-csym" style="background:radial-gradient(circle at 35% 32%,${d.color}bb,${d.color});color:${a.s==='S'||a.s==='O'||a.s==='Cl'||a.s==='Na'?'#000':'#fff'}">${a.s}</div>
      <div><div class="l2-cformula">每个 ${a.s} = <strong style="color:${d.color}">${d.mass}</strong></div>
      <div class="l2-crun under" id="l2cr-${a.s}">0 × ${d.mass} = 0</div></div>`;
    c.appendChild(div);
  });
}

function l2BuildSteppers(q){
  const c=document.getElementById('l2-steppers');c.innerHTML='';
  q.atoms.forEach(a=>{
    const d=L2_ATOMS[a.s];
    const div=document.createElement('div');div.className='l2-stepper';
    div.innerHTML=`<div class="l2-slbl" style="color:${d.color}">${a.s} 数量</div>
      <button class="l2-sbtn" onclick="l2Change('${a.s}',-1)">−</button>
      <div class="l2-sval" id="l2sv-${a.s}">0</div>
      <button class="l2-sbtn plus" onclick="l2Change('${a.s}',+1)">+</button>`;
    c.appendChild(div);
  });
}

function l2Change(sym,d){
  l2.counts[sym]=Math.max(0,(l2.counts[sym]||0)+d);
  document.getElementById(`l2sv-${sym}`).textContent=l2.counts[sym];
  l2Update(L2_QS[l2.qi]);
}

function l2Update(q){
  let total=0;const parts=[];
  q.atoms.forEach(a=>{
    const d=L2_ATOMS[a.s],have=l2.counts[a.s]||0,contrib=have*d.mass;
    total+=contrib;
    const bt=document.getElementById(`l2bt-${a.s}`);if(bt)bt.textContent=contrib;
    const card=document.getElementById(`l2c-${a.s}`),run=document.getElementById(`l2cr-${a.s}`);
    if(card&&run){
      card.className='l2-counter '+(have===a.n?'s-ok':have>a.n?'s-over':'s-under');
      run.className='l2-crun '+(have===a.n?'ok':have>a.n?'over':'under');
      run.textContent=`${have} × ${d.mass} = ${contrib}`;
    }
    const cls=have===0?'zero':have===a.n?'ok':have>a.n?'over':'under';
    parts.push(`<span style="color:${cls==='ok'?'var(--green)':cls==='over'?'var(--red)':cls==='zero'?'var(--muted)':'var(--gold)'}">${have}×${d.mass}</span>`);
  });
  const allOk=q.atoms.every(a=>(l2.counts[a.s]||0)===a.n);
  const anyOver=q.atoms.some(a=>(l2.counts[a.s]||0)>a.n);
  const tnum=document.getElementById('l2-tnum'),bar=document.getElementById('l2-total');
  document.getElementById('l2-teq').innerHTML=parts.join('<span style="color:var(--muted);padding:0 4px">+</span>')+'<span style="color:var(--muted);padding:0 5px">=</span>';
  tnum.textContent=total;
  tnum.className='l2-tnum '+(total===0?'zero':allOk?'ok':'');
  bar.className=allOk?'bar-ok':anyOver?'bar-over':'';
}

function l2Confirm(){
  const q=L2_QS[l2.qi];
  const allOk=q.atoms.every(a=>(l2.counts[a.s]||0)===a.n);
  if(allOk){
    addScore(20);spawnParticles(true);
    const breakdown=q.atoms.map(a=>`${a.n}×${a.s}(${L2_ATOMS[a.s].mass}) = ${a.n*L2_ATOMS[a.s].mass}`).join('<br>')+`<br><strong style="color:var(--green)">M(${q.formula}) = ${q.answer}</strong>`;
    showLvOverlay({emoji:'🎉',title:`${q.formula} 计算正确！`,sub:`+20分！相对分子质量 = ${q.answer}`,
      card:`<strong>${q.name} 的质量计算：</strong><br><br>${breakdown}`,
      btnText:l2.qi<L2_QS.length-1?'下一题 →':'完成第二关！',
      gold:l2.qi>=L2_QS.length-1,
      onNext:()=>{l2.qi++;if(l2.qi>=L2_QS.length){onLevelCleared(2);}else{l2.counts={};l2RenderQ();}}});
  } else {
    spawnParticles(false);
    const btn=document.getElementById('l2-confirm');
    btn.classList.add('shake');setTimeout(()=>btn.classList.remove('shake'),420);
    showToast('❌ 数量不对，再检查一下！');
  }
}

const L3_STRUCT={

  O2: (sc)=>{const w=document.createElement('div');w.className='l3-ms';w.style.transform=`scale(${sc})`;w.appendChild(l3AtomEl('O'));w.appendChild(l3BondEl('d'));w.appendChild(l3AtomEl('O'));return w;},
  H2O: (sc)=>{const w=document.createElement('div');w.className='l3-h2o-s';w.style.transform=`scale(${sc})`;w.innerHTML='<div class="l3-a-h ahl">H</div><div class="bhl"></div><div class="l3-a-o">O</div><div class="bhr"></div><div class="l3-a-h ahr">H</div>';return w;},
  HCl: (sc)=>{const w=document.createElement('div');w.className='l3-ms';w.style.transform=`scale(${sc})`;w.appendChild(l3AtomEl('H'));w.appendChild(l3BondEl());w.appendChild(l3AtomEl('Cl'));return w;},
  CO: (sc)=>{const w=document.createElement('div');w.className='l3-ms';w.style.transform=`scale(${sc})`;w.appendChild(l3AtomEl('C'));w.appendChild(l3BondEl('t'));w.appendChild(l3AtomEl('O'));return w;},
  Fe: (sc)=>{const w=document.createElement('div');w.style.transform=`scale(${sc})`;w.appendChild(l3AtomEl('Fe'));return w;},
  Al: (sc)=>{const w=document.createElement('div');w.style.transform=`scale(${sc})`;w.appendChild(l3AtomEl('Al'));return w;},
  C: (sc)=>{const w=document.createElement('div');w.style.transform=`scale(${sc})`;w.appendChild(l3AtomEl('C'));return w;},
  Fe2O3:(sc)=>{
    // W-shape: 3 O across the top, 2 Fe below
    // O-l(5,2) O-m(32,2) O-r(59,2) Fe-l(18,20) Fe-r(46,20)
    const w=document.createElement('div');
    w.style.cssText=`position:relative;width:70px;height:42px;flex-shrink:0;transform:scale(${sc});`;
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','70');svg.setAttribute('height','42');
    svg.style.cssText='position:absolute;inset:0;z-index:0;pointer-events:none;';
    // bonds: O-l→Fe-l, O-m→Fe-l, O-m→Fe-r, O-r→Fe-r
    const lines=[[15,12,28,22],[42,12,28,22],[42,12,56,22],[69,12,56,22]];
    lines.forEach(([x1,y1,x2,y2])=>{
      const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
      ln.setAttribute('stroke','rgba(255,255,255,.4)');ln.setAttribute('stroke-width','1.8');ln.setAttribute('stroke-linecap','round');
      svg.appendChild(ln);
    });
    w.appendChild(svg);
    const atoms=[
      {el:l3AtomEl('O'), left:'5px', top:'0'},
      {el:l3AtomEl('O'), left:'25px', top:'0'},
      {el:l3AtomEl('O'), left:'49px', top:'0'},
      {el:l3AtomEl('Fe'),left:'8px', top:'20px'},
      {el:l3AtomEl('Fe'),left:'36px', top:'20px'},
    ];
    atoms.forEach(({el,left,top})=>{el.style.cssText=`position:absolute;left:${left};top:${top};`;w.appendChild(el);});
    return w;
  },
  FeCl2:(sc)=>{const w=document.createElement('div');w.className='l3-ms';w.style.transform=`scale(${sc})`;w.appendChild(l3AtomEl('Cl'));w.appendChild(l3BondEl());w.appendChild(l3AtomEl('Fe'));w.appendChild(l3BondEl());w.appendChild(l3AtomEl('Cl'));return w;},
  Al2O3:(sc)=>{const w=document.createElement('div');w.className='l3-ms';w.style.transform=`scale(${sc})`;[l3AtomEl('O'),l3BondEl('d'),l3AtomEl('Al'),l3BondEl('d'),l3AtomEl('O'),l3BondEl('d'),l3AtomEl('Al'),l3BondEl('d'),l3AtomEl('O')].forEach(c=>w.appendChild(c));return w;},
};
function l3MkStruct(key,sc=1){return L3_STRUCT[key]?L3_STRUCT[key](sc):null;}
