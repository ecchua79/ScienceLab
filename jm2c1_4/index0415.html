//峇株吧辖蔡逸众制作
const isHollow = (li,r,c) => li===2 && r>=3 && r<=5 && c>=3 && c<=5;

// ── Pure helpers ──────────────────────────────────────────────────────────────
const shuffleArray = arr => {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};

//华仁中学蔡逸众制作
const checkStraight = (p1,p2,board) => {
  if(p1.r===p2.r){const[lo,hi]=[Math.min(p1.c,p2.c),Math.max(p1.c,p2.c)];for(let c=lo+1;c<hi;c++)if(board[p1.r][c])return false;return true;}
  if(p1.c===p2.c){const[lo,hi]=[Math.min(p1.r,p2.r),Math.max(p1.r,p2.r)];for(let r=lo+1;r<hi;r++)if(board[r][p1.c])return false;return true;}
  return false;
};

const findPath = (p1,p2,board,N) => {
  if(p1.r===p2.r||p1.c===p2.c) if(checkStraight(p1,p2,board)) return[p1,p2];
  for(const cn of [{r:p1.r,c:p2.c},{r:p2.r,c:p1.c}])
    if(!board[cn.r][cn.c]&&checkStraight(p1,cn,board)&&checkStraight(cn,p2,board)) return[p1,cn,p2];
  for(let c=0;c<N;c++){
    if(c===p1.c)continue; const c1={r:p1.r,c}; if(board[c1.r][c1.c])continue;
    if(checkStraight(p1,c1,board)){const c2={r:p2.r,c};if(!board[c2.r][c2.c]&&checkStraight(c1,c2,board)&&checkStraight(c2,p2,board))return[p1,c1,c2,p2];}
  }
  for(let r=0;r<N;r++){
    if(r===p1.r)continue; const c1={r,c:p1.c}; if(board[c1.r][c1.c])continue;
    if(checkStraight(p1,c1,board)){const c2={r,c:p2.c};if(!board[c2.r][c2.c]&&checkStraight(c1,c2,board)&&checkStraight(c2,p2,board))return[p1,c1,c2,p2];}
  }
  return null;
};

//Made by ecchua79
const findHintPair = (board,bs,N,li=0) => {
  const tiles=[];
  for(let r=1;r<=bs;r++) for(let c=1;c<=bs;c++) if(board[r][c]&&!isHollow(li,r,c)) tiles.push({r,c,tile:board[r][c]});
  for(let i=0;i<tiles.length;i++) for(let j=i+1;j<tiles.length;j++){
    const{tile:t1,r:r1,c:c1}=tiles[i],{tile:t2,r:r2,c:c2}=tiles[j];
    if(t1.id===t2.id&&t1.type!==t2.type) if(findPath({r:r1,c:c1},{r:r2,c:c2},board,N)) return[{r:r1,c:c1},{r:r2,c:c2}];
  }
  return null;
};

const hasMoves=(board,bs,N,li=0)=>!!findHintPair(board,bs,N,li);

//峇株吧辖华仁中学蔡逸众制作
const doShuffle=(board,bs,N,li=0)=>{
  let b=board.map(r=>[...r]);
  for(let a=0;a<15;a++){
    const tiles=[],pos=[];
    for(let r=1;r<=bs;r++) for(let c=1;c<=bs;c++) if(b[r][c]&&!isHollow(li,r,c)){tiles.push(b[r][c]);pos.push({r,c});}
    const sh=shuffleArray(tiles); pos.forEach((p,i)=>{b[p.r][p.c]=sh[i];});
    if(hasMoves(b,bs,N,li)) break;
  }
  return b;
};

const buildBoard=(cfg,li=0)=>{
  const bs=cfg.boardSize,N=bs+2;
  let tiles=[];
  ELEMENTS_DATA.slice(0,cfg.pairs).forEach(el=>{
    tiles.push({id:el.id,type:'name', value:el.name, category:el.category});
    tiles.push({id:el.id,type:'symbol',value:el.symbol,category:el.category});
  });
  tiles=shuffleArray(tiles);
  let board=Array(N).fill(null).map(()=>Array(N).fill(null));
  let idx=0;
  for(let r=1;r<=bs;r++) for(let c=1;c<=bs;c++){if(isHollow(li,r,c))continue; board[r][c]=tiles[idx++];}
  if(!hasMoves(board,bs,N,li)) board=doShuffle(board,bs,N,li);
  return board;
};

                <div style={{fontSize:'10px',color:'rgba(148,163,184,.45)'}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:'14px',background:'rgba(255,255,255,.025)',borderRadius:'10px',
            border:'1px solid rgba(255,255,255,.06)',overflow:'hidden'}}>
            <div style={{fontSize:'10px',color:'rgba(148,163,184,.4)',padding:'8px 12px 6px',
              letterSpacing:'2px',textAlign:'center',borderBottom:'1px solid rgba(255,255,255,.05)'}}>— 技能使用明细 —</div>
            {[
              {icon:'💡',label:'提示',count:skillsUsed.hint,color:'#fbbf24'},
              {icon:'🔀',label:'洗牌',count:skillsUsed.shuffle,color:'#00f5ff'},
              {icon:'↔️',label:'换位（第三关）',count:skillsUsed.swap,color:'#a855f7'},
            ].map((sk,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'8px 14px',borderBottom:i<2?'1px solid rgba(255,255,255,.04)':'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{fontSize:'14px'}}>{sk.icon}</span>
                  <span style={{fontSize:'12px',color:'rgba(203,213,225,.65)'}}>{sk.label}</span>
                </div>
                <div style={{background:`${sk.color}18`,border:`1px solid ${sk.color}44`,
                  borderRadius:'8px',padding:'2px 10px',fontSize:'13px',fontWeight:800,
                  color:sk.count>0?sk.color:'rgba(148,163,184,.35)',fontFamily:'monospace',
                  minWidth:'36px',textAlign:'center'}}>{sk.count} 次</div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:'18px'}}>
            <div style={{fontSize:'10px',color:'rgba(148,163,184,.4)',marginBottom:'7px',letterSpacing:'2px',textAlign:'center'}}>— 关卡详情 —</div>
            {LEVELS.map((lv,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'7px 11px',marginBottom:'4px',background:'rgba(255,255,255,.03)',
                borderRadius:'8px',border:'1px solid rgba(255,255,255,.05)'}}>
                <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                  <span style={{fontSize:'14px'}}>{lv.emoji}</span>
                  <span style={{fontSize:'11.5px',color:'rgba(203,213,225,.65)'}}>第{['一','二','三'][i]}关 · {lv.label}</span>
                </div>
                <div style={{display:'flex',gap:'3px'}}>
                  {[0,1,2].map(s=><span key={s} style={{color:'#f59e0b',fontSize:'12px'}}>★</span>)}
                </div>
              </div>
            ))}
          </div>
          <div style={{textAlign:'center',marginBottom:'18px',padding:'10px',background:'rgba(255,255,255,.025)',
            borderRadius:'8px',border:'1px solid rgba(255,255,255,.05)'}}>
            <div style={{fontSize:'10px',color:'rgba(148,163,184,.4)',marginBottom:'3px'}}>颁发时间</div>
            <div style={{fontSize:'13px',color:'rgba(148,163,184,.7)',fontFamily:'monospace',letterSpacing:'0.5px'}}>{completedAt}</div>
          </div>
          <div style={{height:'1px',background:'linear-gradient(90deg,transparent,rgba(0,245,255,.25),transparent)',marginBottom:'18px'}}/>
          <button onClick={onRestart} style={{width:'100%',background:'linear-gradient(135deg,#0891b2,#7c3aed)',
            border:'none',borderRadius:'12px',padding:'13px',color:'#fff',fontWeight:800,fontSize:'14px',
            cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',
            boxShadow:'0 0 20px rgba(0,245,255,.22)'}}>
            <RotateCcw size={16}/> 再次挑战
          </button>
        </div>
        <div style={{height:'4px',background:'linear-gradient(90deg,#10b981,#7c3aed,#00f5ff,#f59e0b,#10b981)',
          backgroundSize:'300%',animation:'shimmerCert 4s linear infinite reverse'}}/>
      </div>
    </div>
  </div>
);

//峇株吧辖华仁中学蔡逸众制作
// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const[phase,setPhase]=useState('playing');
  const[levelIdx,setLevelIdx]=useState(0);
  const[board,setBoard]=useState(null);
  const[selected,setSelected]=useState(null);
  const[path,setPath]=useState([]);
  const[matches,setMatches]=useState(0);
  const[isAnimating,setIsAnimating]=useState(false);
  const[disappearing,setDisappearing]=useState([]);
  const[timeElapsed,setTimeElapsed]=useState(0);
  const[hintCount,setHintCount]=useState(0);
  const[shuffleCount,setShuffleCount]=useState(0);
  const[swapCount,setSwapCount]=useState(0);
  const[swapMode,setSwapMode]=useState(false);
  const[swapFirst,setSwapFirst]=useState(null);
  const[hintTiles,setHintTiles]=useState([]);
  const[notice,setNotice]=useState('');
  const[particles,setParticles]=useState([]);
  const pid=useRef(0);
  const[totalTime,setTotalTime]=useState(0);
  const[totalSkills,setTotalSkills]=useState({hint:0,shuffle:0,swap:0});
  const skillsThisLevel=useRef({hint:0,shuffle:0,swap:0});
  const[playerName,setPlayerName]=useState('');
  const[completedAt,setCompletedAt]=useState('');

  const cfg=LEVELS[levelIdx];
  const bs=cfg.boardSize, N=bs+2;

  const notify=useCallback((msg)=>{setNotice(msg);setTimeout(()=>setNotice(''),2200);},[]);

  const spawnParticles=useCallback((pos1,pos2)=>{
    const step=100/bs;
    const colors=['#00f5ff','#7c3aed','#10b981','#f59e0b','#ec4899'];
    const np=[];
    [pos1,pos2].forEach(({r,c})=>{
      const x=(c-1)*step+step/2,y=(r-1)*step+step/2;
      for(let i=0;i<8;i++){
        const angle=(Math.PI*2*i)/8;
        np.push({id:pid.current++,x,y,
          dx:Math.cos(angle)*(15+Math.random()*25),dy:Math.sin(angle)*(15+Math.random()*25),
          size:4+Math.random()*4,color:colors[Math.floor(Math.random()*colors.length)],
          dur:500+Math.random()*300,delay:Math.random()*100});
      }
    });
    setParticles(prev=>[...prev,...np]);
    setTimeout(()=>{const ids=np.map(p=>p.id);setParticles(prev=>prev.filter(p=>!ids.includes(p.id)));},1000);
  },[bs]);

  const initLevel=useCallback((idx,carryTime=0)=>{
    const c=LEVELS[idx];
    setBoard(buildBoard(c,idx));
    setSelected(null);setPath([]);setMatches(0);setTimeElapsed(carryTime);
    setHintCount(c.hint);setShuffleCount(c.shuffle);setSwapCount(c.swap);
    setSwapMode(false);setSwapFirst(null);setHintTiles([]);
    setNotice('');setParticles([]);setDisappearing([]);
    skillsThisLevel.current={hint:0,shuffle:0,swap:0};
  },[]);

  const resetAll=useCallback(()=>{
    setLevelIdx(0);setTotalTime(0);setTotalSkills({hint:0,shuffle:0,swap:0});setPhase('playing');
    initLevel(0,0);
  },[initLevel]);

  useEffect(()=>{resetAll();},[]);

  useEffect(()=>{
    if(phase!=='playing')return;
    const t=setInterval(()=>setTimeElapsed(p=>p+1),1000);
    return()=>clearInterval(t);
  },[phase]);

  const handleShuffle=useCallback((isAuto=false)=>{
    if(!board)return; if(!isAuto&&shuffleCount<=0)return;
    setBoard(doShuffle(board,bs,N,levelIdx));
    setSelected(null);setHintTiles([]);setSwapMode(false);setSwapFirst(null);
    if(isAuto)notify('💥 死锁！已自动洗牌');
    else{setShuffleCount(p=>p-1);skillsThisLevel.current.shuffle++;}
  },[board,bs,N,levelIdx,shuffleCount,notify]);

  const handleHint=()=>{
    if(hintCount<=0||isAnimating||!board)return;
    const pair=findHintPair(board,bs,N,levelIdx);
    if(pair){setHintTiles(pair);setHintCount(p=>p-1);skillsThisLevel.current.hint++;setTimeout(()=>setHintTiles([]),3000);}
    else notify('⚠️ 暂无可消除的对');
  };

  const handleSwapToggle=()=>{
    if(swapCount<=0)return;
    const entering=!swapMode; setSwapMode(entering);
    if(!entering)setSwapFirst(null); else notify('🔀 点选两张牌互换位置');
  };

  const handleLevelComplete=useCallback(()=>{
    setTotalSkills(prev=>({hint:prev.hint+skillsThisLevel.current.hint,
      shuffle:prev.shuffle+skillsThisLevel.current.shuffle,swap:prev.swap+skillsThisLevel.current.swap}));
    setTotalTime(timeElapsed); setPhase('levelComplete');
  },[timeElapsed]);

  const handleNext=()=>{
    if(levelIdx<2){const next=levelIdx+1;setLevelIdx(next);setPhase('playing');initLevel(next,timeElapsed);}
    else{setCompletedAt(fmtDT(new Date()));setPhase('nameInput');}
  };

  const handleTileClick=(r,c)=>{
    if(isAnimating||!board[r][c])return;
    if(swapMode){
      if(!swapFirst){setSwapFirst({r,c});return;}
      if(swapFirst.r===r&&swapFirst.c===c){setSwapFirst(null);return;}
      const nb=board.map(row=>[...row]);
      const tmp=nb[swapFirst.r][swapFirst.c];nb[swapFirst.r][swapFirst.c]=nb[r][c];nb[r][c]=tmp;
      setBoard(nb);setSwapCount(p=>p-1);skillsThisLevel.current.swap++;
      setSwapMode(false);setSwapFirst(null);notify('✅ 换位成功！');return;
    }
    if(!selected){setSelected({r,c});return;}
    if(selected.r===r&&selected.c===c){setSelected(null);return;}
    const t1=board[selected.r][selected.c],t2=board[r][c];
    if(t1.id===t2.id&&t1.type!==t2.type){
      const vp=findPath(selected,{r,c},board,N);
      if(vp){
        setPath(vp);setIsAnimating(true);setHintTiles([]);
        const s={...selected},e={r,c};
        setTimeout(()=>{
          spawnParticles({r:s.r,c:s.c},{r:e.r,c:e.c});
          setDisappearing([`${s.r}-${s.c}`,`${e.r}-${e.c}`]);
          setTimeout(()=>{
            const nb=board.map(row=>[...row]);nb[s.r][s.c]=null;nb[e.r][e.c]=null;
            setBoard(nb);setPath([]);setSelected(null);setDisappearing([]);
            setMatches(prev=>{
              const nm=prev+1;
              if(nm===cfg.pairs){setTimeout(()=>handleLevelComplete(),300);}
              else if(!hasMoves(nb,bs,N,levelIdx)){setTimeout(()=>handleShuffle(true),400);}
              return nm;
            });
            setIsAnimating(false);
          },250);
        },500);
        return;
      }
    }
    setSelected({r,c});
  };

  const step=100/bs;
  const svgPt=p=>({x:(p.c-1)*step+step/2,y:(p.r-1)*step+step/2});
  const progress=matches/cfg.pairs;

  if(phase==='certificate')
    return <Certificate name={playerName} totalTime={totalTime} skillsUsed={totalSkills} completedAt={completedAt} onRestart={resetAll}/>;

  return(
    <div style={{background:'linear-gradient(135deg,#0a0e1a 0%,#0d1530 50%,#0a0e1a 100%)',minHeight:'100vh',
      display:'flex',flexDirection:'column',alignItems:'center',padding:'12px 8px',userSelect:'none'}}>

      {/* Header */}
      <div style={{width:'100%',maxWidth:'640px',marginBottom:'10px'}}>
        <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(0,245,255,.14)',
          backdropFilter:'blur(10px)',borderRadius:'14px',padding:'10px 14px',
          display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}}>
          <div style={{display:'flex',gap:'5px'}}>
            {LEVELS.map((lv,i)=>(
              <div key={i} style={{padding:'5px 9px',borderRadius:'8px',display:'flex',alignItems:'center',gap:'4px',
                background:i===levelIdx?'rgba(0,245,255,.12)':i<levelIdx?'rgba(16,185,129,.1)':'rgba(255,255,255,.04)',
                border:`1px solid ${i===levelIdx?'rgba(0,245,255,.4)':i<levelIdx?'rgba(16,185,129,.3)':'rgba(255,255,255,.06)'}`}}>
                <span style={{fontSize:'12px'}}>{i<levelIdx?'✅':i===levelIdx?lv.emoji:'○'}</span>
                <span style={{fontSize:'11px',fontWeight:700,color:i===levelIdx?'#00f5ff':i<levelIdx?'#10b981':'rgba(148,163,184,.35)'}}>
                  第{['一','二','三'][i]}关</span>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:'14px',alignItems:'center'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'10px',color:'rgba(148,163,184,.5)',display:'flex',alignItems:'center',gap:'3px',marginBottom:'2px',justifyContent:'center'}}>
                <Trophy size={9}/>进度</div>
              <div style={{fontSize:'15px',fontWeight:800,color:'#10b981',fontVariantNumeric:'tabular-nums'}}>
                {matches}<span style={{color:'rgba(148,163,184,.35)',fontSize:'10px'}}>/{cfg.pairs}</span></div>
            </div>
            <div style={{width:'1px',height:'26px',background:'rgba(148,163,184,.1)'}}/>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'10px',color:'rgba(148,163,184,.5)',display:'flex',alignItems:'center',gap:'3px',marginBottom:'2px',justifyContent:'center'}}>
                <Clock size={9}/>耗时</div>
              <div style={{fontSize:'15px',fontWeight:800,color:'#00f5ff',fontFamily:'monospace'}}>{fmt(timeElapsed)}</div>
            </div>
          </div>
        </div>
        <div style={{height:'3px',background:'rgba(255,255,255,.05)',borderRadius:'99px',marginTop:'5px',overflow:'hidden'}}>
          <div style={{height:'100%',width:`${progress*100}%`,background:'linear-gradient(90deg,#00f5ff,#7c3aed)',
            borderRadius:'99px',transition:'width .5s cubic-bezier(.4,0,.2,1)',boxShadow:'0 0 8px #00f5ff88'}}/>
        </div>
      </div>

      {/* Board */}
      <div style={{width:'100%',maxWidth:'640px',position:'relative',flex:'1 0 auto'}}>
        <div style={{background:'rgba(255,255,255,.025)',
          border:`1px solid ${swapMode?'rgba(168,85,247,.45)':'rgba(0,245,255,.1)'}`,
          borderRadius:'14px',padding:'5px',position:'relative',overflow:'hidden',
          aspectRatio:'1',transition:'border-color .3s',
          backgroundImage:'linear-gradient(rgba(0,245,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.025) 1px,transparent 1px)',
          backgroundSize:`${step}% ${step}%`}}>

          <Particles particles={particles}/>

          {/* Grid */}
          {board&&(
            <div style={{display:'grid',width:'100%',height:'100%',position:'relative',zIndex:10,
              gridTemplateColumns:`0 repeat(${bs},1fr) 0`,gridTemplateRows:`0 repeat(${bs},1fr) 0`}}>
              {board.map((row,r)=>row.map((cell,c)=>{
                if(r===0||r===N-1||c===0||c===N-1)
                  return <div key={`${r}-${c}`} style={{width:0,height:0,overflow:'hidden'}}/>;

                const isSel =selected&&selected.r===r&&selected.c===c;
                const isHint =hintTiles.some(p=>p.r===r&&p.c===c);
                const isDis =disappearing.includes(`${r}-${c}`);
                const isSwSel=swapFirst&&swapFirst.r===r&&swapFirst.c===c;
                const hollow =isHollow(levelIdx,r,c);
                const cat =cell?(CAT_COLORS[cell.category]||'#64748b'):'#64748b';
                const symFS =bs===4?'clamp(22px,5.5vw,48px)':bs===6?'clamp(16px,3.8vw,36px)':'clamp(17px,3.6vw,34px)';
                const nameFS =bs===4?'clamp(19px,4.5vw,40px)':bs===6?'clamp(14px,3.2vw,30px)':'clamp(15px,3.0vw,28px)';
                const numFS =bs===4?'clamp(11px,1.5vw,15px)':bs===6?'clamp(9px,1.2vw,13px)':'clamp(10px,1.3vw,14px)';
                const dotSz =bs===4?8:bs===6?7:8;

                if(hollow) return(
                  <div key={`${r}-${c}`} style={{padding:'3px'}}>
                    <div style={{width:'100%',height:'100%',borderRadius:'8px',background:'rgba(0,245,255,.04)',
                      border:'1px dashed rgba(0,245,255,.18)',display:'flex',alignItems:'center',
                      justifyContent:'center',position:'relative',overflow:'hidden'}}>
                      <div style={{width:'30%',height:'30%',borderRadius:'50%',background:'rgba(0,245,255,.12)',
                        boxShadow:'0 0 12px 4px rgba(0,245,255,.12)'}}/>
                    </div>
                  </div>
                );

                const btnClass=[
                  'tile-btn',
                  isDis?'td':'',
                  isSwSel&&!isDis?'tw':'',
                  isSel&&!isDis&&!swapMode?'ts':'',
                  isHint&&!isSel&&!isDis?'th':'',
                ].filter(Boolean).join(' ');

                return(
                  <div key={`${r}-${c}`} style={{padding:'3px'}}>
                    {cell?(
                      <button onClick={()=>handleTileClick(r,c)} className={btnClass}
                        style={{position:'relative',width:'100%',height:'100%',borderRadius:'8px',
                          display:'flex',alignItems:'center',justifyContent:'center',
                          background:cell.type==='name'
                            ?'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,41,59,.93))'
                            :'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,27,75,.93))',
                          border:isSwSel?'2px solid #a855f7':isSel?'1.5px solid #00f5ff':isHint?'1.5px solid #fbbf24':swapMode?'1px solid rgba(168,85,247,.2)':'1px solid rgba(255,255,255,.07)',
                          cursor:'pointer'}}>
                        <div style={{position:'absolute',top:'4px',right:'4px',width:dotSz+'px',height:dotSz+'px',
                          borderRadius:'50%',background:cat,opacity:.9,boxShadow:`0 0 ${dotSz}px ${cat}88`}}/>
                        <div style={{position:'absolute',top:'3px',left:'4px',fontSize:numFS,
                          color:'rgba(148,163,184,.48)',fontFamily:'monospace',fontWeight:700,lineHeight:1}}>
                          {cell.id}</div>
                        <span style={{fontWeight:800,lineHeight:1,
                          fontSize:cell.type==='symbol'?symFS:nameFS,
                          color:cell.type==='symbol'?'#00f5ff':'#e2e8f0',
                          fontFamily:cell.type==='symbol'?'monospace':'inherit',
                          textShadow:cell.type==='symbol'?'0 0 10px #00f5ff88':'none'}}>
                          {cell.value}
                        </span>
                      </button>
                    ):(
                      <div style={{width:'100%',height:'100%'}}/>
                    )}
                  </div>
                );
              }))}
            </div>
          )}

          {/* SVG lines */}
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:20}}>
            <defs>
              <filter id="gl">
                <feGaussianBlur stdDeviation="3" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            {path.length>1&&(()=>{
              const pts=path.map(p=>{const{x,y}=svgPt(p);return`${x}% ${y}%`;}).join(' ');
              return(
                <>
                  <polyline points={pts} fill="none" stroke="rgba(0,245,255,.3)" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round"/>
                  <polyline points={pts} fill="none" stroke="#00f5ff" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" filter="url(#gl)"/>
                  {path.map((p,i)=>{const{x,y}=svgPt(p);return<circle key={i} cx={`${x}%`} cy={`${y}%`} r="6" fill="#00f5ff" filter="url(#gl)"/>;} )}
                </>
              );
            })()}
          </svg>

          {notice&&<div style={{position:'absolute',top:'10px',left:'50%',zIndex:60,
            background:'rgba(0,0,0,.88)',border:'1px solid rgba(0,245,255,.3)',borderRadius:'99px',
            padding:'5px 16px',fontSize:'12px',fontWeight:700,color:'#00f5ff',whiteSpace:'nowrap',
            backdropFilter:'blur(8px)',animation:'slideDown .3s ease-out'}}>{notice}</div>}

          {phase==='levelComplete'&&<LevelComplete level={cfg.level} time={timeElapsed} onNext={handleNext}/>}
        </div>

        {swapMode&&(
          <div style={{marginTop:'7px',padding:'7px 12px',background:'rgba(168,85,247,.1)',
            border:'1px solid rgba(168,85,247,.3)',borderRadius:'10px',fontSize:'12px',color:'#c084fc',
            fontWeight:600,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
            <span>🔀 {swapFirst?'再点第二张牌完成换位':'请点选第一张牌'}</span>
            <button onClick={()=>{setSwapMode(false);setSwapFirst(null);}}
              style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',
                borderRadius:'6px',padding:'2px 8px',color:'#c084fc',cursor:'pointer',fontSize:'11px',fontWeight:700}}>取消</button>
          </div>
        )}
      </div>

      {/* Controls */}
      <div style={{width:'100%',maxWidth:'640px',marginTop:'10px',display:'flex',justifyContent:'center',flexWrap:'wrap',gap:'7px'}}>
        <SkillBtn icon={<Lightbulb size={14}/>} label="提示" count={hintCount} color="#fbbf24"
          disabled={isAnimating||hintCount<=0||phase!=='playing'} onClick={handleHint}/>
        <SkillBtn icon={<Shuffle size={14}/>} label="洗牌" count={shuffleCount} color="#00f5ff"
          disabled={isAnimating||shuffleCount<=0||phase!=='playing'} onClick={()=>handleShuffle(false)}/>
        {cfg.level===3&&<SkillBtn icon={<ArrowLeftRight size={14}/>} label="换位" count={swapCount} color="#a855f7"
          active={swapMode} disabled={swapCount<=0||phase!=='playing'} onClick={handleSwapToggle}/>}
        <SkillBtn icon={<RotateCcw size={14}/>} label="重新开始" count={null} color="#f87171"
          disabled={false} onClick={resetAll}/>
      </div>

      {phase==='nameInput'&&<NameInput onConfirm={n=>{setPlayerName(n);setPhase('certificate');}}/>}
    </div>
  );
}

//峇株吧辖蔡逸众制作
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
