<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>人体保卫战：神经与激素的觉醒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%,90%{transform:translate3d(-1px,0,0)}
            20%,80%{transform:translate3d(2px,0,0)}
            30%,50%,70%{transform:translate3d(-4px,0,0)}
            40%,60%{transform:translate3d(4px,0,0)}
        }
        .heart{transition:all 0.3s}
        .lost-heart{filter:grayscale(100%);opacity:0.3}
        #canvas-container{display:flex;justify-content:center;overflow-x:auto;padding:10px}
        canvas{max-width:100%;height:auto;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
        /* 配对题 */
        .match-item{cursor:pointer;transition:all 0.2s;user-select:none;-webkit-user-select:none}
        .match-item.selected{border-color:#3b82f6!important;background-color:#eff6ff!important;transform:scale(1.02)}
        .match-item.matched-correct{border-color:#22c55e!important;background-color:#dcfce7!important;cursor:default;opacity:0.8}
        .match-item.matched-wrong{border-color:#ef4444!important;background-color:#fee2e2!important}
        /* 归类题 */
        .classify-item{cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;transition:transform 0.15s,box-shadow 0.15s}
        .classify-item.dragging{opacity:0.5;transform:scale(0.95)}
        .drop-zone{transition:background-color 0.2s,border-color 0.2s;min-height:70px}
        .drop-zone.drag-over{background-color:#dbeafe;border-color:#3b82f6}
        /* 排顺序 */
        .order-item{cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;transition:transform 0.15s,box-shadow 0.15s}
        .order-item.dragging{opacity:0.4}
        .order-item.drag-over-top{border-top:3px solid #3b82f6}
        /* 填图 */
        .hotspot{cursor:pointer;transition:fill 0.2s}
        .label-option{cursor:pointer;transition:all 0.2s}
        .label-option.used{opacity:0.4;cursor:default;pointer-events:none}
        .label-option.selected{border-color:#3b82f6;background:#eff6ff;transform:scale(1.05)}
        /* touch ghost */
        #touch-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:0.9;transform:scale(1.05)}
        .q-type-badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:8px}
    </style>
</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4">

<div id="touch-ghost" class="hidden bg-white border-2 border-blue-400 rounded-xl px-4 py-2 shadow-xl text-sm font-bold text-slate-700"></div>

<div id="app" class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden relative">

    <!-- 开始界面 -->
    <div id="start-screen" class="p-8 text-center fade-in">
        <div class="text-6xl mb-4">🛡️</div>
        <h1 class="text-3xl font-bold text-green-600 mb-2">人体保卫战</h1>
        <h2 class="text-xl font-semibold text-slate-600 mb-4">神经与激素的觉醒</h2>
        <div class="bg-slate-50 rounded-xl p-4 mb-6 text-left text-sm text-slate-600 space-y-1 border border-slate-200">
            <p class="font-bold text-slate-700 mb-2">🎮 本关卡题型包括：</p>
            <p>🔵 <span class="font-semibold">选择题</span> — 快速判断，抢时间得分</p>
            <p>🟣 <span class="font-semibold">配对题</span> — 将激素/结构与功能正确连线</p>
            <p>🟠 <span class="font-semibold">归类题</span> — 拖拽事件到正确系统</p>
            <p>🟡 <span class="font-semibold">排顺序</span> — 拖拽排出正确流程</p>
            <p>🟢 <span class="font-semibold">填图题</span> — 点击标注脑部/反射弧结构</p>
            <p class="text-xs text-slate-400 mt-2">共16题 · 错3次游戏结束 · 答得越快分越高</p>
        </div>
        <button onclick="startGame()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg transform transition active:scale-95">
            🚀 开始紧急调度
        </button>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" class="hidden fade-in flex flex-col">
        <div class="bg-slate-800 text-white p-4 flex justify-between items-center">
            <div class="flex space-x-1" id="hearts">
                <span class="text-2xl heart">❤️</span>
                <span class="text-2xl heart">❤️</span>
                <span class="text-2xl heart">❤️</span>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-400">SCORE</div>
                <div id="score" class="text-2xl font-bold text-yellow-400">0</div>
            </div>
        </div>
        <div class="px-6 py-2 flex justify-between text-sm font-bold text-slate-500 bg-slate-100">
            <span id="level-display">Level 1</span>
            <span id="combo-display" class="text-orange-500 hidden">🔥 Combo x1</span>
            <span id="question-counter">1/16</span>
        </div>
        <div class="w-full bg-gray-200 h-2">
            <div id="time-bar" class="bg-green-500 h-2 transition-all duration-100 ease-linear" style="width:100%"></div>
        </div>
        <div class="p-5 overflow-y-auto" style="max-height:68vh">
            <div id="q-type-badge-container"></div>
            <p id="question-text" class="text-lg font-bold mb-4 text-slate-700 leading-relaxed"></p>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- 解释弹窗 -->
    <div id="explanation-modal" class="hidden absolute inset-0 bg-white z-10 flex flex-col items-center justify-center p-6 fade-in text-center" style="background:rgba(255,255,255,0.97);backdrop-filter:blur(4px)">
        <div id="feedback-icon" class="text-6xl mb-4">✅</div>
        <h2 id="feedback-title" class="text-2xl font-bold mb-2"></h2>
        <p id="explanation-text" class="text-slate-600 mb-6 bg-slate-100 p-4 rounded-lg text-left text-sm leading-relaxed w-full"></p>
        <button id="next-btn" onclick="nextQuestion()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transform transition active:scale-95">
            继续挑战 ➡️
        </button>
    </div>

    <!-- 结算界面 -->
    <div id="end-screen" class="hidden p-8 text-center fade-in">
        <div id="end-icon" class="text-6xl mb-4">🏆</div>
        <h1 id="end-title" class="text-3xl font-bold text-green-600 mb-2">调度完成！</h1>
        <div class="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-200">
            <p class="text-slate-500 text-sm">最终得分</p>
            <p id="final-score" class="text-4xl font-bold text-yellow-500">0</p>
            <p id="time-taken" class="text-slate-400 text-xs mt-2">耗时: 0秒</p>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">请输入你的名字以领取证书：</label>
            <input type="text" id="player-name" placeholder="例如：李小明" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none text-center">
        </div>
        <button onclick="generateAndShowCertificate()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg mb-3">🎓 生成荣誉证书</button>
        <button onclick="location.reload()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-4 rounded-xl">🔁 重新挑战</button>
    </div>

    <!-- 证书界面 -->
    <div id="certificate-screen" class="hidden p-4 text-center fade-in">
        <h2 class="text-2xl font-bold text-slate-700 mb-4">恭喜你！</h2>
        <div id="canvas-container" class="mb-4"><canvas id="certCanvas"></canvas></div>
        <p class="text-sm text-slate-500 mb-4">↑ 长按图片保存，或点击下方按钮下载 ↑</p>
        <a id="downloadCertBtn" class="block w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg mb-3">⬇️ 下载证书</a>
        <button onclick="location.reload()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-4 rounded-xl">返回首页</button>
    </div>

</div><!-- /app -->

<script>
// ============================================================
// 题目数据库 16题，5种题型
// ============================================================
const questions = [
    // ── 选择题 ──

    },

    {

        explanation:"出汗→水分流失→血液变浓→神经系统让你感到【口渴】去喝水；同时内分泌系统让肾脏【减少排尿】把水留住，两者协同维持水盐平衡。"

        labels:["感受器","传入神经","神经中枢","传出神经","效应器"],
        hotspotMap:{"rf-receptor":"感受器","rf-afferent":"传入神经","rf-center":"神经中枢","rf-efferent":"传出神经","rf-effector":"效应器"},
        explanation:"反射弧五要素：感受器接收刺激→传入神经上行→神经中枢整合→传出神经下行→效应器做出应答。任何一环受损，反射无法完成。"

// ============================================================
// 游戏状态
// ============================================================
let currentQuestionIndex=0, hp=3, score=0, combo=0;
let startTime=0, gameStartTime=0, timeInterval;
const TIME_LIMIT=22;
let timeLeft=TIME_LIMIT;

let matchState={}, classifyState={}, orderState={}, diagramState={};

const app=document.getElementById('app');
const startScreen=document.getElementById('start-screen');
const gameScreen=document.getElementById('game-screen');
const endScreen=document.getElementById('end-screen');
const certScreen=document.getElementById('certificate-screen');
const qText=document.getElementById('question-text');
const optionsContainer=document.getElementById('options-container');
const scoreDisplay=document.getElementById('score');
const timeBar=document.getElementById('time-bar');
const levelDisplay=document.getElementById('level-display');
const comboDisplay=document.getElementById('combo-display');
const qCounter=document.getElementById('question-counter');
const hearts=document.querySelectorAll('.heart');
const explModal=document.getElementById('explanation-modal');
const feedbackIcon=document.getElementById('feedback-icon');
const feedbackTitle=document.getElementById('feedback-title');
const explanationText=document.getElementById('explanation-text');
const nextBtn=document.getElementById('next-btn');
const badgeCon=document.getElementById('q-type-badge-container');

// ============================================================
// 游戏流程
// ============================================================
function startGame(){
    startScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    gameStartTime=Date.now();
    loadQuestion();
}

function loadQuestion(){
    clearInterval(timeInterval);
    timeLeft=TIME_LIMIT;
    updateTimeBar();
    const q=questions[currentQuestionIndex];
    levelDisplay.textContent=q.level;
    qCounter.textContent=`${currentQuestionIndex+1}/${questions.length}`;
    qText.textContent=q.text;
    badgeCon.innerHTML=`<span class="q-type-badge ${q.badgeColor}">${q.badgeLabel}</span>`;
    optionsContainer.innerHTML='';

    if(q.type==='mc')        renderMC(q);
    else if(q.type==='match')    renderMatch(q);
    else if(q.type==='classify') renderClassify(q);
    else if(q.type==='order')    renderOrder(q);
    else if(q.type==='diagram')  renderDiagram(q);

    startTime=Date.now();
    timeInterval=setInterval(()=>{
        timeLeft-=0.1;
        updateTimeBar();
        if(timeLeft<=0){clearInterval(timeInterval);handleTimeOut();}
    },100);
}

function updateTimeBar(){
    const pct=(timeLeft/TIME_LIMIT)*100;
    timeBar.style.width=pct+'%';
    if(pct<30) timeBar.className="h-2 transition-all duration-100 ease-linear bg-red-500";
    else if(pct<60) timeBar.className="h-2 transition-all duration-100 ease-linear bg-yellow-500";
    else timeBar.className="h-2 transition-all duration-100 ease-linear bg-green-500";
}

function handleTimeOut(){
    combo=0; comboDisplay.classList.add('hidden');
    const q=questions[currentQuestionIndex];
    if(q.type==='mc'){
        const btns=optionsContainer.querySelectorAll('button');
        if(btns[q.correctIndex]) btns[q.correctIndex].classList.add('bg-green-200','border-green-400');
    }
    loseHeart();
    showFeedback(false,"⏰ 超时啦！反应太慢，危机加重！\n\n"+q.explanation,0);
}

function loseHeart(){
    hp--;
    if(hp>=0){
        hearts[2-hp].classList.add('lost-heart');
        app.classList.add('shake');
        setTimeout(()=>app.classList.remove('shake'),400);
    }
}

function givePoints(isCorrect){
    if(!isCorrect) return 0;
    combo++;
    let timeBonus=Math.max(0,Math.floor(timeLeft*80));
    let comboBonus=combo>1?combo*50:0;
    let pts=800+timeBonus+comboBonus;
    score+=pts;
    scoreDisplay.textContent=score;
    if(combo>1){
        comboDisplay.textContent=`🔥 Combo x${combo}`;
        comboDisplay.classList.remove('hidden');
        comboDisplay.classList.add('shake');
        setTimeout(()=>comboDisplay.classList.remove('shake'),400);
    }
    return pts;
}

function showFeedback(isCorrect,explanation,points){
    clearInterval(timeInterval);
    setTimeout(()=>{
        explModal.classList.remove('hidden');
        if(isCorrect){
            feedbackIcon.textContent="✅";
            feedbackTitle.textContent="干得漂亮！";
            feedbackTitle.className="text-2xl font-bold mb-2 text-green-600";
            explanationText.innerHTML=`得分: <span class="font-bold text-yellow-500">+${points}</span><br><br>${explanation.replace(/\n/g,'<br>')}`;
        } else {
            feedbackIcon.textContent="❌";
            feedbackTitle.textContent="调度失误！";
            feedbackTitle.className="text-2xl font-bold mb-2 text-red-600";
            explanationText.innerHTML=explanation.replace(/\n/g,'<br>');
        }
        if(hp<=0){
            nextBtn.textContent="查看结算";
            nextBtn.className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg";
        } else if(currentQuestionIndex>=questions.length-1){
            nextBtn.textContent="完成所有任务！查看结算";
            nextBtn.className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg";
        } else {
            nextBtn.textContent="继续挑战 ➡️";
            nextBtn.className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transform transition active:scale-95";
        }
    },500);
}

function nextQuestion(){
    explModal.classList.add('hidden');
    if(hp<=0||currentQuestionIndex>=questions.length-1){endGame();}
    else{currentQuestionIndex++;loadQuestion();}
}

function endGame(){
    gameScreen.classList.add('hidden');
    endScreen.classList.remove('hidden');
    let totalSecs=Math.floor((Date.now()-gameStartTime)/1000);
    document.getElementById('final-score').textContent=score;
    document.getElementById('time-taken').textContent=`总耗时: ${totalSecs} 秒`;
    const endTitle=document.getElementById('end-title');
    const endIcon=document.getElementById('end-icon');
    if(hp<=0){
        endTitle.textContent="急救失败！";
        endTitle.className="text-3xl font-bold text-red-600 mb-2";
        endIcon.textContent="🚑";
    } else {
        endTitle.textContent="完美通关！";
        endIcon.textContent="👑";
    }
}

// ============================================================
// 选择题
// ============================================================
function renderMC(q){
    q.options.forEach((opt,i)=>{
        const btn=document.createElement('button');
        btn.className="w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-green-400 hover:bg-green-50 transition font-medium text-slate-700 active:scale-95 mb-3";
        btn.textContent=opt;
        btn.onclick=()=>{
            Array.from(optionsContainer.children).forEach(b=>b.disabled=true);
            const ok=i===q.correctIndex;
            if(ok){
                btn.classList.add('bg-green-500','text-white','border-green-500');
                const pts=givePoints(true);
                showFeedback(true,q.explanation,pts);
            } else {
                btn.classList.add('bg-red-500','text-white','border-red-500','shake');
                optionsContainer.children[q.correctIndex].classList.add('bg-green-200','border-green-400');
                combo=0; comboDisplay.classList.add('hidden');
                loseHeart();
                showFeedback(false,q.explanation,0);
            }
        };
        optionsContainer.appendChild(btn);
    });
}

// ============================================================
// 配对题
// ============================================================
function renderMatch(q){
    matchState={selected:null,side:null,value:null,matched:{},total:q.pairs.length,done:0,wrongCount:0};
    const container=document.createElement('div');
    container.className="flex gap-3";
    const leftCol=document.createElement('div'); leftCol.className="flex-1 space-y-2";
    const rightCol=document.createElement('div'); rightCol.className="flex-1 space-y-2";

    const rightShuffled=[...q.pairs.map(p=>p.right)].sort(()=>Math.random()-0.5);

    q.pairs.forEach(pair=>{
        const el=document.createElement('div');
        el.className="match-item p-3 rounded-xl border-2 border-slate-200 bg-slate-50 text-sm font-semibold text-slate-700 text-center";
        el.dataset.value=pair.left; el.dataset.side="left";
        el.textContent=pair.left;
        el.onclick=()=>handleMatchClick(el,'left',pair.left,q);
        leftCol.appendChild(el);
    });
    rightShuffled.forEach(val=>{
        const el=document.createElement('div');
        el.className="match-item p-3 rounded-xl border-2 border-slate-200 bg-slate-50 text-sm font-semibold text-slate-700 text-center";
        el.dataset.value=val; el.dataset.side="right";
        el.textContent=val;
        el.onclick=()=>handleMatchClick(el,'right',val,q);
        rightCol.appendChild(el);
    });
    container.appendChild(leftCol);
    container.appendChild(rightCol);
    optionsContainer.appendChild(container);
    const hint=document.createElement('p');
    hint.className="text-xs text-slate-400 text-center mt-3";
    hint.textContent="点击左侧一项，再点击右侧对应项进行配对";
    optionsContainer.appendChild(hint);
}

function handleMatchClick(el,side,value,q){
    if(el.classList.contains('matched-correct')) return;

    if(!matchState.selected){
        matchState.selected=el; matchState.side=side; matchState.value=value;
        el.classList.add('selected');
    } else {
        if(matchState.side===side){
            matchState.selected.classList.remove('selected');
            matchState.selected=el; matchState.side=side; matchState.value=value;
            el.classList.add('selected');
            return;
        }
        const leftVal=side==='right'?matchState.value:value;
        const rightVal=side==='right'?value:matchState.value;
        const leftEl=side==='right'?matchState.selected:el;
        const rightEl=side==='right'?el:matchState.selected;

        const correct=q.pairs.some(p=>p.left===leftVal&&p.right===rightVal);
        matchState.selected.classList.remove('selected');
        el.classList.remove('selected');
        matchState.selected=null; matchState.side=null; matchState.value=null;

        if(correct){
            leftEl.classList.add('matched-correct'); rightEl.classList.add('matched-correct');
            leftEl.style.pointerEvents='none'; rightEl.style.pointerEvents='none';
            matchState.done++;
            if(matchState.done===matchState.total){
                const pts=givePoints(true);
                showFeedback(true,q.explanation,pts);
            }
        } else {
            leftEl.classList.add('matched-wrong'); rightEl.classList.add('matched-wrong');
            setTimeout(()=>{leftEl.classList.remove('matched-wrong');rightEl.classList.remove('matched-wrong');},700);
            matchState.wrongCount=(matchState.wrongCount||0)+1;
            combo=0; comboDisplay.classList.add('hidden');
            loseHeart();
            if(hp<=0) showFeedback(false,q.explanation,0);
        }
    }
}

// 归类题（拖拽 + 触摸 + 点击放置）
// ============================================================
function renderClassify(q){
    classifyState={placements:{},total:q.allItems.length,submitted:false};

    const bank=document.createElement('div');
    bank.className="flex flex-wrap gap-2 mb-4 p-3 bg-slate-100 rounded-xl min-h-12";
    bank.id="classify-bank";

    [...q.allItems].sort(()=>Math.random()-0.5).forEach(item=>{
        bank.appendChild(createClassifyChip(item,q,'bank'));
    });
    optionsContainer.appendChild(bank);

    const zonesRow=document.createElement('div');
    zonesRow.className="flex gap-3";
    q.categories.forEach((cat,ci)=>{
        const zone=document.createElement('div');
        zone.className=`drop-zone flex-1 border-2 ${cat.color} rounded-xl p-2`;
        zone.dataset.catIdx=ci;
        zone.id=`classify-zone-${ci}`;
        zone.innerHTML=`<div class="text-xs font-bold text-center mb-2 text-slate-600">${cat.label}</div>`;
        zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
        zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
        zone.addEventListener('drop',e=>{
            e.preventDefault(); zone.classList.remove('drag-over');
            const item=e.dataTransfer.getData('text/plain');
            if(item) placeClassifyItem(item,ci,q);
        });
        zonesRow.appendChild(zone);
    });
    optionsContainer.appendChild(zonesRow);

    const submitBtn=document.createElement('button');
    submitBtn.className="mt-4 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 rounded-xl";
    submitBtn.textContent="✅ 确认提交";
    submitBtn.id="classify-submit";
    submitBtn.onclick=()=>submitClassify(q);
    optionsContainer.appendChild(submitBtn);
}

function createClassifyChip(item,q,location){
    const el=document.createElement('div');
    el.className="classify-item px-3 py-1.5 bg-white border-2 border-slate-300 rounded-lg text-xs font-semibold text-slate-700 shadow-sm select-none";
    el.textContent=item;
    el.draggable=true;
    el.dataset.item=item;
    el.id=`ci-${item.replace(/[\s（）()]/g,'_')}`;
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',item);el.classList.add('dragging');});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    // tap to pick, then tap zone to place
    el.addEventListener('click',()=>handleClassifyTap(item,q));
    setupTouchDrag(el,item,q,'classify');
    return el;
}

let classifyTapSelected=null;
function handleClassifyTap(item,q){
    // highlight selected chip
    document.querySelectorAll('.classify-item').forEach(e=>{
        e.classList.toggle('selected', e.dataset.item===item && classifyTapSelected!==item);
    });
    classifyTapSelected=(classifyTapSelected===item)?null:item;
    // if a zone is tapped while a chip is selected, handled in zone click below
}

function addZoneTapListeners(q){
    q.categories.forEach((cat,ci)=>{
        const zone=document.getElementById(`classify-zone-${ci}`);
        if(!zone) return;
        zone.addEventListener('click',e=>{
            if(classifyTapSelected && e.target===zone || e.target.classList.contains('drop-zone')){
                placeClassifyItem(classifyTapSelected,ci,q);
                classifyTapSelected=null;
            }
        });
    });
}

function placeClassifyItem(item,catIdx,q){
    const safeId=item.replace(/[\s（）()]/g,'_');
    const existing=document.getElementById(`ci-${safeId}`);
    if(existing) existing.remove();
    // remove from placement tracking if was already placed
    delete classifyState.placements[item];
    classifyState.placements[item]=catIdx;
    const zone=document.getElementById(`classify-zone-${catIdx}`);
    if(!zone) return;
    const chip=createClassifyChip(item,q,'zone');
    zone.appendChild(chip);
    document.querySelectorAll('.classify-item').forEach(e=>e.classList.remove('selected'));
    classifyTapSelected=null;
}

function submitClassify(q){
    if(classifyState.submitted) return;
    const placed=Object.keys(classifyState.placements).length;
    if(placed<q.allItems.length){alert('请先把所有项目都放进类别框里！');return;}
    classifyState.submitted=true;
    document.getElementById('classify-submit').disabled=true;

    let allCorrect=true;
    q.allItems.forEach(item=>{
        const placedCat=classifyState.placements[item];
        const correctCat=q.categories.findIndex(cat=>cat.correctItems.includes(item));
        const chip=document.getElementById(`ci-${item.replace(/[\s（）()]/g,'_')}`);
        if(placedCat===correctCat){
            if(chip){chip.classList.remove('border-slate-300');chip.classList.add('border-green-400','bg-green-50');}
        } else {
            allCorrect=false;
            if(chip){chip.classList.remove('border-slate-300');chip.classList.add('border-red-400','bg-red-50');}
        }
    });

    if(allCorrect){
        const pts=givePoints(true);
        showFeedback(true,q.explanation,pts);
    } else {
        combo=0; comboDisplay.classList.add('hidden');
        loseHeart();
        showFeedback(false,q.explanation,0);
    }
}

// 排顺序题
// ============================================================
function renderOrder(q){
    const shuffled=[...q.items].sort(()=>Math.random()-0.5);
    orderState={dragSrc:null};

    const list=document.createElement('div');
    list.className="space-y-2"; list.id="order-list";
    shuffled.forEach(item=>list.appendChild(createOrderChip(item,q)));
    optionsContainer.appendChild(list);

    const submitBtn=document.createElement('button');
    submitBtn.className="mt-4 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 rounded-xl";
    submitBtn.textContent="✅ 确认提交";
    submitBtn.onclick=()=>submitOrder(q);
    optionsContainer.appendChild(submitBtn);
}

function createOrderChip(item,q){
    const el=document.createElement('div');
    el.className="order-item flex items-center gap-3 p-3 bg-white border-2 border-slate-200 rounded-xl shadow-sm text-sm font-semibold text-slate-700";
    el.draggable=true;
    el.dataset.item=item;
    el.innerHTML=`<span class="text-slate-400 font-bold text-lg leading-none">⠿</span><span>${item}</span>`;

    el.addEventListener('dragstart',e=>{
        orderState.dragSrc=item;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{
        el.classList.remove('dragging');
        document.querySelectorAll('.order-item').forEach(o=>o.classList.remove('drag-over-top'));
    });
    el.addEventListener('dragover',e=>{
        e.preventDefault();
        document.querySelectorAll('.order-item').forEach(o=>o.classList.remove('drag-over-top'));
        el.classList.add('drag-over-top');
    });
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over-top'));
    el.addEventListener('drop',e=>{
        e.preventDefault();
        el.classList.remove('drag-over-top');
        if(orderState.dragSrc && orderState.dragSrc!==item){
            const list=document.getElementById('order-list');
            const items=Array.from(list.querySelectorAll('.order-item'));
            const srcEl=items.find(e=>e.dataset.item===orderState.dragSrc);
            const dstEl=el;
            if(srcEl&&dstEl){
                const si=items.indexOf(srcEl), di=items.indexOf(dstEl);
                if(si<di) list.insertBefore(srcEl,dstEl.nextSibling);
                else list.insertBefore(srcEl,dstEl);
            }
        }
    });
    setupTouchDrag(el,item,q,'order');
    return el;
}

function submitOrder(q){
    const list=document.getElementById('order-list');
    const currentItems=Array.from(list.querySelectorAll('.order-item')).map(e=>e.dataset.item);
    const isCorrect=currentItems.every((item,i)=>item===q.correctOrder[i]);

    Array.from(list.querySelectorAll('.order-item')).forEach((el,i)=>{
        el.classList.remove('border-slate-200');
        if(currentItems[i]===q.correctOrder[i]) el.classList.add('border-green-400','bg-green-50');
        else el.classList.add('border-red-400','bg-red-50');
    });

    if(isCorrect){
        const pts=givePoints(true);
        showFeedback(true,q.explanation,pts);
    } else {
        combo=0; comboDisplay.classList.add('hidden');
        loseHeart();
        const correctStr=q.correctOrder.join(' → ');
        showFeedback(false,`正确顺序：${correctStr}\n\n${q.explanation}`,0);
    }
}

function selectDiagramLabel(btn,lbl){
    document.querySelectorAll('.label-option').forEach(b=>b.classList.remove('selected'));
    if(diagramState.selectedLabel===lbl){diagramState.selectedLabel=null;return;}
    diagramState.selectedLabel=lbl;
    btn.classList.add('selected');
}

function handleHotspotClick(hsId,q){
    if(!diagramState.selectedLabel){
        // flash hint
        const hint=optionsContainer.querySelector('p.text-xs');
        if(hint){hint.classList.add('text-red-500');setTimeout(()=>hint.classList.remove('text-red-500'),800);}
        return;
    }
    if(diagramState.filled[hsId]) return;

    const correct=q.hotspotMap[hsId]===diagramState.selectedLabel;
    const el=document.getElementById(hsId);

    if(correct){
        const origFill=el.getAttribute('fill');
        el.style.fill='#bbf7d0';
        el.style.stroke='#16a34a';
        el.style.pointerEvents='none';

        // show label text
        const lbEl=document.getElementById(`lb-${hsId}`);
        if(lbEl) lbEl.setAttribute('visibility','visible');

        // replace numbered text
        const texts=el.parentElement?el.parentElement.querySelectorAll('text'):[];

        // mark label used
        const lblBtn=document.querySelector(`[data-label="${diagramState.selectedLabel}"]`);
        if(lblBtn){lblBtn.classList.add('used');lblBtn.classList.remove('selected');}

        diagramState.filled[hsId]=diagramState.selectedLabel;
        diagramState.selectedLabel=null;
        diagramState.done++;

        if(diagramState.done===diagramState.total){
            const pts=givePoints(true);
            showFeedback(true,q.explanation,pts);
        }
    } else {
        const origFill=el.style.fill;
        el.style.fill='#fca5a5';
        setTimeout(()=>{el.style.fill='';},700);
        combo=0; comboDisplay.classList.add('hidden');
        loseHeart();
        if(hp<=0) showFeedback(false,q.explanation,0);
    }
}

// ============================================================
// 触摸拖拽支持
// ============================================================
const ghost=document.getElementById('touch-ghost');
let touchItem=null,touchType=null,touchQ=null;

function setupTouchDrag(el,item,q,type){
    el.addEventListener('touchstart',e=>{
        touchItem=item; touchType=type; touchQ=q;
        ghost.textContent=item;
        ghost.classList.remove('hidden');
        const t=e.touches[0];
        ghost.style.left=(t.clientX-60)+'px';
        ghost.style.top=(t.clientY-20)+'px';
        el.classList.add('dragging');
    },{passive:true});

    el.addEventListener('touchmove',e=>{
        e.preventDefault();
        const t=e.touches[0];
        ghost.style.left=(t.clientX-60)+'px';
        ghost.style.top=(t.clientY-20)+'px';
        if(touchType==='order'){
            document.querySelectorAll('.order-item').forEach(o=>{
                o.classList.remove('drag-over-top');
                const r=o.getBoundingClientRect();
                if(t.clientY>r.top&&t.clientY<r.bottom&&o.dataset.item!==touchItem)
                    o.classList.add('drag-over-top');
            });
        } else if(touchType==='classify'){
            document.querySelectorAll('.drop-zone').forEach(z=>{
                z.classList.remove('drag-over');
                const r=z.getBoundingClientRect();
                if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)
                    z.classList.add('drag-over');
            });
        }
    },{passive:false});

    el.addEventListener('touchend',e=>{
        ghost.classList.add('hidden');
        el.classList.remove('dragging');
        document.querySelectorAll('.drag-over-top,.drag-over').forEach(o=>o.classList.remove('drag-over-top','drag-over'));
        if(!touchItem) return;
        const t=e.changedTouches[0];

        if(touchType==='classify'){
            document.querySelectorAll('.drop-zone').forEach(zone=>{
                const r=zone.getBoundingClientRect();
                if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
                    placeClassifyItem(touchItem,parseInt(zone.dataset.catIdx),touchQ);
                }
            });
        } else if(touchType==='order'){
            const list=document.getElementById('order-list');
            if(!list) return;
            const items=Array.from(list.querySelectorAll('.order-item'));
            items.forEach(oel=>{
                const r=oel.getBoundingClientRect();
                if(t.clientY>r.top&&t.clientY<r.bottom&&oel.dataset.item!==touchItem){
                    const srcEl=items.find(e=>e.dataset.item===touchItem);
                    const dstEl=oel;
                    if(srcEl&&dstEl){
                        const si=items.indexOf(srcEl),di=items.indexOf(dstEl);
                        if(si<di) list.insertBefore(srcEl,dstEl.nextSibling);
                        else list.insertBefore(srcEl,dstEl);
                    }
                }
            });
        }
        touchItem=null; touchType=null; touchQ=null;
    },{passive:true});
}

function generateAndShowCertificate(){
    const playerName=document.getElementById('player-name').value.trim()||"神秘英雄";
    const totalTime=document.getElementById('time-taken').textContent;
    endScreen.classList.add('hidden');
    certScreen.classList.remove('hidden');
    const canvas=document.getElementById('certCanvas');
    const ctx=canvas.getContext('2d');
    const scale=2;
    canvas.width=800*scale; canvas.height=600*scale;
    canvas.style.width='100%';
    ctx.scale(scale,scale);

    const grad=ctx.createLinearGradient(0,0,800,600);
    grad.addColorStop(0,'#f0f9ff'); grad.addColorStop(1,'#e0f2fe');
    ctx.fillStyle=grad; ctx.fillRect(0,0,800,600);

    ctx.strokeStyle='#0284c7'; ctx.lineWidth=12; ctx.strokeRect(20,20,760,560);
    ctx.strokeStyle='#bae6fd'; ctx.lineWidth=4; ctx.strokeRect(30,30,740,540);

    ctx.fillStyle='#0f172a'; ctx.textAlign='center';
    ctx.font='bold 42px "Microsoft YaHei",sans-serif';
    ctx.fillText('🏅 杰出人体保卫者证书 🏅',400,105);

    ctx.font='30px "Microsoft YaHei",sans-serif';
    ctx.fillText('授予指挥官：'+playerName,400,190);

    ctx.font='20px "Microsoft YaHei",sans-serif';
    ctx.fillStyle='#334155';
    ctx.fillText('在【人体协调保卫战】特别行动中，',400,260);
    ctx.fillText('成功挑战选择、配对、归类、排顺序、填图五大题型，',400,298);
    ctx.fillText('展现了对神经与内分泌系统的卓越理解！',400,336);

    ctx.font='bold 34px "Microsoft YaHei",sans-serif';
    ctx.fillStyle='#d97706';
    ctx.fillText('最终战力得分：'+score,400,405);

    ctx.font='20px "Microsoft YaHei",sans-serif';
    ctx.fillStyle='#64748b';
    ctx.fillText(totalTime,400,448);

    ctx.font='italic 21px "Microsoft YaHei",sans-serif';
    ctx.fillStyle='#16a34a';
    ctx.fillText('"你比神经冲动还敏捷，比肾上腺素还要燃！"',400,515);

    const today=new Date();
    const dateStr=today.getFullYear()+'年'+(today.getMonth()+1)+'月'+today.getDate()+'日';
    ctx.font='16px "Microsoft YaHei",sans-serif';
    ctx.fillStyle='#94a3b8';
    ctx.fillText('颁发日期：'+dateStr,650,562);

    const dataUrl=canvas.toDataURL('image/png');
    const dlBtn=document.getElementById('downloadCertBtn');
    dlBtn.href=dataUrl;
    dlBtn.download=playerName+'_人体保卫战证书.png';
}
