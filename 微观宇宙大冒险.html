<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微观宇宙：从原子到万物</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;700&display=swap');

  :root {
    --bg: #050a1a;
    --panel: #0a1628;
    --panel2: #0d1f3c;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #a8ff3e;
    --gold: #ffd700;
    --text: #e0f0ff;
    --dim: #7090b0;
    --glow: 0 0 20px rgba(0,212,255,0.5);
    --glow2: 0 0 20px rgba(255,107,53,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* starfield */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 35%, rgba(200,220,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 75%, rgba(0,212,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 25%, rgba(168,255,62,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* screens */
  .screen { display: none !important; min-height: 100vh; position: relative; z-index: 1; }
  .screen.active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; }

  /* ============ TITLE SCREEN ============ */
  #title-screen {
    padding: 30px 20px;
    text-align: center;
    background: radial-gradient(ellipse at center, rgba(0,50,100,0.4) 0%, transparent 70%);
  }

  .game-logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 3.5vw, 28px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 4px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { text-shadow: 0 0 20px rgba(0,212,255,0.5); }
    50% { text-shadow: 0 0 40px rgba(0,212,255,0.9), 0 0 80px rgba(0,212,255,0.4); }
  }

  @keyframes naElectronPulse {
    0%,100% { r: 9; opacity: 1; }
    50% { r: 11; opacity: 0.75; }
  }

  @keyframes particlePop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  #na-outer-e {
    animation: naElectronPulse 1.2s ease-in-out infinite;
  }

  .game-subtitle {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(22px, 6vw, 52px);
    background: linear-gradient(135deg, #ffd700, #ff6b35, #ff0080);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 16px 0;
    line-height: 1.2;
  }

  .atom-visual {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 20px auto;
  }

  .nucleus {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 40px; height: 40px;
    background: radial-gradient(circle, #ff6b35, #ff0040);
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(255,107,53,0.8);
    z-index: 2;
  }

  .orbit {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 50%;
  }

  .orbit:nth-child(2) { width: 80px; height: 80px; animation: spin 2s linear infinite; }
  .orbit:nth-child(3) { width: 130px; height: 130px; animation: spin 3.5s linear infinite reverse; }
  .orbit:nth-child(4) { width: 180px; height: 180px; animation: spin 5s linear infinite; }

  @keyframes spin { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }

  .electron {
    position: absolute;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    top: -5px; left: 50%; margin-left: -5px;
  }

  .level-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 20px 0;
    max-width: 700px;
  }

  .level-preview {
    background: var(--panel);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    width: 130px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
  }

  .level-preview:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: var(--glow);
  }

  .level-preview .lv-num {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .level-preview .lv-icon { font-size: 28px; margin: 6px 0; }
  .level-preview .lv-name { font-size: 12px; color: var(--dim); }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), #0070ff);
    border: none;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 16px 48px;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: var(--glow);
    transition: all 0.3s;
    animation: btnPulse 2s ease-in-out infinite;
  }

  @keyframes btnPulse {
    0%,100% { box-shadow: 0 0 20px rgba(0,212,255,0.5); transform: scale(1); }
    50% { box-shadow: 0 0 40px rgba(0,212,255,0.8); transform: scale(1.03); }
  }

  .btn-start:hover { transform: scale(1.08) !important; }

  /* ============ LEVEL SCREEN ============ */
  #level-screen {
    padding: 20px;
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
  }

  .level-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .level-tag {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    border: 1px solid rgba(0,212,255,0.4);
    padding: 4px 14px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 10px;
  }

  .level-title {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: clamp(20px, 5vw, 36px);
    background: linear-gradient(135deg, var(--gold), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .level-bg-text {
    font-size: 14px;
    color: var(--dim);
    margin-top: 8px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .progress-bar-wrap span {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: rgba(0,212,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .score-display {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--gold);
  }

  /* ============ GAME AREAS ============ */
  .game-panel {
    background: var(--panel);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .game-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 14px;
  }

  /* ── Level 1: Connect ── */
  .connect-area {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .connect-col {
    flex: 1;
    min-width: 120px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .connect-item {
    background: var(--panel2);
    border: 2px solid rgba(0,212,255,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.25s;
    font-size: 13px;
    text-align: center;
    user-select: none;
  }

  .connect-item:hover { border-color: var(--accent); box-shadow: var(--glow); }
  .connect-item.selected { border-color: var(--accent2); background: rgba(255,107,53,0.15); box-shadow: var(--glow2); }
  .connect-item.matched { border-color: var(--accent3); background: rgba(168,255,62,0.1); color: var(--accent3); pointer-events: none; }
  .connect-item.wrong { border-color: #ff3366; background: rgba(255,51,102,0.1); animation: shake 0.3s; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ── Level 1: Atom Builder ── */
  .atom-builder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .particle-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    min-height: 60px;
    padding: 10px;
    border: 2px dashed rgba(0,212,255,0.2);
    border-radius: 12px;
    width: 100%;
  }

  .particle {
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    cursor: grab;
    transition: all 0.2s;
    user-select: none;
    border: 2px solid;
  }

  .particle.proton { background: rgba(255,80,80,0.2); border-color: #ff5050; color: #ff9090; }
  .particle.neutron { background: rgba(120,120,180,0.2); border-color: #8888cc; color: #aaaaee; }
  .particle.electron { background: rgba(0,200,255,0.2); border-color: #00c8ff; color: #00e8ff; }
  .particle:hover { transform: scale(1.15); }
  .particle.dragging { opacity: 0.5; cursor: grabbing; }

  .atom-zones {
    display: flex;
    gap: 20px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .drop-zone {
    min-width: 120px;
    min-height: 100px;
    border: 2px dashed rgba(0,212,255,0.3);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    gap: 6px;
    transition: all 0.25s;
    position: relative;
  }

  .drop-zone.over { border-color: var(--accent); background: rgba(0,212,255,0.05); }
  .drop-zone.correct { border-color: var(--accent3); background: rgba(168,255,62,0.08); }
  .drop-zone.wrong-drop { border-color: #ff3366; animation: shake 0.3s; }

  .drop-zone-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .dropped-particles {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
  }

  .dropped-particles .particle {
    width: 36px; height: 36px;
    font-size: 10px;
    cursor: default;
  }

  /* ── Level 2: Element Sort ── */
  .element-rain {
    position: relative;
    height: 200px;
    border-radius: 12px;
    overflow: hidden;
    background: var(--panel2);
  }

  .falling-element {
    position: absolute;
    top: -60px;
    width: 54px; height: 54px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(20,40,80,0.9);
    transition: transform 0.1s;
    z-index: 2;
    user-select: none;
  }

  .falling-element .sym { font-size: 20px; font-weight: 700; }
  .falling-element .name { font-size: 9px; color: var(--dim); }
  .falling-element:hover { transform: scale(1.1); border-color: var(--accent); }

  .sort-bins {
    display: flex;
    gap: 12px;
    margin-top: 10px;
  }

  .sort-bin {
    flex: 1;
    min-height: 80px;
    border: 2px dashed;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    gap: 4px;
  }

  .sort-bin.metal { border-color: #ffd700; background: rgba(255,215,0,0.05); }
  .sort-bin.nonmetal { border-color: #a8ff3e; background: rgba(168,255,62,0.05); }

  .sort-bin-title {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .sort-bin.metal .sort-bin-title { color: var(--gold); }
  .sort-bin.nonmetal .sort-bin-title { color: var(--accent3); }

  .sorted-elements {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
  }

  .sorted-tag {
    background: var(--panel2);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .symbol-quiz {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sym-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .sym-badge {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    background: var(--panel2);
    border: 2px solid rgba(0,212,255,0.3);
    border-radius: 10px;
    padding: 8px 16px;
    min-width: 70px;
    text-align: center;
  }

  .sym-input {
    flex: 1;
    background: var(--panel2);
    border: 2px solid rgba(0,212,255,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.25s;
    min-width: 150px;
  }

  .sym-input:focus { border-color: var(--accent); }
  .sym-input.correct { border-color: var(--accent3); background: rgba(168,255,62,0.08); }
  .sym-input.wrong2 { border-color: #ff3366; background: rgba(255,51,102,0.08); }

  /* ── Level 3: Molecule Builder ── */
  .molecule-builder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .atom-cards {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .atom-card {
    width: 60px; height: 60px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid;
    transition: all 0.25s;
    user-select: none;
  }

  .atom-card.H-card { border-color: #88ddff; background: rgba(136,221,255,0.15); color: #88ddff; }
  .atom-card.O-card { border-color: #ff8855; background: rgba(255,136,85,0.15); color: #ff8855; }
  .atom-card.Na-card { border-color: var(--gold); background: rgba(255,215,0,0.12); color: var(--gold); }
  .atom-card.Cl-card { border-color: #88ff88; background: rgba(136,255,136,0.12); color: #88ff88; }
  .atom-card:hover { transform: scale(1.1); }
  .atom-card.used { opacity: 0.3; pointer-events: none; }
  .atom-card .card-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }

  .reaction-zone {
    width: 100%;
    min-height: 80px;
    border: 2px dashed rgba(0,212,255,0.3);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    flex-wrap: wrap;
    background: rgba(0,20,60,0.3);
  }

  .reaction-atom {
    width: 50px; height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    border: 2px solid;
    position: relative;
  }

  .bond-line {
    width: 20px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
  }

  .electron-transfer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .ion-display {
    text-align: center;
    padding: 14px;
    border-radius: 14px;
    min-width: 90px;
  }

  .ion-display.cation { background: rgba(255,215,0,0.08); border: 2px solid rgba(255,215,0,0.3); }
  .ion-display.anion { background: rgba(136,255,136,0.08); border: 2px solid rgba(136,255,136,0.3); }

  .ion-symbol {
    font-size: 28px;
    font-weight: 700;
    font-family: 'Orbitron', monospace;
  }

  .cation .ion-symbol { color: var(--gold); }
  .anion .ion-symbol { color: #88ff88; }

  .electron-dot {
    display: inline-block;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    margin: 2px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 0 8px var(--accent);
  }

  .electron-dot.transferred {
    background: #88ff88;
    box-shadow: 0 0 8px #88ff88;
    animation: transferAnim 0.5s ease;
  }

  @keyframes transferAnim {
    0% { transform: scale(1); }
    50% { transform: scale(1.5); }
    100% { transform: scale(1); }
  }

  .transfer-arrow {
    font-size: 28px;
    color: var(--accent);
    animation: arrowBounce 1s ease-in-out infinite;
  }

  @keyframes arrowBounce {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(6px); }
  }

  /* ── Level 4: Mass Calculator ── */
  .mass-calc {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .formula-display {
    font-size: clamp(20px, 5vw, 36px);
    text-align: center;
    font-family: 'Orbitron', monospace;
    color: var(--accent);
    padding: 16px;
    background: var(--panel2);
    border-radius: 12px;
    letter-spacing: 2px;
  }

  .formula-display sub { font-size: 0.6em; vertical-align: sub; }

  .calc-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .calc-step {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
  }

  .calc-step .element-box {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    color: var(--accent2);
    width: 36px;
    text-align: center;
  }

  .calc-step .count { color: var(--dim); }
  .calc-step .mass-val { color: var(--gold); font-weight: 700; margin-left: auto; }

  .calc-answer {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .answer-input {
    width: 100px;
    background: var(--panel2);
    border: 2px solid rgba(0,212,255,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 20px;
    font-family: 'Orbitron', monospace;
    outline: none;
    text-align: center;
    transition: border-color 0.25s;
  }

  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--accent3); }
  .answer-input.wrong2 { border-color: #ff3366; }

  .tf-question {
    background: var(--panel2);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .tf-q-text { font-size: 14px; line-height: 1.5; }

  .tf-buttons { display: flex; gap: 10px; }

  .tf-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.25s;
  }

  .tf-btn.true-btn { border-color: var(--accent3); color: var(--accent3); }

    overflow: hidden;

    border-color: rgba(0,212,255,0.4);
    cursor: pointer;
    animation: stepGlow 1.5s ease-in-out infinite;

    50% { box-shadow: 0 0 15px rgba(0,212,255,0.3); }

    bottom: 4px;

    opacity: 0;

    font-weight: 700;

    border: 2px solid;

  .mix-sand { background: rgba(200,180,100,0.3); border-color: #c8b464; color: #e0cc88; }
  .mix-salt { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); color: #fff; }

  .feedback.success { color: var(--accent3); }

  @keyframes medalBounce {

  t.textContent = msg;
  t.style.borderColor = isGood ? 'var(--accent3)' : '#ff6688';

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawAtomDeco(ctx, cx, cy, r, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  // nucleus
  ctx.beginPath(); ctx.arc(cx, cy, r*0.18, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
  // 3 orbits
  for (let i = 0; i < 3; i++) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(i * Math.PI / 3);
    ctx.scale(1, 0.4);
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.restore();
    ctx.stroke();
  }
}

function adjustAP(key, delta) {
  apValues[key] = Math.max(0, apValues[key] + delta);
  const el = document.getElementById('ap-val-' + key);
  if (el) el.textContent = apValues[key];
  updateAtomSVG();
}

function updateAtomSVG() {
  const pl = document.getElementById('svg-proton-label');
  const nl = document.getElementById('svg-neutron-label');
  const el = document.getElementById('svg-electron-label');
  if (pl) pl.textContent = '质子: ' + apValues.proton;
  if (nl) nl.textContent = '中子: ' + apValues.neutron;
  if (el) el.textContent = '电子: ' + apValues.electron;

  // Draw animated particles inside SVG rings
  const svg = document.getElementById('atom-svg');
  if (!svg) return;

  // Remove old dynamic particles
  svg.querySelectorAll('.dyn-particle').forEach(e => e.remove());

  const ns = 'http://www.w3.org/2000/svg';

  // Protons in nucleus (inner circle centre ~120,120 r~41)
  const protonPositions = circlePositions(120, 120, 18, apValues.proton);
  protonPositions.forEach((pos, i) => {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', pos.x); c.setAttribute('cy', pos.y); c.setAttribute('r', '5');
    c.setAttribute('fill', '#ff5050'); c.setAttribute('stroke', '#ff9090'); c.setAttribute('stroke-width', '1');
    c.setAttribute('class', 'dyn-particle');
    c.style.animation = `particlePop 0.3s ease ${i*0.04}s both`;
    svg.appendChild(c);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', pos.x); t.setAttribute('y', pos.y + 3);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '5');
    t.setAttribute('fill', '#ffcccc'); t.setAttribute('class', 'dyn-particle');
    t.setAttribute('pointer-events', 'none');
    t.textContent = '+';
//峇株吧辖蔡逸众制作
    svg.appendChild(t);
  });

  // Neutrons in nucleus
  const neutronPositions = circlePositions(120, 120, 28, apValues.neutron);
  neutronPositions.forEach((pos, i) => {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', pos.x); c.setAttribute('cy', pos.y); c.setAttribute('r', '5');
    c.setAttribute('fill', '#6666aa'); c.setAttribute('stroke', '#aaaaee'); c.setAttribute('stroke-width', '1');
    c.setAttribute('class', 'dyn-particle');
    c.style.animation = `particlePop 0.3s ease ${i*0.04}s both`;
    svg.appendChild(c);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', pos.x); t.setAttribute('y', pos.y + 3);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '5');
    t.setAttribute('fill', '#ccccff'); t.setAttribute('class', 'dyn-particle');
    t.setAttribute('pointer-events', 'none');
    t.textContent = 'n';
    svg.appendChild(t);
  });

  // Electrons on outer orbit (r=97)
  const electronPositions = circlePositions(120, 120, 97, apValues.electron);
  electronPositions.forEach((pos, i) => {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', pos.x); c.setAttribute('cy', pos.y); c.setAttribute('r', '5');
    c.setAttribute('fill', '#00aadd'); c.setAttribute('stroke', '#00e8ff'); c.setAttribute('stroke-width', '1.5');
    c.setAttribute('class', 'dyn-particle');
    c.style.animation = `particlePop 0.3s ease ${i*0.04}s both`;
    svg.appendChild(c);
  });
}

function circlePositions(cx, cy, r, count) {
  if (count === 0) return [];
  const positions = [];
  for (let i = 0; i < count; i++) {
    const angle = (2 * Math.PI * i / count) - Math.PI / 2;
    positions.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
  }
  return positions;
}

function checkAtomPuzzle() {

  if (proton === atom.proton && neutron === atom.neutron && electron === atom.electron) {

    fb.textContent = `🎉 正确！${atom.name}：${proton}质子 ${neutron}中子 ${electron}电子，电中性！`;

function initTetris(list) {
  tetrisQueue = [...list];
  tetrisCurrent = null;
  tetrisMetalOk = 0;
  tetrisNonmetalOk = 0;
  tetrisDone = 0;
  tetrisFalling = false;
  clearInterval(tetrisFallTimer);
  // clear buckets
  const bm = document.getElementById('bucket-metal');
  const bn = document.getElementById('bucket-nonmetal');
  if (bm) bm.innerHTML = '';
  if (bn) bn.innerHTML = '';
  const mc = document.getElementById('t-metal-count');
  const nc = document.getElementById('t-nonmetal-count');
  const tr = document.getElementById('t-remain');
  const rf = document.getElementById('rain-feedback');
  if (mc) mc.textContent = '0';
  if (nc) nc.textContent = '0';
  if (tr) tr.textContent = '剩余: ' + tetrisQueue.length;
  if (rf) rf.textContent = '';
  // defer spawn so the DOM (and offsetWidth) is fully laid out
  setTimeout(spawnTetrisBall, 120);
}

function spawnTetrisBall() {
  if (tetrisQueue.length === 0) return;
  clearInterval(tetrisFallTimer);
  tetrisFalling = false;

  const data = tetrisQueue.shift();
  document.getElementById('t-remain').textContent = '剩余: ' + (tetrisQueue.length + 1);

  const wrap = document.getElementById('tetris-ball-layer');
  if (!wrap) return;
  wrap.innerHTML = '';

  const ball = document.createElement('div');
  const ww = wrap.offsetWidth || 300;
  const ballW = 72;
  // start centre of left or right half
  const startLeft = Math.random() < 0.5
    ? Math.round(ww * 0.25 - ballW / 2)
    : Math.round(ww * 0.75 - ballW / 2);

  ball.style.cssText = `
    position:absolute;
    width:${ballW}px;height:${ballW}px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, ${data.color}cc, ${data.color}44);
    border: 2px solid ${data.color};
    box-shadow: 0 0 14px ${data.color}66;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    top:10px;
    left:${startLeft}px;
    transition:left 0.15s ease;
    user-select:none;
    z-index:10;
  `;
  ball.innerHTML = `
    <span style="font-size:18px;font-weight:900;color:#fff;text-shadow:0 0 8px ${data.color};line-height:1;">${data.sym}</span>
    <span style="font-size:9px;color:rgba(255,255,255,0.8);line-height:1.3;">${data.zh}</span>
    <span style="font-size:8px;color:rgba(255,255,255,0.55);">${data.en}</span>
  `;

  wrap.appendChild(ball);
  tetrisCurrent = { el: ball, data, side: (startLeft + ballW / 2) < ww / 2 ? 'left' : 'right' };

  // auto-fall slowly
  let topPx = 10;
  tetrisFalling = true;
  tetrisFallTimer = setInterval(() => {
    if (!tetrisFalling || !tetrisCurrent) { clearInterval(tetrisFallTimer); return; }
    topPx += 0.7;
    ball.style.top = topPx + 'px';
    if (topPx >= 255) {
      clearInterval(tetrisFallTimer);
      tetrisFalling = false;
      landBall();
    }
  }, 20);
}

function tetrisMove(dir) {
  if (!tetrisCurrent || !tetrisFalling) return;
  const { el } = tetrisCurrent;
  const wrap = document.getElementById('tetris-ball-layer');
  if (!wrap) return;
  const ww = wrap.offsetWidth || 300;
  const ballW = 72;
  // read current left in px
  let curLeft = parseFloat(el.style.left) || (ww / 2 - ballW / 2);
  curLeft += dir * Math.round(ww * 0.25);
  curLeft = Math.max(0, Math.min(ww - ballW, curLeft));
  el.style.left = curLeft + 'px';
  tetrisCurrent.side = (curLeft + ballW / 2) < ww / 2 ? 'left' : 'right';
}

function tetrisDrop() {
  if (!tetrisCurrent || !tetrisFalling) return;
  // accelerate to bottom instantly
  clearInterval(tetrisFallTimer);
  const { el } = tetrisCurrent;
  el.style.top = '255px';
  setTimeout(landBall, 120);
}

function landBall() {
  if (!tetrisCurrent) return;
//峇株吧辖华仁中学蔡逸众制作
  const { data, el } = tetrisCurrent;
  const wrap = document.getElementById('tetris-ball-layer');
  const ww = wrap ? (wrap.offsetWidth || 300) : 300;
  const ballW = 72;
  const curLeft = parseFloat(el.style.left) || 0;
  const ballCentre = curLeft + ballW / 2;

  tetrisCurrent = null;
  tetrisDone++;

  // middle zone = within 15% of centre on either side → wrong
  const midZone = ww * 0.15;
  const inMiddle = Math.abs(ballCentre - ww / 2) < midZone;
  const chosenMetal = ballCentre < ww / 2;

  if (inMiddle) {
    // animate ball bouncing back
    el.style.transition = 'transform 0.4s, opacity 0.4s';
    el.style.transform = 'scale(1.3)';
    el.style.opacity = '0';
    showToast(`⚠️ 球落在中间，判为错误！请移到左或右侧！`, false);
    setTimeout(() => { if (el.parentNode) el.remove(); }, 500);
    setTimeout(spawnTetrisBall, 700);
    return;
  }

  const correct = (data.type === 'metal') === chosenMetal;

  // mini badge into bucket
  const bucket = document.getElementById(chosenMetal ? 'bucket-metal' : 'bucket-nonmetal');
  const badge = document.createElement('div');
  badge.style.cssText = `
    width:28px;height:28px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,${data.color}cc,${data.color}44);
    border:2px solid ${correct ? data.color : '#ff3366'};
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:#fff;
    ${correct ? '' : 'opacity:0.5;'}
  `;
  badge.textContent = data.sym;
  badge.title = correct ? '✅ 正确' : `❌ 应为${data.type==='metal'?'金属（左）':'非金属（右）'}`;
  if (bucket) bucket.appendChild(badge);

  // animate ball off screen
  el.style.transition = 'transform 0.3s, opacity 0.3s';
  el.style.transform = `translateY(${correct ? '60px' : '-120px'}) scale(${correct ? 0.5 : 1.4})`;
  el.style.opacity = '0';

  if (correct) {
    showToast(`✅ ${data.zh}(${data.sym}) 正确！`);
    totalScore += 8;
    updateHeader();
    if (data.type === 'metal') {
      tetrisMetalOk++;
      document.getElementById('t-metal-count').textContent = tetrisMetalOk;
    } else {
      tetrisNonmetalOk++;
      document.getElementById('t-nonmetal-count').textContent = tetrisNonmetalOk;
    }
  } else {
    showToast(`❌ ${data.zh}是${data.type==='metal'?'金属，应移左':'非金属，应移右'}！`, false);
  }

  document.getElementById('t-remain').textContent = '剩余: ' + tetrisQueue.length;

  if (tetrisQueue.length === 0) {
    // all done
    setTimeout(() => {
      const fb = document.getElementById('rain-feedback');
      if (!fb) return;
      const score = tetrisMetalOk + tetrisNonmetalOk;
      if (score >= 8) {
        fb.className = 'feedback success';
        fb.textContent = `🎉 完成！${score}/10 正确，你是元素分类大师！`;
        window._lv2_rain_done = true;
        document.getElementById('tab2b').classList.add('completed');
        checkLevel2Done();
      } else {
        fb.className = 'feedback error';
        fb.textContent = `${score}/10 正确。点击重置再试！`;
        const resetBtn = document.createElement('button');
        resetBtn.className = 'action-btn';
        resetBtn.textContent = '🔄 重新挑战';
        resetBtn.style.marginLeft = '12px';
        resetBtn.onclick = () => {
          const metals    = ALL_ELEMENTS.filter(e=>e.type==='metal');
          const nonmetals = ALL_ELEMENTS.filter(e=>e.type==='nonmetal');
          const newList = [
            ...metals.sort(()=>Math.random()-0.5).slice(0,5),
            ...nonmetals.sort(()=>Math.random()-0.5).slice(0,5),
          ].sort(()=>Math.random()-0.5);
          initTetris(newList);
        };
        fb.appendChild(resetBtn);
      }
    }, 400);
    return;
  }

  setTimeout(spawnTetrisBall, 600);
}

// ── Task A: Molecule synthesis ──
const ATOM_COLORS = { H:'#88ddff', O:'#ff8855', N:'#aaddff', C:'#aaaaaa', S:'#ffee00', Cl:'#99ff66' };

function renderMolQuestion() {
  const mol = [
    { name:'水',       formula:'H₂O', display:'H₂O',  atoms:{H:2,O:1}, colors:{H:'#88ddff',O:'#ff8855'}, tip:'H=+1，O=-2，2×(+1)+(-2)=0 ✓' },
    { name:'氨气',     formula:'NH₃', display:'NH₃',  atoms:{N:1,H:3}, colors:{N:'#aaddff',H:'#88ddff'}, tip:'N=-3，H=+1，(-3)+3×(+1)=0 ✓' },
    { name:'二氧化碳', formula:'CO₂', display:'CO₂',  atoms:{C:1,O:2}, colors:{C:'#aaaaaa',O:'#ff8855'}, tip:'C=+4，O=-2，(+4)+2×(-2)=0 ✓' },
  ][window._molIdx];

  window._molCurrent = mol;
  window._molCurrentAtoms = {};

  document.getElementById('mol-panel-title').textContent = `🧪 合成分子 — 第 ${window._molIdx+1}/3 种`;
  document.getElementById('mol-target-display').innerHTML =
    `目标：<strong style="color:var(--gold);font-size:18px;">${mol.display}</strong>（${mol.name}）`;

  // Build atom pool
  const pool = document.getElementById('mol-atom-pool');
  pool.innerHTML = '';
  // Provide extra atoms so student must choose right count
  const available = {};
  for (const el in mol.atoms) available[el] = mol.atoms[el] + 2;
  // Also add a wrong atom as distractor
  const distractors = ['H','O','N','C','Cl'].filter(e=>!(e in mol.atoms));
  if (distractors.length) available[distractors[0]] = 2;

  for (const el in available) {
    for (let i = 0; i < available[el]; i++) {
      const card = document.createElement('div');
      card.className = 'atom-card ' + el + '-card';
      card.style.cssText = `
        width:50px;height:50px;border-radius:10px;display:flex;flex-direction:column;
        align-items:center;justify-content:center;font-size:18px;font-weight:700;
        cursor:pointer;border:2px solid ${mol.colors[el]||ATOM_COLORS[el]||'#888'};
        background:${(mol.colors[el]||ATOM_COLORS[el]||'#888')}22;
        color:${mol.colors[el]||ATOM_COLORS[el]||'#888'};
        transition:all 0.2s;user-select:none;
      `;
      card.textContent = el;
      card.dataset.el = el;
      card.onclick = () => addMolAtom(el, mol.colors[el]||ATOM_COLORS[el]||'#888');
      pool.appendChild(card);
    }
  }

  document.getElementById('mol-reaction-zone').innerHTML =
    '<span style="color:var(--dim);font-size:13px;">点击上方原子添加</span>';
  document.getElementById('mol-result-anim').style.display = 'none';
  document.getElementById('mol-feedback').textContent = '';
  document.getElementById('mol-feedback').className = 'feedback';
  const tip = document.getElementById('mol-tip');
  if (tip) tip.textContent = '💡 ' + mol.tip;
}

function addMolAtom(el, color) {
  if (!window._molCurrentAtoms) window._molCurrentAtoms = {};
  window._molCurrentAtoms[el] = (window._molCurrentAtoms[el] || 0) + 1;

  // Rebuild zone display
  const zone = document.getElementById('mol-reaction-zone');
  zone.innerHTML = '';
  const total = Object.values(window._molCurrentAtoms).reduce((a,b)=>a+b,0);
  if (total === 0) { zone.innerHTML = '<span style="color:var(--dim);font-size:13px;">点击上方原子添加</span>'; return; }

  let first = true;
  for (const sym in window._molCurrentAtoms) {
    const cnt = window._molCurrentAtoms[sym];
//华仁中学蔡逸众制作
    const col = ATOM_COLORS[sym] || '#888';
    for (let i = 0; i < cnt; i++) {
      if (!first) {
        const line = document.createElement('div');
        line.style.cssText = 'width:16px;height:3px;border-radius:2px;background:rgba(255,255,255,0.25);flex-shrink:0;';
        zone.appendChild(line);
      }
      first = false;
      const div = document.createElement('div');
      div.style.cssText = `
        width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
        font-size:15px;font-weight:700;border:2px solid ${col};
        background:${col}22;color:${col};flex-shrink:0;
      `;
      div.textContent = sym;
      zone.appendChild(div);
    }
  }
}

function resetMolReaction() {
  window._molCurrentAtoms = {};
  const zone = document.getElementById('mol-reaction-zone');
  if (zone) zone.innerHTML = '<span style="color:var(--dim);font-size:13px;">点击上方原子添加</span>';
  const fb = document.getElementById('mol-feedback');
  if (fb) { fb.textContent = ''; fb.className = 'feedback'; }
  const anim = document.getElementById('mol-result-anim');
  if (anim) anim.style.display = 'none';
}

function checkMolReaction() {
  const mol = window._molCurrent;
  const got = window._molCurrentAtoms || {};
  const fb = document.getElementById('mol-feedback');

  // compare
  const correct = Object.keys(mol.atoms).every(el => got[el] === mol.atoms[el]) &&
                  Object.keys(got).every(el => mol.atoms[el] === got[el]);

  if (correct) {
    fb.className = 'feedback success';
    fb.textContent = `🎉 ${mol.name}（${mol.formula}）合成成功！+20分`;
    totalScore += 20; updateHeader();
    showToast(`✅ ${mol.display} 合成！`);

    // Show molecule animation
    showMolAnim(mol);

    window._molDone++;
    window._molIdx++;
    if (window._molDone >= 3) {
      window._lv3_mol_done = true;
      document.getElementById('tab3a').classList.add('completed');
      checkLevel3Done();
      setTimeout(() => switchTab3('b'), 2000);
    } else {
      setTimeout(renderMolQuestion, 2200);
    }
  } else {
    fb.className = 'feedback error';
    const expected = Object.entries(mol.atoms).map(([k,v])=>`${k}×${v}`).join(' + ');
    fb.textContent = `❌ 不对！${mol.name} 需要：${expected}。检查原子种类和数量！`;
  }
}

function showMolAnim(mol) {
  const anim = document.getElementById('mol-result-anim');
  anim.style.display = 'block';

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 320 130');
  svg.style.cssText = 'width:100%;max-width:320px;background:rgba(0,20,60,0.4);border-radius:10px;border:1px solid rgba(255,255,255,0.1);display:block;margin:0 auto;';

  // Molecule-specific layouts: { sym, x, y, bonds:[[x1,y1,x2,y2,order],...] }
  const LAYOUTS = {
    'H₂O': {
      atoms: [
        {sym:'O', x:160, y:52, col:'#ff8855'},
        {sym:'H', x:110, y:95, col:'#88ddff'},
        {sym:'H', x:210, y:95, col:'#88ddff'},
      ],
      bonds: [
        {x1:147,y1:64,x2:120,y2:85, order:1},
        {x1:173,y1:64,x2:200,y2:85, order:1},
      ],
      name:'水（弯曲形）', bondAngle:'∠HOH ≈ 104.5°'
    },
    'NH₃': {
      atoms: [
        {sym:'N', x:160, y:45, col:'#aaddff'},
        {sym:'H', x:100, y:95, col:'#88ddff'},
        {sym:'H', x:160, y:105, col:'#88ddff'},
        {sym:'H', x:220, y:95, col:'#88ddff'},
      ],
      bonds: [
        {x1:148,y1:58,x2:112,y2:83, order:1},
        {x1:160,y1:60,x2:160,y2:91, order:1},
        {x1:172,y1:58,x2:208,y2:83, order:1},
      ],
      name:'氨气（三角锥形）', bondAngle:'∠HNH ≈ 107°'
    },
    'CO₂': {
      atoms: [
        {sym:'O', x:70,  y:60, col:'#ff8855'},
        {sym:'C', x:160, y:60, col:'#aaaaaa'},
        {sym:'O', x:250, y:60, col:'#ff8855'},
      ],
      bonds: [
        {x1:84, y1:60,x2:143,y2:60, order:2},
        {x1:177,y1:60,x2:236,y2:60, order:2},
      ],
      name:'二氧化碳（直线形）', bondAngle:'∠OCO = 180°'
    },
  };

  const layout = LAYOUTS[mol.formula] || LAYOUTS['H₂O'];

  // Draw bonds first (behind atoms)
  layout.bonds.forEach((b, bi) => {
    if (b.order === 2) {
      // Double bond: two parallel lines
      const dx = b.x2 - b.x1, dy = b.y2 - b.y1;
      const len = Math.sqrt(dx*dx+dy*dy);
      const px = -dy/len*3, py = dx/len*3;
      [[px,py],[-px,-py]].forEach(([ox,oy]) => {
        const line = document.createElementNS(ns,'line');
        line.setAttribute('x1',b.x1+ox); line.setAttribute('y1',b.y1+oy);
        line.setAttribute('x2',b.x2+ox); line.setAttribute('y2',b.y2+oy);
        line.setAttribute('stroke','rgba(255,255,255,0.5)'); line.setAttribute('stroke-width','2');
        line.style.animation = `particlePop 0.3s ease ${bi*0.1+0.1}s both`;
        svg.appendChild(line);
      });
    } else {
      const line = document.createElementNS(ns,'line');
      line.setAttribute('x1',b.x1); line.setAttribute('y1',b.y1);
      line.setAttribute('x2',b.x2); line.setAttribute('y2',b.y2);
      line.setAttribute('stroke','rgba(255,255,255,0.45)'); line.setAttribute('stroke-width','3');
      line.style.animation = `particlePop 0.3s ease ${bi*0.1+0.1}s both`;
      svg.appendChild(line);
    }
  });

  // Draw atoms
  layout.atoms.forEach((a, ai) => {
    const delay = (ai * 0.12 + 0.05) + 's';
    const glow = document.createElementNS(ns,'circle');
    glow.setAttribute('cx',a.x); glow.setAttribute('cy',a.y); glow.setAttribute('r','22');
    glow.setAttribute('fill', a.col+'28');
    glow.style.animation = `particlePop 0.35s ease ${delay} both`;
    svg.appendChild(glow);

    const c = document.createElementNS(ns,'circle');
    c.setAttribute('cx',a.x); c.setAttribute('cy',a.y); c.setAttribute('r','16');
    c.setAttribute('fill', a.col+'99'); c.setAttribute('stroke',a.col); c.setAttribute('stroke-width','2');
    c.style.animation = `particlePop 0.35s ease ${delay} both`;
    svg.appendChild(c);

    const t = document.createElementNS(ns,'text');
    t.setAttribute('x',a.x); t.setAttribute('y',a.y+5);
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','13');
    t.setAttribute('font-weight','bold'); t.setAttribute('fill','#fff');
    t.setAttribute('pointer-events','none');
    t.style.animation = `particlePop 0.35s ease ${delay} both`;
    t.textContent = a.sym;
    svg.appendChild(t);
  });

  // Labels
  const fml = document.createElementNS(ns,'text');
  fml.setAttribute('x','160'); fml.setAttribute('y','120');
  fml.setAttribute('text-anchor','middle'); fml.setAttribute('font-size','10');
  fml.setAttribute('fill','rgba(168,255,62,0.9)'); fml.setAttribute('font-family','monospace');
  fml.textContent = `✓ ${mol.formula}  ${layout.name}  ${layout.bondAngle}`;
  svg.appendChild(fml);

  anim.innerHTML = '';
  anim.appendChild(svg);
}

function buildSaltSVG(salt) {
  const ns = 'http://www.w3.org/2000/svg';
  const g = document.getElementById('salt-svg-content');
  if (!g) return;
  g.innerHTML = '';

  const d = salt.donor;
  const a = salt.acceptor;
  const nAcceptor = salt.acceptorCount || 1;

  // ── Donor atom (left, always at 85,100) ──
  addSVGAtom(g, ns, 85, 100, 34, d.color, d.sym, `${d.protons}p`);

  // Donor outer electrons (clickable)
  const ePositions = circlePositions(85, 100, 50, d.outerE);
  ePositions.forEach((pos, i) => {
    const ec = document.createElementNS(ns, 'circle');
    ec.setAttribute('cx', pos.x); ec.setAttribute('cy', pos.y); ec.setAttribute('r', '8');
    ec.setAttribute('fill', '#00d4ff'); ec.setAttribute('stroke', '#00ffff'); ec.setAttribute('stroke-width', '2');
    ec.setAttribute('pointer-events', 'all');
    ec.setAttribute('id', `donor-e-${i}`);
    ec.style.cssText = 'cursor:pointer;filter:drop-shadow(0 0 5px #00d4ff);animation:naElectronPulse 1.2s ease-in-out infinite;';
    ec.setAttribute('onclick', `clickDonorElectron(${i})`);
    g.appendChild(ec);
    const lbl = document.createElementNS(ns, 'text');
    lbl.setAttribute('x', pos.x); lbl.setAttribute('y', pos.y + 3);
    lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('font-size', '7');
    lbl.setAttribute('fill', '#fff'); lbl.setAttribute('pointer-events', 'none');
    lbl.textContent = 'e⁻';
    g.appendChild(lbl);
  });

  // ── Acceptor atoms (right side, stacked vertically if multiple) ──
  // Place them evenly between y=40 and y=160
  const aXBase = 255;
  const aYPositions = nAcceptor === 1
    ? [100]
    : nAcceptor === 2
    ? [70, 130]
    : [45, 100, 155]; // 3 acceptors

  // Store slot target positions for electron animation
  window._saltSlotPositions = [];

  aYPositions.forEach((ay, ai) => {
    const r = nAcceptor > 1 ? 26 : 34;
    addSVGAtom(g, ns, aXBase, ay, r, a.color, a.sym, `${a.protons}p`);

    // One empty slot per acceptor atom
    const slotAngle = nAcceptor > 1
      ? (ai === 0 ? -Math.PI/2 : ai === 2 ? Math.PI/2 : Math.PI) // top/bottom/left
      : 0; // single: left side
    // Target slot position = left side of acceptor atom facing donor
    const slotX = aXBase - (r + 10) * (nAcceptor > 1 ? 0.5 : 1);
    const slotY = ay;
    window._saltSlotPositions.push({ x: slotX, y: slotY });

    const slot = document.createElementNS(ns, 'circle');
    slot.setAttribute('cx', slotX); slot.setAttribute('cy', slotY); slot.setAttribute('r', '8');
    slot.setAttribute('fill', 'rgba(100,255,100,0.05)');
    slot.setAttribute('stroke', 'rgba(100,255,100,0.4)'); slot.setAttribute('stroke-width', '1.5');
    slot.setAttribute('stroke-dasharray', '3 2');
    slot.setAttribute('id', `acceptor-slot-${ai}`);
    g.appendChild(slot);

    // Charge label per acceptor (hidden)
    const acLbl = document.createElementNS(ns, 'text');
    const chargeX = nAcceptor > 1 ? aXBase + r + 8 : aXBase;
    acLbl.setAttribute('x', chargeX); acLbl.setAttribute('y', ay - r - 4);
    acLbl.setAttribute('text-anchor', 'middle'); acLbl.setAttribute('font-size', '11');
    acLbl.setAttribute('font-weight', 'bold'); acLbl.setAttribute('fill', a.color);
    acLbl.setAttribute('opacity', '0'); acLbl.setAttribute('id', `svg-acceptor-charge-${ai}`);
    acLbl.setAttribute('pointer-events', 'none');
    acLbl.textContent = a.charge;
    g.appendChild(acLbl);
  });

  // Donor charge label (hidden)
  const dCharge = document.createElementNS(ns, 'text');
  dCharge.setAttribute('x','85'); dCharge.setAttribute('y','22');
  dCharge.setAttribute('text-anchor','middle'); dCharge.setAttribute('font-size','14');
  dCharge.setAttribute('font-weight','bold'); dCharge.setAttribute('fill', d.color);
  dCharge.setAttribute('opacity','0'); dCharge.setAttribute('id','svg-donor-charge');
  dCharge.setAttribute('pointer-events','none');
  dCharge.textContent = d.charge;
  g.appendChild(dCharge);

  // Attraction lines (one per acceptor, hidden)
  aYPositions.forEach((ay, ai) => {
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1','127'); line.setAttribute('y1', ay <= 80 ? '80' : ay >= 120 ? '120' : '100');
    line.setAttribute('x2', String(aXBase - 36)); line.setAttribute('y2', String(ay));
    line.setAttribute('stroke','rgba(255,255,255,0)'); line.setAttribute('stroke-width','1.5');
    line.setAttribute('stroke-dasharray','5 3'); line.setAttribute('id',`svg-attract-line-${ai}`);
    line.setAttribute('pointer-events','none');
    g.appendChild(line);
  });

  const lineLbl = document.createElementNS(ns, 'text');
  lineLbl.setAttribute('x','170'); lineLbl.setAttribute('y','188');

function clickDonorElectron(i) {
  if (window._transferred) return;
  const salt = window._SALTS[window._saltIdx];

  const eEl = document.getElementById(`donor-e-${i}`);
  if (!eEl || eEl.getAttribute('opacity') === '0') return;
  eEl.setAttribute('opacity','0');
  eEl.style.animation = 'none';

  const count = (window._transferCount || 0);
  window._transferCount = count + 1;

  const ns = 'http://www.w3.org/2000/svg';
  const g = document.getElementById('salt-svg-content');
  const flyE = document.createElementNS(ns, 'circle');
  const startPos = circlePositions(85, 100, 50, salt.donor.outerE)[i];
  flyE.setAttribute('cx', startPos.x); flyE.setAttribute('cy', startPos.y);
  flyE.setAttribute('r','8'); flyE.setAttribute('fill','#00d4ff'); flyE.setAttribute('stroke','#00ffff');
  flyE.setAttribute('stroke-width','2'); flyE.setAttribute('pointer-events','none');
  flyE.style.filter = 'drop-shadow(0 0 8px #00ffff)';
  g.appendChild(flyE);

  // Use pre-computed slot position for this transfer index
  const slots = window._saltSlotPositions || [];
  const endPos = slots[count] || { x: 220, y: 100 };

  const dur = 800, start = performance.now();
  const sx = startPos.x, sy = startPos.y, ex = endPos.x, ey = endPos.y;

  function fly(now) {
    const t = Math.min((now - start) / dur, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    flyE.setAttribute('cx', sx + (ex-sx)*ease);
    flyE.setAttribute('cy', sy + (ey-sy)*ease - 35*Math.sin(Math.PI*t));
    if (t < 1) { requestAnimationFrame(fly); return; }

    flyE.setAttribute('fill','#88ff88'); flyE.setAttribute('stroke','#88ff88');
    flyE.style.filter = 'drop-shadow(0 0 6px #88ff88)';

    const slot = document.getElementById(`acceptor-slot-${count}`);
    if (slot) { slot.setAttribute('fill','rgba(100,255,100,0.4)'); slot.setAttribute('stroke-dasharray','none'); }

    if (window._transferCount >= salt.eCount) {
      window._transferred = true;
      setTimeout(() => finishSaltTransfer(salt), 400);
    }
  }
  requestAnimationFrame(fly);
}

function finishSaltTransfer(salt) {
  const nAcceptor = salt.acceptorCount || 1;
  const dc = document.getElementById('svg-donor-charge');
  if (dc) dc.setAttribute('opacity','1');

  for (let ai = 0; ai < nAcceptor; ai++) {
    const ac = document.getElementById(`svg-acceptor-charge-${ai}`);
    if (ac) ac.setAttribute('opacity','1');
    const line = document.getElementById(`svg-attract-line-${ai}`);
    if (line) line.setAttribute('stroke','rgba(255,255,200,0.6)');
  }
  const lbl = document.getElementById('svg-attract-lbl');
  if (lbl) lbl.setAttribute('fill','rgba(255,255,200,0.8)');

  const result = document.getElementById('salt-result');
  if (result) { result.style.color='var(--accent3)'; result.textContent=`${salt.donor.charge} + ${nAcceptor > 1 ? nAcceptor+'×'+salt.acceptor.charge : salt.acceptor.charge} = ${salt.formula} 🎉`; }

  const fb = document.getElementById('nacl-feedback');
  if (fb) {
    fb.className='feedback success';
    fb.textContent = `🎉 ${salt.name} 形成！Al³⁺ 与 ${nAcceptor} 个 ${salt.acceptor.charge} 形成离子键，化合价代数和 = 0 ✓  +25分`;
  }
  totalScore += 25; updateHeader();
  showToast(`✅ ${salt.formula} 形成！`);

  window._saltDone++;
  window._saltIdx++;

  if (window._saltDone >= 3) {
    window._lv3_nacl_done = true;

    checkLevel3Done();

}

function moveStep(idx, dir) {
  const order = window._playerOrder;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= order.length) return;
  [order[idx], order[newIdx]] = [order[newIdx], order[idx]];
  renderStepOrderList();
}

function runSteps() {
  const player = window._playerOrder;
  const correct = window._CORRECT_ORDER;
  const isCorrect = player.every((id, i) => id === correct[i]);

  const btn = document.getElementById('btn-run-steps');
  if (btn) btn.disabled = true;

  const fb = document.getElementById('kitchen-feedback');

  if (!isCorrect) {
    // Find first wrong step
    let firstWrong = -1;
    for (let i = 0; i < correct.length; i++) {
      if (player[i] !== correct[i]) { firstWrong = i; break; }
    }
    const wrongStep = window._STEPS_DEF.find(s => s.id === player[firstWrong]);
    const rightStep = window._STEPS_DEF.find(s => s.id === correct[firstWrong]);

    // Flash all step cards red
    document.querySelectorAll('#step-order-list .kitchen-step').forEach((el, i) => {
      if (player[i] !== correct[i]) el.style.borderColor = '#ff3366';
    });

    if (fb) {
      fb.className = 'feedback error';
      fb.textContent = `❌ 顺序错误！第${firstWrong+1}步应该是"${rightStep.icon}${rightStep.title}"，而不是"${wrongStep.icon}${wrongStep.title}"。重新排列再试！`;
    }
    if (btn) btn.disabled = false;
    // Reset border colors after 2s
    setTimeout(() => {
      document.querySelectorAll('#step-order-list .kitchen-step').forEach(el => el.style.borderColor = '');
    }, 2000);
    return;
  }

  // Correct! Run animations sequentially
  if (fb) { fb.className = 'feedback'; fb.textContent = '✅ 顺序正确！开始执行分离操作...'; }

  // Disable order buttons
  document.querySelectorAll('#step-order-list button').forEach(b => b.disabled = true);

  const stepEls = document.querySelectorAll('#step-order-list .kitchen-step');

  function runNext(i) {
    if (i >= correct.length) {
      if (fb) {
        fb.className = 'feedback success';
        fb.textContent = '🎉 全部分离完成！混合物完美分开！+20分奖励';
      }
      totalScore += 20; updateHeader();
      document.getElementById('btn-lv5-next').disabled = false;
      return;
    }
    const stepId = correct[i];
    const stepDef = window._STEPS_DEF.find(s => s.id === stepId);
    const stepEl = stepEls[i];

    // Highlight current step
    if (stepEl) {
      stepEl.classList.remove('available');
      stepEl.classList.add('done');
      stepEl.querySelector('.step-info .step-title').style.color = 'var(--accent3)';
    }

    if (fb) { fb.className = 'feedback'; fb.textContent = `⚙️ 执行第${i+1}步：${stepDef.icon} ${stepDef.title}...`; }

    stepDef.animate(() => {
      totalScore += 15; updateHeader();
      showToast(`✅ 第${i+1}步完成！+15分`);
      setTimeout(() => runNext(i + 1), 500);
    });
  }

  setTimeout(() => runNext(0), 400);
}

// ── individual animations (unchanged) ──
function svgAnimate(el, attrs, durationMs, cb) {
  // simple JS tween for SVG attributes
  const start = performance.now();
  const fromVals = {};
  const toVals = {};
  for (const k in attrs) {
    fromVals[k] = parseFloat(el.getAttribute(k)) || 0;
    toVals[k] = attrs[k];
  }
  function tick(now) {
    const t = Math.min((now - start) / durationMs, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    for (const k in attrs) {
      el.setAttribute(k, fromVals[k] + (toVals[k]-fromVals[k])*ease);
    }
    if (t < 1) requestAnimationFrame(tick);
    else if (cb) cb();
  }
  requestAnimationFrame(tick);
}

function animMagnet(done) {
  const mag = document.getElementById('g-magnet');
  const iron = document.getElementById('g-iron');
  const label = document.getElementById('sep-result-label');
  // show magnet, animate it down then iron fades
  mag.setAttribute('opacity','1');
  let y = 30;
  const t1 = setInterval(() => {
    y += 3;
    mag.setAttribute('transform', `translate(180,${y})`);
    if (y >= 130) {
      clearInterval(t1);
      // iron moves up toward magnet
      let oy = 0;
      const t2 = setInterval(() => {
        oy -= 4;
        iron.setAttribute('transform', `translate(0,${oy})`);
        if (oy <= -80) {
          clearInterval(t2);
          iron.setAttribute('opacity','0');
          mag.setAttribute('opacity','0');
          label.textContent = '✅ 铁屑已分离！';
          svgAnimate(label, {}, 0, null);
          label.setAttribute('fill','rgba(168,255,62,0.9)');
          setTimeout(done, 400);
        }
      }, 20);
    }
  }, 20);
}

function animFilter(done) {
  const filter = document.getElementById('g-filter');
  const sand   = document.getElementById('g-sand');
  const label  = document.getElementById('sep-result-label');
  filter.setAttribute('opacity','1');
  // sand shrinks and moves to funnel area
  let scale = 1;
  const t = setInterval(() => {
    scale -= 0.04;
    sand.setAttribute('transform', `translate(0,${(1-scale)*30}) scale(${Math.max(scale,0.01)})`);
    if (scale <= 0.02) {
      clearInterval(t);
      sand.setAttribute('opacity','0');
      label.textContent = '✅ 沙子已过滤！';
      label.setAttribute('fill','rgba(168,255,62,0.9)');
      setTimeout(done, 400);
    }
  }, 30);
}

function animEvaporate(done) {
  const evap  = document.getElementById('g-evaporate');
  const salt  = document.getElementById('g-salt');
  const label = document.getElementById('sep-result-label');
  evap.setAttribute('opacity','1');
  // salt ions drift upward and fade (steam)
  let oy = 0, op = 1;
  const t = setInterval(() => {
    oy -= 2; op -= 0.04;
    salt.setAttribute('transform', `translate(0,${oy})`);
    salt.setAttribute('opacity', Math.max(op,0));
    if (op <= 0) {
      clearInterval(t);
      // show salt crystal remaining
      label.textContent = '✅ 水分蒸发，食盐析出！';
      label.setAttribute('fill','rgba(168,255,62,0.9)');
      setTimeout(done, 500);
    }
  }, 40);
}

function animDistill(done) {
  const distill = document.getElementById('g-distill');
  const drop    = document.getElementById('water-drop');
  const label   = document.getElementById('sep-result-label');
  distill.setAttribute('opacity','1');
  // animate water drop appearing and dripping
  drop.setAttribute('opacity','0');
  let op = 0, cy = 140;
  const t = setInterval(() => {
    op = Math.min(op+0.05, 1);
    cy += 0.5;
    drop.setAttribute('opacity', op);
    drop.setAttribute('cy', cy);
    if (cy >= 160) {
      clearInterval(t);
      label.textContent = '✅ 纯净水已蒸馏获取！';
      label.setAttribute('fill','rgba(168,255,62,0.9)');
      setTimeout(done, 500);
    }
  }, 30);
}

function finishLevel5() {
  showToast('🏆 全部关卡通关！获得初级炼金术师勋章！');
  setTimeout(endGame, 1200);
}
