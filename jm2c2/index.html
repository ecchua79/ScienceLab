let l3={qi:0,slotCounts:[],animFrame:null};

function initL3(root){
  l3={qi:0,slotCounts:[],animFrame:null};
  root.innerHTML=`
  <div id="l3-target"></div>
  <div id="l3-eq-strip"><div class="l3-eq-lbl">配平方程式（拖入正确数量后逐步揭晓）</div><div id="l3-eq-row"></div></div>
  <div id="l3-main">
    <div id="l3-bench"></div>
    <div id="l3-pool"></div>
  </div>`;
  l3RenderQ();
}

function l3RenderQ(){
  const q=L3_QS[l3.qi];
  l3.slotCounts=Array(q.reactants.length).fill(0);
  if(l3.animFrame){cancelAnimationFrame(l3.animFrame);l3.animFrame=null;}
  l3BuildTarget(q);l3BuildEq(q);l3BuildBench(q);l3BuildPool(q);
}

function l3BuildTarget(q){
  const b=document.getElementById('l3-target');b.innerHTML='';
  const lbl=document.createElement('div');lbl.className='l3-tb-lbl';lbl.textContent='🎯 目标：生成';b.appendChild(lbl);
  q.products.forEach((p,i)=>{
    if(i>0){const pl=document.createElement('span');pl.className='l3-tb-plus';pl.textContent='+';b.appendChild(pl);}
    const m=L3_MOLS[p.key];const chip=document.createElement('div');chip.className='l3-tb-mol';
    chip.innerHTML=`<span>${m.icon}</span><span>${m.name}</span>`;b.appendChild(chip);
  });
  const h=document.createElement('div');h.className='l3-tb-hint';h.textContent='（放对数量后产物自动显现）';b.appendChild(h);
}

function l3BuildEq(q){
  const row=document.getElementById('l3-eq-row');row.innerHTML='';
  const all=[...q.reactants.map((r,i)=>({key:r.key,coeff:r.coeff,side:'l',si:i})),
             ...q.products.map((p,i)=>({key:p.key,coeff:p.coeff,side:'r',si:i}))];
  const ll=q.reactants.length;
  all.forEach((item,i)=>{
    if(i===ll){const a=document.createElement('span');a.className='l3-eq-arrow';a.textContent='→';row.appendChild(a);}
    else if(i>0){const p=document.createElement('span');p.className='l3-eq-plus';p.textContent='+';row.appendChild(p);}
    const m=L3_MOLS[item.key];
    const chip=document.createElement('span');chip.className='l3-eq-chip';chip.id=`l3ec-${i}`;
    chip.innerHTML=`<span class="l3-eq-n${item.coeff===1?' is-one':''}" id="l3en-${i}">?</span><span class="l3-eq-f" style="color:${m.color}">${m.name}</span>`;
    row.appendChild(chip);
  });
}

function l3BuildBench(q){
  const bench=document.getElementById('l3-bench');bench.innerHTML='';
  q.reactants.forEach((r,i)=>{
    if(i>0){const pl=document.createElement('div');pl.className='l3-bench-plus';pl.textContent='+';bench.appendChild(pl);}
    const col=document.createElement('div');col.className='l3-rcol';
    col.innerHTML='<div class="l3-rcol-lbl">反应物</div>';
    const slot=document.createElement('div');slot.className='l3-slot';slot.id=`l3s-${i}`;
    const badge=document.createElement('div');badge.className='l3-sbadge';badge.id=`l3sb-${i}`;badge.textContent='0';
    slot.appendChild(badge);
    slot.ondragover=e=>{e.preventDefault();slot.classList.add('drag-over');};
    slot.ondragleave=()=>slot.classList.remove('drag-over');
    slot.ondrop=e=>{e.preventDefault();slot.classList.remove('drag-over');if(e.dataTransfer.getData('mol')===r.key)l3Add(i);else showToast('❌ 分子放错格子了！');};
    col.appendChild(slot);bench.appendChild(col);
  });
  // arrow
  const arr=document.createElement('div');arr.className='l3-bench-arrow';arr.textContent='→';bench.appendChild(arr);
  // products
  const pzone=document.createElement('div');pzone.style.cssText='display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;';
  q.products.forEach((p,i)=>{
    if(i>0){const pl=document.createElement('div');pl.style.cssText='font-family:Fredoka One,cursive;font-size:1.2rem;color:var(--muted);align-self:center;margin-top:20px;';pl.textContent='+';pzone.appendChild(pl);}
    const col=document.createElement('div');col.className='l3-prod-col';col.innerHTML='<div class="l3-rcol-lbl">生成物</div>';
    const m=L3_MOLS[p.key];
    const card=document.createElement('div');card.className='l3-prod-card hidden';card.id=`l3p-${i}`;
    const cnt=document.createElement('div');cnt.className='l3-pc-cnt';cnt.textContent=`× ${p.coeff} 个`;card.appendChild(cnt);
    // structural display in product zone
    const sc=L3_POOL_SC[p.key]!=null?Math.min(L3_POOL_SC[p.key],.92):.88;
    const se=l3MkStruct(p.key,sc);
    if(se){
      const sw=document.createElement('div');sw.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;';
      sw.appendChild(se);
      const nl=document.createElement('div');nl.className='l3-pc-name';nl.style.color=m.color;nl.textContent=m.name;sw.appendChild(nl);
      card.appendChild(sw);
    } else {
      const ic=document.createElement('div');ic.className='l3-pc-icon';ic.textContent=m.icon;card.appendChild(ic);
      const nl=document.createElement('div');nl.className='l3-pc-name';nl.style.color=m.color;nl.textContent=m.name;card.appendChild(nl);
    }
    col.appendChild(card);pzone.appendChild(col);
  });
  bench.appendChild(pzone);
  const btn=document.createElement('button');btn.id='l3-react-btn';btn.textContent='💥 开始反应！';btn.style.opacity='.5';btn.onclick=l3React;bench.appendChild(btn);
}

function l3BuildPool(q){
  const pool=document.getElementById('l3-pool');pool.innerHTML='';
  [...q.pool].sort(()=>Math.random()-.5).forEach((key,idx)=>{
    const m=L3_MOLS[key];
    const el=document.createElement('div');el.className='l3-mol-card';
    el.style.cssText=`background:${m.bg};border-color:${m.color}55;box-shadow:0 3px 12px ${m.color}30;animation:popIn .3s cubic-bezier(.34,1.56,.64,1) ${idx*0.05}s both;`;
    const sc=L3_POOL_SC[key]??null;
    const se=sc!==null?l3MkStruct(key,sc):null;
    if(se){el.appendChild(se);}
    else{const ic=document.createElement('div');ic.className='l3-mc-icon';ic.textContent=m.icon;el.appendChild(ic);}
    const nl=document.createElement('div');nl.className='l3-mc-slabel';nl.textContent=m.name;el.appendChild(nl);
    el.dataset.mol=key;
    el.draggable=true;
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('mol',key);e.dataTransfer.effectAllowed='copy';setTimeout(()=>el.style.opacity='.2',0);});
    el.addEventListener('dragend',()=>el.style.opacity='1');
    el.addEventListener('click',()=>{
      const si=q.reactants.findIndex((r,i)=>r.key===key&&l3.slotCounts[i]<r.coeff);
      if(si>=0)l3Add(si);else showToast('⚠️ 这个分子不需要，或已足够！');
    });
    el.addEventListener('touchstart',e=>l3TouchStart(e,key,el),{passive:false});
    pool.appendChild(el);
  });
}

function l3Add(si){
  const q=L3_QS[l3.qi],r=q.reactants[si];
  if(l3.slotCounts[si]>=r.coeff){showToast(`⚠️ 这格最多放 ${r.coeff} 个！`);l3SlotShake(si);return;}
  l3.slotCounts[si]++;l3RenderSlot(si);l3CheckReveal(q);
}
function l3Remove(si){
  if(l3.slotCounts[si]<=0)return;
  l3.slotCounts[si]--;l3RenderSlot(si);l3CheckReveal(L3_QS[l3.qi]);
}
function l3SlotShake(si){const s=document.getElementById(`l3s-${si}`);s.classList.add('shake');setTimeout(()=>s.classList.remove('shake'),420);}

function l3RenderSlot(si){
  const q=L3_QS[l3.qi],r=q.reactants[si],m=L3_MOLS[r.key],count=l3.slotCounts[si];
  const slot=document.getElementById(`l3s-${si}`),badge=document.getElementById(`l3sb-${si}`);
  badge.textContent=count;
  const ok=count===r.coeff,over=count>r.coeff;
  badge.style.color=count===0?'var(--muted)':over?'var(--red)':ok?'var(--green)':'var(--gold)';
  badge.style.borderColor=count===0?'var(--border)':over?'rgba(248,113,113,.5)':ok?'rgba(74,222,128,.5)':'rgba(251,191,36,.4)';
  slot.querySelectorAll('.l3-stacked').forEach(e=>e.remove());
  for(let c=0;c<count;c++){
    const row=document.createElement('div');row.className='l3-stacked l3-struct';
    row.style.cssText=`border:1px solid ${m.color}44;background:rgba(255,255,255,.04);`;
    const sc=L3_POOL_SC[r.key]!=null?Math.min(L3_POOL_SC[r.key],.70):.65;
    const se=l3MkStruct(r.key,sc);if(se)row.appendChild(se);
    const nl=document.createElement('span');nl.style.cssText=`font-size:.5rem;color:${m.color};font-family:'Fredoka One',cursive;`;nl.textContent=m.name;row.appendChild(nl);
    row.onclick=()=>l3Remove(si);slot.appendChild(row);
  }
  slot.style.borderColor=ok?'rgba(74,222,128,.55)':count===0?'rgba(167,139,250,.28)':`${m.color}55`;
  // eq reveal
  const el=document.getElementById(`l3en-${si}`),chip=document.getElementById(`l3ec-${si}`);
  if(el&&chip){
    if(ok){el.textContent=r.coeff;el.classList.add('revealed');if(r.coeff===1)el.classList.add('is-one');chip.classList.add('slot-ok');}
    else{el.textContent='?';el.classList.remove('revealed');chip.classList.remove('slot-ok');}
  }
}

function l3CheckReveal(q){
  const allOk=q.reactants.every((r,i)=>l3.slotCounts[i]===r.coeff);
  q.products.forEach((p,i)=>{const card=document.getElementById(`l3p-${i}`);if(card){card.classList.toggle('hidden',!allOk);card.classList.toggle('revealed',allOk);}});
  const btn=document.getElementById('l3-react-btn');if(btn)btn.style.opacity=allOk?'1':'0.5';
}

function l3React(){
  const q=L3_QS[l3.qi];
  if(!q.reactants.every((r,i)=>l3.slotCounts[i]===r.coeff)){showToast('⚠️ 数量还不对！');return;}
  document.getElementById('l3-react-btn').disabled=true;

  // Flash
  const rxnOv=document.getElementById('l3-rxn-ov');
  rxnOv.innerHTML='<div class="rxn-flash"></div>';rxnOv.classList.add('show');
  setTimeout(()=>rxnOv.classList.remove('show'),700);

  // Get slot centers & product card centers
  const slotCenters=q.reactants.map((_,i)=>{const r=document.getElementById(`l3s-${i}`).getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};});
  const prodCenters=q.products.map((_,i)=>{const el=document.getElementById(`l3p-${i}`);if(!el)return{x:window.innerWidth/2,y:200};const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};});

  // Phase 1: shake & break atoms out
  q.reactants.forEach((_,si)=>{const slot=document.getElementById(`l3s-${si}`);slot.classList.add('l3-breaking');setTimeout(()=>slot.classList.remove('l3-breaking'),350);});
  (q.slotBreak||[]).forEach((atoms,si)=>{
    const sc=slotCenters[si];
    atoms.forEach(a=>{
      const col=L3_AC[a.sym]||'#aaa',sz=L3_ATOM_SZ[a.sym]||16;
      const el=document.createElement('div');el.className='l3-atom-fly';
      el.style.cssText=`width:${sz}px;height:${sz}px;font-size:${sz*.48}px;background:radial-gradient(circle at 35% 35%,${col}dd,${col}77);border:2px solid ${col};left:${sc.x-sz/2}px;top:${sc.y-sz/2}px;box-shadow:0 0 10px ${col}99;animation:l3AtomBreak .65s cubic-bezier(.15,.85,.35,1) ${a.del}ms forwards;--dx:${a.dx}px;--dy:${a.dy}px;`;
      el.textContent=a.sym;document.body.appendChild(el);setTimeout(()=>el.remove(),a.del+900);
    });
  });
  // Sparks
  slotCenters.forEach(sc=>{
    for(let i=0;i<8;i++){const el=document.createElement('div');el.className='l3-spark';const ang=Math.random()*Math.PI*2,d=20+Math.random()*50;el.style.cssText=`width:4px;height:4px;background:${q.sparkColor||'#a78bfa'};box-shadow:0 0 6px ${q.sparkColor||'#a78bfa'};left:${sc.x}px;top:${sc.y}px;animation:l3SparkFly .45s ease-out ${i*20}ms forwards;--dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d}px;`;document.body.appendChild(el);setTimeout(()=>el.remove(),600);}
  });
  // Fade slots
  setTimeout(()=>document.querySelectorAll('.l3-stacked').forEach(e=>{e.style.transition='opacity .22s';e.style.opacity='0';}),260);

  // Phase 2: atoms fly into product cards
  const fDel=680;
  (q.prodForms||[]).forEach((atoms,pi)=>{
    const pc=prodCenters[pi]||prodCenters[0];
    atoms.forEach((a,ai)=>{
      const col=L3_AC[a.sym]||'#aaa',sz=L3_ATOM_SZ[a.sym]||16;
      const tx=pc.x+(a.ox||0),ty=pc.y+(a.oy||0);
      const srcSl=slotCenters[a.src!=null?Math.min(a.src,slotCenters.length-1):0];
      const sx=srcSl.x+(Math.random()-.5)*60,sy=srcSl.y+(Math.random()-.5)*40;
      const el=document.createElement('div');el.className='l3-atom-fly';
      el.style.cssText=`width:${sz}px;height:${sz}px;font-size:${sz*.48}px;background:radial-gradient(circle at 35% 35%,${col}dd,${col}77);border:2px solid ${col};left:${tx-sz/2}px;top:${ty-sz/2}px;box-shadow:0 0 10px ${col}99;animation:l3AtomForm .6s cubic-bezier(.25,.46,.45,.94) ${fDel+ai*40+pi*80}ms forwards;--sx:${sx-tx}px;--sy:${sy-ty}px;opacity:0;`;
      el.textContent=a.sym;document.body.appendChild(el);setTimeout(()=>el.remove(),fDel+ai*40+pi*80+900);
    });
  });

  // Phase 3: reveal product cards with struct pop
  setTimeout(()=>{
    q.products.forEach((_,i)=>{
      const card=document.getElementById(`l3p-${i}`);if(!card)return;
      card.classList.remove('hidden');card.classList.add('revealed');
      card.querySelectorAll('.l3-ms,.l3-h2o-s').forEach(se=>se.classList.add('l3-struct-reveal'));
    });
    // reveal product eq chips
    q.products.forEach((p,i)=>{
      const idx=q.reactants.length+i;
      const el=document.getElementById(`l3en-${idx}`),chip=document.getElementById(`l3ec-${idx}`);
      if(el){setTimeout(()=>{el.textContent=p.coeff;el.classList.add('revealed');if(p.coeff===1)el.classList.add('is-one');if(chip)chip.classList.add('slot-ok');},i*120);}
    });
  },fDel+350+(q.prodForms||[]).length*80);

  setTimeout(()=>{
    addScore(20);spawnParticles(true);
    const lStr=q.reactants.map(r=>(r.coeff>1?r.coeff:'')+L3_MOLS[r.key].name).join(' + ');
    const rStr=q.products.map(p=>(p.coeff>1?p.coeff:'')+L3_MOLS[p.key].name).join(' + ');
    const isLast=l3.qi>=L3_QS.length-1;
    showLvOverlay({emoji:isLast?'🏆':'🎉',eq:`${lStr} → ${rStr}`,
      title:isLast?'第三关全部通关！':`${q.name} 成功！`,
      sub:isLast?`所有反应完成！准备领取证书吧！`:'+20分！分子重组，质量守恒！',
      card:`<strong>📖 ${q.name}：</strong><br><br>${q.explain}`,
      btnText:isLast?'🏆 领取证书':'下一题 →',gold:isLast,
      onNext:()=>{l3.qi++;if(l3.qi>=L3_QS.length){onLevelCleared(3);}else{l3RenderQ();}}});
  },fDel+1400);
}

function l3TouchStart(e,key,el){
  e.preventDefault();
  const m=L3_MOLS[key],t=e.touches[0];
  const g=document.getElementById('drag-ghost');
  g.style.cssText=`display:flex;background:${m.bg};border:2px solid ${m.color}55;border-radius:16px;left:${t.clientX}px;top:${t.clientY}px;width:68px;height:68px;`;
  g.innerHTML=`<div style="font-size:1.4rem">${m.icon}</div><div style="font-family:'Fredoka One',cursive;font-size:.6rem;color:${m.color}">${m.name}</div>`;
  el.style.opacity='.2';
  const q=L3_QS[l3.qi];
  const tm=e2=>{e2.preventDefault();const t2=e2.touches[0];g.style.left=t2.clientX+'px';g.style.top=t2.clientY+'px';
    document.querySelectorAll('.l3-slot').forEach(slot=>{const r=slot.getBoundingClientRect();slot.classList.toggle('drag-over',t2.clientX>r.left&&t2.clientX<r.right&&t2.clientY>r.top&&t2.clientY<r.bottom);});};
  const te=e2=>{document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',te);
    g.style.display='none';el.style.opacity='1';
    const t2=e2.changedTouches[0];
    document.querySelectorAll('.l3-slot').forEach((slot,i)=>{slot.classList.remove('drag-over');const r=slot.getBoundingClientRect();
      if(t2.clientX>r.left&&t2.clientX<r.right&&t2.clientY>r.top&&t2.clientY<r.bottom){if(q.reactants[i]&&q.reactants[i].key===key)l3Add(i);else showToast('❌ 分子放错格子了！');}});};
  document.addEventListener('touchmove',tm,{passive:false});
  document.addEventListener('touchend',te);
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
initBg();animBg();renderHome();
</script>
