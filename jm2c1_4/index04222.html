// 华仁中学蔡逸众制作
function hollow(li, r, c) {
  if (li === 2) return r >= 3 && r <= 5 && c >= 3 && c <= 5; // 3x3 centre
  if (li === 3) { // cross shape: rows 4-5 cols 3-6 + cols 4-5 rows 3-6
    if (r >= 4 && r <= 5 && c >= 3 && c <= 6) return true;
    if (c >= 4 && c <= 5 && r >= 3 && r <= 6) return true;
  }
  return false;
}

// ─── Pure helpers ─────────────────────────────────────────────────────────────
// Made by ecchua79
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function fmtTime(s) { return pad2(Math.floor(s / 60)) + ':' + pad2(s % 60); }
function fmtDate(d) {
  return d.getFullYear() + '年' + pad2(d.getMonth()+1) + '月' + pad2(d.getDate()) + '日 ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}

// 峇株吧辖华仁中学蔡逸众制作
function straight(p1, p2, board) {
  if (p1.r === p2.r) {
    var lo = Math.min(p1.c, p2.c), hi = Math.max(p1.c, p2.c);
    for (var c = lo + 1; c < hi; c++) if (board[p1.r][c]) return false;
    return true;
  }
  if (p1.c === p2.c) {
    var lo2 = Math.min(p1.r, p2.r), hi2 = Math.max(p1.r, p2.r);
    for (var r = lo2 + 1; r < hi2; r++) if (board[r][p1.c]) return false;
    return true;
  }
  return false;
}

function findPath(p1, p2, board, N) {
  if ((p1.r === p2.r || p1.c === p2.c) && straight(p1, p2, board)) return [p1, p2];
  var corners = [{r:p1.r,c:p2.c},{r:p2.r,c:p1.c}];
  for (var k = 0; k < corners.length; k++) {
    var cn = corners[k];
    if (!board[cn.r][cn.c] && straight(p1,cn,board) && straight(cn,p2,board)) return [p1,cn,p2];
  }
  for (var c2 = 0; c2 < N; c2++) {
    if (c2 === p1.c) continue;
    var a = {r:p1.r,c:c2};
    if (board[a.r][a.c]) continue;
    if (straight(p1,a,board)) {
      var b = {r:p2.r,c:c2};
      if (!board[b.r][b.c] && straight(a,b,board) && straight(b,p2,board)) return [p1,a,b,p2];
    }
  }
  for (var r2 = 0; r2 < N; r2++) {
    if (r2 === p1.r) continue;
    var a2 = {r:r2,c:p1.c};
    if (board[a2.r][a2.c]) continue;
    if (straight(p1,a2,board)) {
      var b2 = {r:r2,c:p2.c};
      if (!board[b2.r][b2.c] && straight(a2,b2,board) && straight(b2,p2,board)) return [p1,a2,b2,p2];
    }
  }
  return null;
}

// 华仁中学蔡逸众制作
function findHint(board, bs, N, li) {
  var tiles = [];
  for (var r = 1; r <= bs; r++) for (var c = 1; c <= bs; c++)
    if (board[r][c] && !hollow(li,r,c)) tiles.push({r:r,c:c,t:board[r][c]});
  for (var i = 0; i < tiles.length; i++) for (var j = i+1; j < tiles.length; j++) {
    var a = tiles[i], b = tiles[j];
    if (a.t.id === b.t.id && a.t.type !== b.t.type)
      if (findPath({r:a.r,c:a.c},{r:b.r,c:b.c},board,N)) return [{r:a.r,c:a.c},{r:b.r,c:b.c}];
  }
  return null;
}

function hasMoves(board, bs, N, li) { return !!findHint(board,bs,N,li); }

// 峇株吧辖蔡逸众制作
function reShuffle(board, bs, N, li) {
  var b = board.map(function(row){ return row.slice(); });
  for (var attempt = 0; attempt < 20; attempt++) {
    var tiles = [], pos = [];
    for (var r = 1; r <= bs; r++) for (var c = 1; c <= bs; c++)
      if (b[r][c] && !hollow(li,r,c)) { tiles.push(b[r][c]); pos.push({r:r,c:c}); }
    var sh = shuffle(tiles);
    for (var i = 0; i < pos.length; i++) b[pos[i].r][pos[i].c] = sh[i];
    if (hasMoves(b,bs,N,li)) break;
  }
  return b;
}

function makeBoard(cfg, li) {
  var bs = cfg.bs, N = bs + 2;
  var src = EL.slice(0, cfg.pairs);
  var tiles = [];
  for (var i = 0; i < src.length; i++) {
    tiles.push({id:src[i].id,type:'name',  val:src[i].name, cat:src[i].cat});
    tiles.push({id:src[i].id,type:'symbol',val:src[i].sym,  cat:src[i].cat});
  }
  tiles = shuffle(tiles);
  var board = [];
  for (var r = 0; r < N; r++) { board.push([]); for (var c = 0; c < N; c++) board[r].push(null); }
  var idx = 0;
  for (var r2 = 1; r2 <= bs; r2++) for (var c2 = 1; c2 <= bs; c2++) {
    if (!hollow(li,r2,c2)) board[r2][c2] = tiles[idx++];
  }
  if (!hasMoves(board,bs,N,li)) board = reShuffle(board,bs,N,li);
  return board;
}

// ─── Canvas line drawing (fixed overlay outside board) ────────────────────────

function drawLine(pts, boardEl, bs) {
  var cv = document.getElementById('cv');
  if (!cv || !boardEl || pts.length < 2) return;
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  var rect = boardEl.getBoundingClientRect();
  var pad = 5;
  var cw = (rect.width - pad*2) / bs;
  var ch = (rect.height - pad*2) / bs;
  var coords = pts.map(function(p){ return {x: rect.left+pad+(p.c-1)*cw+cw/2, y: rect.top+pad+(p.r-1)*ch+ch/2}; });
  function stroke(color, lw, blur, alpha) {
    ctx.beginPath();
    ctx.moveTo(coords[0].x, coords[0].y);
    for (var i = 1; i < coords.length; i++) ctx.lineTo(coords[i].x, coords[i].y);
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = blur;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
  stroke('rgba(0,245,255,1)', 28, 40, 0.10);
  stroke('rgba(0,245,255,1)', 14, 16, 0.35);
  stroke('rgba(0,245,255,1)',  6,  6, 0.80);
  stroke('#ffffff', 2, 0, 1.0);
  for (var i = 0; i < coords.length; i++) {
    var p = coords[i], big = (i === 0 || i === coords.length-1);
    ctx.beginPath(); ctx.arc(p.x,p.y,big?10:5,0,Math.PI*2);
    ctx.fillStyle='rgba(0,245,255,0.25)'; ctx.shadowColor='#00f5ff'; ctx.shadowBlur=14; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,big?5:3,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.shadowBlur=0; ctx.fill();
  }
}
function clearLine() {

// ─── SCORING ─────────────────────────────────────────────────────────────────
// 华仁中学蔡逸众制作
function calcScore(levelCount, totalTime, skills) {
  var base = levelCount >= 5 ? 4600 : levelCount >= 4 ? 3400 : 2400;
  var timePenalty = totalTime;
  var skillPenalty = skills.hint * 30 + skills.shuf * 50 + skills.swap * 80;
  var noSkill = (skills.hint + skills.shuf + skills.swap) === 0;
  var speedBonus = 0;
  if (levelCount <= 3 && totalTime <= 210) speedBonus = 150;
  if (levelCount >= 5 && totalTime <= 600) speedBonus = 250;
  var noSkillBonus = noSkill ? 200 : 0;
  var comboBonus = (noSkill && speedBonus > 0) ? 100 : 0;
  var score = base - timePenalty - skillPenalty + noSkillBonus + speedBonus + comboBonus;
  return score;
}

function calcGrade(score, levelCount) {
  var thresholds;
  if (levelCount >= 5) {
    thresholds = {sp:4635, s:4120, a:3605, b:3090};
  } else if (levelCount >= 4) {
    thresholds = {sp:3510, s:3120, a:2730, b:2340};
  } else {
    thresholds = {sp:2565, s:2280, a:1995, b:1710};
  }
  if (score >= thresholds.sp) return 'S+';
  if (score >= thresholds.s)  return 'S';
  if (score >= thresholds.a)  return 'A';
  if (score >= thresholds.b)  return 'B';
  return 'C';
}

// 峇株吧辖蔡逸众制作
// ─── CANVAS CERTIFICATE DOWNLOAD ─────────────────────────────────────────────
function downloadCert(props) {
  var n = props.levelCount;
  var names = ['','一','二','三','四','五'];
  var accent = n >= 5 ? '#f59e0b' : n >= 4 ? '#06b6d4' : '#00f5ff';
  var certTitle = n >= 5 ? '五关通关证书' : n >= 4 ? '四关通关证书' : '通关证书';
  var grade = props.grade;
  var gi = props.gradeInfo;
  var W = 600, H = 840;
  var cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  var ctx = cv.getContext('2d');

  // Background
  var bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0f172a'); bg.addColorStop(1,'#1e1b4b');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  roundRect(ctx, 10, 10, W-20, H-20, 20);
  ctx.stroke();

  // Top accent bar
  var bar = ctx.createLinearGradient(0,0,W,0);
  if (n >= 5) { bar.addColorStop(0,'#d97706'); bar.addColorStop(.5,'#f59e0b'); bar.addColorStop(1,'#d97706'); }
  else if (n >= 4) { bar.addColorStop(0,'#0e7490'); bar.addColorStop(.5,'#06b6d4'); bar.addColorStop(1,'#0e7490'); }
  else { bar.addColorStop(0,'#7c3aed'); bar.addColorStop(.5,'#00f5ff'); bar.addColorStop(1,'#7c3aed'); }
  ctx.fillStyle = bar; ctx.fillRect(10, 10, W-20, 6);

  // Medal circle
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2, 115, 40, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
  ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();
  ctx.font = '38px serif'; ctx.textAlign = 'center';
  ctx.fillText(n >= 5 ? '💎' : n >= 4 ? '⭐' : '⚗', W/2, 128);

  // CHEMISTRY MASTER
  ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  ctx.fillStyle = accent; ctx.globalAlpha = 0.75;
  ctx.fillText('CHEMISTRY  ·  MASTER', W/2, 175);
  ctx.globalAlpha = 1;

  // Cert title
  ctx.font = 'bold 26px "Segoe UI", sans-serif';
  ctx.fillStyle = '#e2e8f0'; ctx.textAlign = 'center';
  ctx.fillText(certTitle, W/2, 212);

  // Divider
  var div = ctx.createLinearGradient(W/2-60,0,W/2+60,0);
  div.addColorStop(0,'transparent'); div.addColorStop(.5,accent); div.addColorStop(1,'transparent');
  ctx.strokeStyle = div; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2-60,222); ctx.lineTo(W/2+60,222); ctx.stroke();

  // Name box
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 60, 238, W-120, 68, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  roundRect(ctx, 60, 238, W-120, 68, 10); ctx.stroke();
  ctx.font = '11px sans-serif'; ctx.fillStyle = 'rgba(148,163,184,0.6)'; ctx.textAlign = 'center';
  ctx.fillText('此证书颁发给', W/2, 258);
  ctx.font = 'bold 32px "Segoe UI", sans-serif'; ctx.fillStyle = accent;
  ctx.fillText(props.name, W/2, 293);

  // Achievement text
  ctx.font = '14px "Segoe UI", sans-serif'; ctx.fillStyle = 'rgba(203,213,225,0.75)'; ctx.textAlign = 'center';
  var line1 = n >= 5 ? '已成功挑战全部五个关卡，' : '已成功通过前' + names[n] + '关，';
  ctx.fillText(line1, W/2, 338);
  ctx.fillText('展现出色的化学元素掌握能力。', W/2, 360);

  // Grade + Score block
  ctx.fillStyle = gi.color + '18';
  roundRect(ctx, 60, 375, W-120, 90, 12); ctx.fill();
  ctx.strokeStyle = gi.color + '55'; ctx.lineWidth = 1.5;
  roundRect(ctx, 60, 375, W-120, 90, 12); ctx.stroke();

  ctx.font = '11px monospace'; ctx.fillStyle = 'rgba(148,163,184,0.5)'; ctx.textAlign = 'center';
  ctx.fillText('综合评级', W/2, 395);
  ctx.font = 'bold 44px "Segoe UI", sans-serif';
  ctx.fillStyle = gi.color;
  ctx.shadowColor = gi.color; ctx.shadowBlur = 16;
  ctx.fillText(grade, W/2 - 60, 445);
  ctx.shadowBlur = 0;
  ctx.font = 'bold 16px "Segoe UI", sans-serif'; ctx.fillStyle = gi.color;
  ctx.textAlign = 'left';
  ctx.fillText(gi.label, W/2 - 20, 425);
  ctx.font = '18px sans-serif'; ctx.fillStyle = gi.color;
  ctx.fillText(props.stars, W/2 - 20, 448);
  ctx.font = 'bold 28px "Segoe UI", monospace'; ctx.fillStyle = gi.color;
  ctx.textAlign = 'right';
  ctx.fillText(props.score + ' 分', W - 70, 440);

  // Stats row
  var stats = [
    {label:'总完成时间', val:fmtTime(props.totalTime), col:'#00f5ff'},
    {label:'完成关卡',   val:names[n]+'关',            col:'#10b981'},
    {label:'消除元素',   val:props.totalPairs+'对',    col:'#a78bfa'},
    {label:'技能总次数', val:(props.skills.hint+props.skills.shuf+props.skills.swap)+'次', col:'#f59e0b'}
  ];
  var sx = 50, sy = 480, sw = (W-100)/4, sh = 72;
  stats.forEach(function(st, i) {
    var bx = sx + i*sw;
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(ctx, bx+3, sy, sw-6, sh, 8); ctx.fill();
    ctx.fillStyle = st.col; ctx.font = 'bold 15px "Segoe UI", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(st.val, bx+sw/2, sy+30);
    ctx.fillStyle = 'rgba(148,163,184,0.5)'; ctx.font = '10px sans-serif';
    ctx.fillText(st.label, bx+sw/2, sy+50);
  });

  // Skill breakdown header
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  roundRect(ctx, 60, 575, W-120, 140, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  roundRect(ctx, 60, 575, W-120, 140, 10); ctx.stroke();

  ctx.font = '10px monospace'; ctx.fillStyle = 'rgba(148,163,184,0.4)'; ctx.textAlign = 'center';
  ctx.fillText('—  技能使用明细  —', W/2, 593);

  // Skill rows
  var skills = [
    {e:'💡', l:'提示',  v:props.skills.hint, c:'#fbbf24'},
    {e:'🔀', l:'洗牌',  v:props.skills.shuf, c:'#00f5ff'},
    {e:'↔',  l:'换位',  v:props.skills.swap, c:'#a855f7'}
  ];
  skills.forEach(function(sk, i) {
    var ry = 609 + i*38;
    // divider line (except last)
    if (i > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(75, ry-8); ctx.lineTo(W-75, ry-8); ctx.stroke();
    }
    ctx.font = '14px serif'; ctx.textAlign = 'left'; ctx.fillStyle = '#e2e8f0';
    ctx.fillText(sk.e, 80, ry+12);
    ctx.font = '12px "Segoe UI", sans-serif'; ctx.fillStyle = 'rgba(203,213,225,0.7)';

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function AutoSubmit(props) {
  // props: name, score, grade, levelCount, totalTime, skills
  var _status = useState('pending'); var status = _status[0]; var setStatus = _status[1];

  useEffect(function() {
    var attempts = 0;

      if (window.fbSubmitScore) {
        window.fbSubmitScore(
          props.name, props.score, props.grade,
          props.levelCount, props.totalTime, props.skills
        ).then(function(ok){ setStatus(ok ? 'done' : 'offline'); });
      } else if (attempts < 20) {
        attempts++;
        setTimeout(trySubmit, 250);
      } else {
        setStatus('offline'); // Firebase never loaded
      }
    }
    trySubmit();
  }, []); // run once on mount

  if (status === 'done') return (
    <div style={{textAlign:'center',fontSize:'11px',color:'rgba(16,185,129,.8)',marginBottom:'6px',display:'flex',alignItems:'center',justifyContent:'center',gap:'5px'}}>

    <div style={{textAlign:'center',fontSize:'11px',color:'rgba(148,163,184,.45)',marginBottom:'6px'}}>
      正在上传分数…
    </div>
  );
  // offline — silent, show nothing to avoid confusing players
  return null;
}

            <button onClick={exportCSV} disabled={rows.length===0} className="btn" style={{background:'linear-gradient(135deg,rgba(16,185,129,.2),rgba(16,185,129,.1))',border:'1px solid rgba(16,185,129,.4)',borderRadius:'9px',padding:'8px 16px',color:'#10b981',fontWeight:700,fontSize:'12px'}}>
              ⬇ 导出 CSV
            </button>
            <button onClick={props.onClose} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'9px',padding:'8px 14px',color:'rgba(203,213,225,.8)',cursor:'pointer',fontSize:'13px',fontWeight:600}}>关闭</button>
          </div>

        <div style={{overflowY:'auto',flex:1}}>
          {loading && <div style={{textAlign:'center',padding:'50px',color:'rgba(148,163,184,.5)',fontSize:'13px'}}>正在加载所有记录…</div>}
          {!loading && rows.length === 0 && <div style={{textAlign:'center',padding:'50px',color:'rgba(148,163,184,.5)',fontSize:'13px'}}>暂无记录</div>}
          {!loading && rows.length > 0 && (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
              <thead>
                <tr style={{background:'rgba(255,255,255,.04)',position:'sticky',top:0}}>
                  {['#','姓名','分数','级','关卡','用时','提示','洗牌','换位'].map(function(h){
                    return <th key={h} style={{padding:'9px 10px',textAlign:'left',color:'rgba(148,163,184,.6)',fontWeight:700,borderBottom:'1px solid rgba(255,255,255,.06)',whiteSpace:'nowrap'}}>{h}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {rows.map(function(r, i) {
                  var gc = gradeColors[r.grade] || '#94a3b8';
                  var isTop3 = i < 3;
                  return (
                    <tr key={i} style={{background:i%2===0?'rgba(255,255,255,.02)':'transparent',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                      <td style={{padding:'8px 10px',color:isTop3?'#f59e0b':'rgba(148,163,184,.5)',fontWeight:isTop3?900:400}}>
                        {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
                      </td>
                      <td style={{padding:'8px 10px',color:'#e2e8f0',fontWeight:600,maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</td>
                      <td style={{padding:'8px 10px',color:gc,fontWeight:800,fontFamily:'monospace'}}>{r.score}</td>
                      <td style={{padding:'8px 10px',color:gc,fontWeight:900}}>{r.grade}</td>
                      <td style={{padding:'8px 10px',color:'rgba(148,163,184,.7)'}}>{levelNames[r.levelCount]||'?'}关</td>
                      <td style={{padding:'8px 10px',color:'rgba(148,163,184,.7)',fontFamily:'monospace'}}>{fmtTime(r.totalTime||0)}</td>
                      <td style={{padding:'8px 10px',color:'rgba(251,191,36,.8)',textAlign:'center'}}>{r.hint||0}</td>
                      <td style={{padding:'8px 10px',color:'rgba(0,245,255,.8)',textAlign:'center'}}>{r.shuf||0}</td>
                      <td style={{padding:'8px 10px',color:'rgba(168,85,247,.8)',textAlign:'center'}}>{r.swap||0}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
        <div style={{padding:'8px 16px',borderTop:'1px solid rgba(255,255,255,.06)',flexShrink:0,textAlign:'center',fontSize:'10px',color:'rgba(148,163,184,.3)'}}>
          峇株吧辖华仁中学 · 管理员专用
        </div>
      </div>
    </div>
  );
}

function AdminLogin(props) {
  var _pw = useState(''); var pw = _pw[0]; var setPw = _pw[1];
  var _err = useState(false); var err = _err[0]; var setErr = _err[1];
  function tryLogin() {
    if (pw === ADMIN_PASS) { props.onSuccess(); }
    else { setErr(true); setPw(''); setTimeout(function(){ setErr(false); }, 2000); }
  }
  return (
    <div style={{position:'fixed',inset:0,zIndex:400,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(10,14,26,.92)',backdropFilter:'blur(12px)',padding:'20px'}}>
      <div style={{background:'linear-gradient(160deg,#0f172a,#1a1040)',border:'1px solid rgba(245,158,11,.3)',borderRadius:'16px',padding:'30px 26px',width:'100%',maxWidth:'300px',textAlign:'center',animation:'zoomIn .3s ease-out'}}>
        <div style={{fontSize:'36px',marginBottom:'10px'}}>🔑</div>
        <div style={{fontSize:'16px',fontWeight:900,color:'#f59e0b',marginBottom:'16px'}}>管理员入口</div>
        <input
          type="password" value={pw} autoFocus
          onChange={function(e){ setPw(e.target.value); setErr(false); }}
          onKeyDown={function(e){ if(e.key==='Enter') tryLogin(); }}
          placeholder="请输入密码"
          style={{width:'100%',background:'rgba(255,255,255,.07)',border:'1px solid '+(err?'rgba(248,113,113,.6)':'rgba(245,158,11,.35)'),borderRadius:'9px',padding:'11px 12px',color:'#e2e8f0',fontSize:'15px',outline:'none',marginBottom:'6px',textAlign:'center',letterSpacing:'3px'}}
        />
        {err && <div style={{fontSize:'11px',color:'#f87171',marginBottom:'8px'}}>密码错误，请重试</div>}
        {!err && <div style={{height:'19px',marginBottom:'8px'}}/>}
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={props.onClose} style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'9px',padding:'10px',color:'rgba(203,213,225,.7)',cursor:'pointer',fontSize:'13px',fontWeight:600}}>取消</button>
          <button onClick={tryLogin} className="btn" style={{flex:1,background:'linear-gradient(135deg,#d97706,#f59e0b)',border:'none',borderRadius:'9px',padding:'10px',color:'#000',fontWeight:800,fontSize:'13px'}}>进入</button>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN GAME ────────────────────────────────────────────────────────────────
// 峇株吧辖华仁中学蔡逸众制作
function App() {
  var _scr = useState('welcome'); var screen = _scr[0]; var setScreen = _scr[1];
  var _li = useState(0);   var li = _li[0];   var setLi = _li[1];
  var _board = useState(null); var board = _board[0]; var setBoard = _board[1];
  var _sel = useState(null);   var sel = _sel[0];   var setSel = _sel[1];
  var _path = useState([]);    var path = _path[0]; var setPath = _path[1];
  var _mat = useState(0);      var mat = _mat[0];   var setMat = _mat[1];
  var _busy = useState(false);  var busy = _busy[0];  var setBusy = _busy[1];
  var _fade = useState([]);    var fade = _fade[0]; var setFade = _fade[1];
  var _time = useState(0);     var time = _time[0]; var setTime = _time[1];
  var _hint = useState(0);     var hintN = _hint[0]; var setHint = _hint[1];
  var _shuf = useState(0);     var shufN = _shuf[0]; var setShuf = _shuf[1];
  var _swap = useState(0);     var swapN = _swap[0]; var setSwap = _swap[1];
  var _swMode = useState(false); var swMode = _swMode[0]; var setSwMode = _swMode[1];
  var _swFirst = useState(null); var swFirst = _swFirst[0]; var setSwFirst = _swFirst[1];
  var _htiles = useState([]); var htiles = _htiles[0]; var setHtiles = _htiles[1];
  var _notice = useState(''); var notice = _notice[0]; var setNotice = _notice[1];
  var _parts = useState([]); var parts = _parts[0]; var setParts = _parts[1];
  var _phase = useState('playing'); var phase = _phase[0]; var setPhase = _phase[1];
  var _doneN = useState(0); var doneN = _doneN[0]; var setDoneN = _doneN[1];
  var _totTime = useState(0); var totTime = _totTime[0]; var setTotTime = _totTime[1];
  var _totSk = useState({hint:0,shuf:0,swap:0}); var totSk = _totSk[0]; var setTotSk = _totSk[1];
  var _pname = useState(''); var pname = _pname[0]; var setPname = _pname[1];
  var _cat = useState(''); var cat = _cat[0]; var setCat = _cat[1];
  var _score = useState(0); var finalScore = _score[0]; var setFinalScore = _score[1];
  var _showLB = useState(false); var showLB = _showLB[0]; var setShowLB = _showLB[1];
  var _showAdminLogin = useState(false); var showAdminLogin = _showAdminLogin[0]; var setShowAdminLogin = _showAdminLogin[1];
  var _showAdmin = useState(false); var showAdmin = _showAdmin[0]; var setShowAdmin = _showAdmin[1];
  var boardRef = useRef(null);
  var pidRef = useRef(0);
  var skRef = useRef({hint:0,shuf:0,swap:0});

  var cfg = LEVELS[li] || LEVELS[4];
  var bs = cfg.bs;
  var N = bs + 2;

  // Draw / clear line whenever path changes
  useEffect(function(){
    if (path.length >= 2) drawLine(path, boardRef.current, bs);
    else clearLine();
  }, [path, bs]);

  useEffect(function(){ return function(){ clearLine(); }; }, []);

  // Timer
  useEffect(function(){
    if (screen !== 'playing' || phase !== 'playing') return;
    var t = setInterval(function(){ setTime(function(p){ return p+1; }); }, 1000);
    return function(){ clearInterval(t); };
  }, [screen, phase]);

  function notify(msg) {
    setNotice(msg);
    setTimeout(function(){ setNotice(''); }, 2200);
  }

  function spawnParticles(r1, c1, r2, c2) {
    var step = 100 / bs;
    var colors = ['#00f5ff','#7c3aed','#10b981','#f59e0b','#ec4899'];
    var np = [];
    [[r1,c1],[r2,c2]].forEach(function(rc){
      var x = (rc[1]-1)*step+step/2, y = (rc[0]-1)*step+step/2;
      for (var i = 0; i < 8; i++) {
        var a = Math.PI*2*i/8;
        np.push({id:pidRef.current++,x:x,y:y,dx:Math.cos(a)*(15+Math.random()*25),dy:Math.sin(a)*(15+Math.random()*25),sz:4+Math.random()*4,color:colors[Math.floor(Math.random()*colors.length)],dur:500+Math.random()*300,delay:Math.random()*100});
      }
    });
    setParts(function(p){ return p.concat(np); });
    setTimeout(function(){
      var ids = np.map(function(x){ return x.id; });
      setParts(function(p){ return p.filter(function(x){ return ids.indexOf(x.id)<0; }); });
    }, 1000);
  }

  function initLevel(idx, carryTime) {
    var c = LEVELS[idx];
    setBoard(makeBoard(c, idx));
    setSel(null); setPath([]); setMat(0); setTime(carryTime||0);
    setHint(c.hint); setShuf(c.shuf); setSwap(c.swap);
    setSwMode(false); setSwFirst(null); setHtiles([]);
    setNotice(''); setParts([]); setFade([]); setPhase('playing');
    skRef.current = {hint:0,shuf:0,swap:0};
    clearLine();
  }

  function resetAll() {
    setLi(0); setTotTime(0); setTotSk({hint:0,shuf:0,swap:0}); setDoneN(0);
    setFinalScore(0); setSubmitted(false); setScreen('welcome'); clearLine();
  }

  function doShuffle(currentBoard, isAuto) {
    var nb = reShuffle(currentBoard, bs, N, li);
    setBoard(nb); setSel(null); setHtiles([]); setSwMode(false); setSwFirst(null); setPath([]);
    if (isAuto) notify('💥 死锁！已自动洗牌');
    else { setShuf(function(p){ return p-1; }); skRef.current.shuf++; }
    return nb;
  }

  function handleHint() {
    if (hintN <= 0 || busy || !board) return;
    var pair = findHint(board, bs, N, li);
    if (pair) { setHtiles(pair); setHint(function(p){ return p-1; }); skRef.current.hint++; setTimeout(function(){ setHtiles([]); }, 3000); }
    else notify('⚠️ 暂无可消除的对');
  }

  function handleSwapToggle() {
    if (swapN <= 0) return;
    var e = !swMode; setSwMode(e);
    if (!e) setSwFirst(null); else notify('🔀 点选两张牌互换位置');
  }

  function levelDone(newBoard) {
    var ns = {hint:totSk.hint+skRef.current.hint, shuf:totSk.shuf+skRef.current.shuf, swap:totSk.swap+skRef.current.swap};
    setTotSk(ns); setTotTime(time);
    var done = li + 1;
    setDoneN(done);
    if (done === 3 || done === 4) setPhase('bonusChoice');
    else setPhase('levelDone');
  }

  function handleNext() {
    // Called from LevelDone for levels 1, 2, 5
    if (li <= 1) { var nx = li+1; setLi(nx); setPhase('playing'); initLevel(nx, time); }
    else { setFinalScore(calcScore(doneN, totTime, totSk)); setCat(fmtDate(new Date())); setPhase('nameInput'); }
  }

  function handleBonusYes() {
    var nx = doneN; // e.g. 3 → go to level index 3
    setLi(nx); setPhase('playing'); initLevel(nx, time);
  }

  function handleBonusNo() {
    setFinalScore(calcScore(doneN, totTime, totSk));
    setCat(fmtDate(new Date())); setPhase('nameInput');
  }

  function handleTile(r, c) {
    if (busy || !board[r][c]) return;
    if (swMode) {
      if (!swFirst) { setSwFirst({r:r,c:c}); return; }
      if (swFirst.r === r && swFirst.c === c) { setSwFirst(null); return; }
      var nb2 = board.map(function(row){ return row.slice(); });
      var tmp = nb2[swFirst.r][swFirst.c]; nb2[swFirst.r][swFirst.c] = nb2[r][c]; nb2[r][c] = tmp;
      setBoard(nb2); setSwap(function(p){ return p-1; }); skRef.current.swap++;
      setSwMode(false); setSwFirst(null); notify('✅ 换位成功！'); return;
    }
    if (!sel) { setSel({r:r,c:c}); return; }
    if (sel.r === r && sel.c === c) { setSel(null); return; }
    var t1 = board[sel.r][sel.c], t2 = board[r][c];
    if (t1.id === t2.id && t1.type !== t2.type) {
      var vp = findPath({r:sel.r,c:sel.c},{r:r,c:c},board,N);
      if (vp) {
        setPath(vp); setBusy(true); setHtiles([]);
        var sr = sel.r, sc = sel.c, er = r, ec = c;
        var savedBoard = board;
        setTimeout(function(){
          spawnParticles(sr,sc,er,ec);
          setFade([sr+'-'+sc, er+'-'+ec]);
          setTimeout(function(){
            var nb = savedBoard.map(function(row){ return row.slice(); });
            nb[sr][sc] = null; nb[er][ec] = null;
            setBoard(nb); setPath([]); setSel(null); setFade([]);
            setMat(function(prev){
              var nm = prev + 1;
              if (nm === cfg.pairs) setTimeout(function(){ levelDone(nb); }, 300);
              else if (!hasMoves(nb, bs, N, li)) setTimeout(function(){ doShuffle(nb, true); }, 400);
              return nm;
            });
            setBusy(false);
          }, 250);
        }, 500);
        return;
      }
    }
    setSel({r:r,c:c});
  }

  // ── Render: non-playing screens ──
  if (screen === 'welcome') return <Welcome onStart={function(){ setScreen('playing'); initLevel(0,0); }} onLeaderboard={function(){ setShowLB(true); }} onAdminTap={function(){ setShowAdminLogin(true); }}/>;
  if (screen === 'playing' && phase === 'nameInput')
    return <NameInput levelCount={doneN} onConfirm={function(n){ setPname(n); setScreen('certificate'); }}/>;
  if (screen === 'certificate')
    return <Certificate name={pname} totalTime={totTime} skills={totSk} completedAt={cat} levelCount={doneN} score={finalScore} onRestart={resetAll}/>;

  // ── Board render ──
  var step = 100 / bs;
  var prog = mat / cfg.pairs;
  var lvNames = ['一','二','三','四','五'];
  var showBonus = phase === 'bonusChoice';
  var showDone = phase === 'levelDone';

  return (
    <div style={{background:'linear-gradient(135deg,#0a0e1a,#0d1530)',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 8px',userSelect:'none'}}>

      <div style={{width:'100%',maxWidth:'640px',marginBottom:'8px'}}>
        <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(0,245,255,.12)',borderRadius:'12px',padding:'9px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'6px'}}>
          <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
            {LEVELS.map(function(lv,i){
              if (lv.bonus && doneN < 3 && i !== li) return null;
              var active = i === li, done = i < li;
              return (
                <div key={i} style={{padding:'4px 8px',borderRadius:'7px',display:'flex',alignItems:'center',gap:'3px',background:active?lv.col+'15':done?'rgba(16,185,129,.1)':'rgba(255,255,255,.04)',border:'1px solid '+(active?lv.col+'44':done?'rgba(16,185,129,.25)':'rgba(255,255,255,.06)')}}>
                  <span style={{fontSize:'12px'}}>{done?'✅':active?lv.emoji:'○'}</span>
                  <span style={{fontSize:'10px',fontWeight:700,color:active?lv.col:done?'#10b981':'rgba(148,163,184,.35)'}}>{'第'+lvNames[i]+'关'}{lv.bonus?' 💎':''}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:'12px',alignItems:'center'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'9px',color:'rgba(148,163,184,.45)',marginBottom:'1px'}}>进度</div>
              <div style={{fontSize:'14px',fontWeight:800,color:'#10b981'}}>{mat}<span style={{fontSize:'10px',color:'rgba(148,163,184,.3)'}}>/{cfg.pairs}</span></div>
            </div>
            <div style={{width:'1px',height:'22px',background:'rgba(148,163,184,.1)'}}/>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'9px',color:'rgba(148,163,184,.45)',marginBottom:'1px'}}>耗时</div>
              <div style={{fontSize:'14px',fontWeight:800,color:'#00f5ff',fontFamily:'monospace'}}>{fmtTime(time)}</div>
            </div>
          </div>
        </div>
        <div style={{height:'3px',background:'rgba(255,255,255,.05)',borderRadius:'99px',marginTop:'4px',overflow:'hidden'}}>
          <div style={{height:'100%',width:(prog*100)+'%',background:'linear-gradient(90deg,#00f5ff,#7c3aed)',borderRadius:'99px',transition:'width .5s ease'}}/>
        </div>
      </div>

      <div style={{width:'100%',maxWidth:'640px',position:'relative'}}>
        <div ref={boardRef} style={{background:'rgba(255,255,255,.025)',border:'1px solid '+(swMode?'rgba(168,85,247,.4)':'rgba(0,245,255,.09)'),borderRadius:'13px',padding:'5px',position:'relative',aspectRatio:'1',backgroundImage:'linear-gradient(rgba(0,245,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.02) 1px,transparent 1px)',backgroundSize:step+'% '+step+'%'}}>
          <Particles list={parts}/>
          {board && (
            <div style={{display:'grid',width:'100%',height:'100%',position:'relative',zIndex:10,gridTemplateColumns:'0 repeat('+bs+',1fr) 0',gridTemplateRows:'0 repeat('+bs+',1fr) 0'}}>
              {board.map(function(row,r){
                return row.map(function(cell,c){
                  if (r===0||r===N-1||c===0||c===N-1) return <div key={r+'-'+c} style={{width:0,height:0,overflow:'hidden'}}/>;
                  var isHol = hollow(li,r,c);
                  var isSel = sel && sel.r===r && sel.c===c;
                  var isHint = htiles.some(function(p){ return p.r===r&&p.c===c; });
                  var isDis = fade.indexOf(r+'-'+c) >= 0;
                  var isSw = swFirst && swFirst.r===r && swFirst.c===c;
                  var catCol = cell ? (CAT[cell.cat]||'#64748b') : '#64748b';
                  var symFS = bs===4?'clamp(22px,5.5vw,46px)':bs===6?'clamp(15px,3.6vw,34px)':'clamp(13px,2.8vw,28px)';
                  var namFS = bs===4?'clamp(19px,4.5vw,38px)':bs===6?'clamp(13px,3vw,28px)':'clamp(11px,2.3vw,23px)';
                  var numFS = bs<=6?'clamp(9px,1.2vw,13px)':'clamp(8px,1vw,11px)';
                  if (isHol) return (
                    <div key={r+'-'+c} style={{padding:'3px'}}>
                      <div style={{width:'100%',height:'100%',borderRadius:'7px',background:'rgba(0,245,255,.04)',border:'1px dashed rgba(0,245,255,.15)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <div style={{width:'28%',height:'28%',borderRadius:'50%',background:'rgba(0,245,255,.1)',boxShadow:'0 0 10px 3px rgba(0,245,255,.1)'}}/>
                      </div>
                    </div>
                  );
                  var cls = 'btn ' + (isDis?'td':isSw&&!isDis?'tw':isSel&&!isDis&&!swMode?'ts':isHint&&!isSel&&!isDis?'th':'');
                  return (
                    <div key={r+'-'+c} style={{padding:'3px'}}>
                      {cell ? (
                        <button onClick={function(){ handleTile(r,c); }} className={cls}
                          style={{position:'relative',width:'100%',height:'100%',borderRadius:'7px',display:'flex',alignItems:'center',justifyContent:'center',background:cell.type==='name'?'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,41,59,.93))':'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,27,75,.93))',border:isSw?'2px solid #a855f7':isSel?'1.5px solid #00f5ff':isHint?'1.5px solid #fbbf24':'1px solid '+catCol}}>
                          <div style={{position:'absolute',top:'2px',left:'3px',fontSize:numFS,color:'rgba(148,163,184,.45)',fontFamily:'monospace',fontWeight:700,lineHeight:1}}>{cell.id}</div>
                          <span style={{fontWeight:800,lineHeight:1,fontSize:cell.type==='symbol'?symFS:namFS,color:cell.type==='symbol'?'#00f5ff':'#e2e8f0',fontFamily:cell.type==='symbol'?'monospace':'inherit',textShadow:cell.type==='symbol'?'0 0 10px #00f5ff88':'none'}}>{cell.val}</span>
                        </button>
                      ) : (
                        <div style={{width:'100%',height:'100%'}}/>
                      )}
                    </div>
                  );
                });
              })}
            </div>
          )}
          {notice && <div style={{position:'absolute',top:'10px',left:'50%',zIndex:60,background:'rgba(0,0,0,.88)',border:'1px solid rgba(0,245,255,.28)',borderRadius:'99px',padding:'5px 15px',fontSize:'12px',fontWeight:700,color:'#00f5ff',whiteSpace:'nowrap',animation:'pop .3s ease-out'}}>{notice}</div>}
          {showDone && <LevelDone levelN={cfg.n} time={fmtTime(time)} onNext={handleNext}/>}
        </div>
        {swMode && (
          <div style={{marginTop:'6px',padding:'7px 12px',background:'rgba(168,85,247,.1)',border:'1px solid rgba(168,85,247,.28)',borderRadius:'9px',fontSize:'12px',color:'#c084fc',fontWeight:600,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
            <span>{'🔀 '+(swFirst?'再点第二张牌完成换位':'请点选第一张牌')}</span>
            <button onClick={function(){setSwMode(false);setSwFirst(null);}} style={{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'5px',padding:'2px 7px',color:'#c084fc',cursor:'pointer',fontSize:'11px',fontWeight:700}}>取消</button>
          </div>
        )}
      </div>

      <div style={{width:'100%',maxWidth:'640px',marginTop:'8px',display:'flex',justifyContent:'center',flexWrap:'wrap',gap:'6px'}}>
        <SkBtn icon="💡" label="提示" count={hintN} color="#fbbf24" disabled={busy||hintN<=0||phase!=='playing'} onClick={handleHint}/>
        <SkBtn icon="🔀" label="洗牌" count={shufN} color="#00f5ff" disabled={busy||shufN<=0||phase!=='playing'} onClick={function(){ doShuffle(board,false); }}/>
        {cfg.swap > 0 && <SkBtn icon="↔" label="换位" count={swapN} color="#a855f7" active={swMode} disabled={swapN<=0||phase!=='playing'} onClick={handleSwapToggle}/>}
        <SkBtn icon="↺" label="重新开始" color="#f87171" onClick={function(){ initLevel(li,0); }}/>
        <SkBtn icon="🏅" label="排行榜" color="#a78bfa" onClick={function(){ setShowLB(true); }}/>
      </div>

      {showBonus && <BonusChoice completedN={doneN} time={fmtTime(totTime)} onBonus={handleBonusYes} onCert={handleBonusNo}/>}
      {showLB && <Leaderboard onClose={function(){ setShowLB(false); }}/>}
      {showAdminLogin && <AdminLogin onSuccess={function(){ setShowAdminLogin(false); setShowAdmin(true); }} onClose={function(){ setShowAdminLogin(false); }}/>}
      {showAdmin && <AdminPanel onClose={function(){ setShowAdmin(false); }}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
