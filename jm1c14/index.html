<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>月相变化 · 3D演示</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');
:root {
  --gold: #c8a96e;
  --gold-dim: #7a6340;
  --void: #020408;
  --panel: rgba(6,10,22,0.96);
  --text: #d4c5a0;
  --text-dim: #6e6450;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--void); color:var(--text); font-family:'Noto Serif SC',serif; }
#app { display:flex; flex-direction:column; width:100%; height:100%; position:relative; z-index:1; }
#canvas-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
#main-canvas { display:block; width:100%; height:100%; }
#topbar {
  display:flex; align-items:center; gap:6px;
  padding:8px 10px;
  background:rgba(6,10,22,0.92);
  border-bottom:1px solid rgba(200,169,110,0.12);
  flex-shrink:0; overflow-x:auto; overflow-y:hidden; scrollbar-width:none;
}
#topbar::-webkit-scrollbar{display:none;}
.view-btn {
  padding:6px 13px; border:1px solid rgba(200,169,110,0.25); border-radius:20px;
  background:transparent; color:var(--text-dim);
  font-family:'Noto Serif SC',serif; font-size:12px; cursor:pointer;
  transition:all 0.2s; white-space:nowrap; flex-shrink:0;
}
.view-btn.active,.view-btn:hover { background:rgba(200,169,110,0.15); border-color:var(--gold); color:var(--gold); }
.tsep{flex:1;}
#angle-display{font-family:monospace;font-size:12px;color:var(--gold);opacity:0.7;white-space:nowrap;flex-shrink:0;}
#bottom {
  background:var(--panel); border-top:1px solid rgba(200,169,110,0.12);
  flex-shrink:0; display:flex; flex-direction:column; padding:8px 10px 10px; gap:7px;
}
.phase-grid-mob { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; }
.phase-btn {
  aspect-ratio:1; background:rgba(255,255,255,0.03);
  border:1px solid rgba(200,169,110,0.18); border-radius:7px;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:1px; transition:all 0.2s; padding:3px 1px;
}
.phase-btn:active,.phase-btn.active { background:rgba(200,169,110,0.16); border-color:var(--gold); }
.phase-icon{font-size:15px;line-height:1;}
.phase-label{font-size:8px;color:var(--text-dim);text-align:center;line-height:1.2;}
.phase-btn.active .phase-label{color:var(--gold);}
.ctrl-row{display:flex;align-items:center;gap:7px;}
.ctrl-btn {
  padding:5px 12px; border:1px solid rgba(200,169,110,0.25); border-radius:7px;
  background:rgba(255,255,255,0.03); color:var(--text);
  font-family:'Noto Serif SC',serif; font-size:12px; cursor:pointer; flex-shrink:0;
}
.ctrl-btn.active,.ctrl-btn:hover{background:rgba(200,169,110,0.15);border-color:var(--gold);color:var(--gold);}
.speed-label{font-size:11px;color:var(--text-dim);white-space:nowrap;}
input[type=range]{
  flex:1;-webkit-appearance:none;height:3px;background:rgba(200,169,110,0.2);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;background:var(--gold);border-radius:50%;cursor:pointer;
}
.info-row{display:flex;align-items:flex-start;gap:8px;}
.info-text{flex:1;min-width:0;}
.info-phase-name{font-size:13px;font-weight:600;color:var(--gold);margin-bottom:1px;}
.info-desc{font-size:11px;line-height:1.65;color:var(--text);}
#moon-display{
  position:absolute;border-radius:50%;
  border:1px solid rgba(200,169,110,0.3);overflow:hidden;
  box-shadow:0 0 28px rgba(0,0,0,0.8);pointer-events:none;
}
#moon-label{position:absolute;font-size:9px;letter-spacing:0.12em;color:var(--gold-dim);text-align:center;pointer-events:none;}
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* Desktop */
@media(min-width:640px){
  #app{flex-direction:row;}
  #sidebar{
    width:230px;min-width:230px;flex-shrink:0;
    background:var(--panel);border-right:1px solid rgba(200,169,110,0.12);
    display:flex;flex-direction:column;padding:18px 14px;gap:12px;overflow-y:auto;
  }
  #main-area{flex:1;display:flex;flex-direction:column;min-width:0;}
  #bottom{display:none;}
  .logo{font-size:11px;letter-spacing:0.25em;color:var(--gold);}
  .logo-zh{font-size:19px;font-weight:600;color:var(--text);}
  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
  .sec-title{font-size:10px;letter-spacing:0.25em;color:var(--gold-dim);}
  .phase-grid-desk{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .phase-grid-desk .phase-icon{font-size:19px;}
  .phase-grid-desk .phase-label{font-size:9px;}
  #info-card{
    background:rgba(255,255,255,0.03);border:1px solid rgba(200,169,110,0.15);
    border-radius:10px;padding:12px;flex:1;
  }
  #info-card .info-phase-name{font-size:14px;}
  #info-card .info-desc{font-size:11px;line-height:1.75;}
  .scale-note{margin-top:10px;font-size:10px;color:var(--text-dim);line-height:1.8;
    border-top:1px solid rgba(200,169,110,0.1);padding-top:8px;}
}
@media(max-width:639px){
  #sidebar{display:none;}
  #main-area{flex:1;display:flex;flex-direction:column;min-width:0;}
}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="app">

  <div id="sidebar">
    <div>
      <div class="logo">LUNAR PHASES</div>
      <div class="logo-zh">月相变化演示</div>
    </div>
    <div class="divider"></div>
    <div class="sec-title">月相选择</div>
    <div class="phase-grid-desk" id="pg-desk"></div>
    <div class="divider"></div>
    <div class="sec-title">动画控制</div>
    <div style="display:flex;gap:7px;">
      <button class="ctrl-btn" id="btn-auto-desk" onclick="toggleAuto()">▶ 播放</button>
      <button class="ctrl-btn" onclick="resetAngle()">↺ 重置</button>
    </div>
    <div class="ctrl-row">
      <span class="speed-label">速度</span>
      <input type="range" id="spd-desk" min="1" max="10" value="4">
    </div>
    <div id="info-card">
      <div class="info-phase-name" id="iname-desk">🌑 新月</div>
      <div style="font-size:10px;color:var(--text-dim);margin-bottom:7px;font-family:monospace;" id="iang-desk">夹角: 0°</div>
      <div class="info-desc" id="idesc-desk"></div>
      <div class="scale-note">
        ⚖ 比例参考<br>
        太阳直径 ≈ 地球×109<br>
        地月距离 ≈ 地球直径×30<br>
        日地距离 ≈ 地月×389
      </div>
    </div>
  </div>

  <div id="main-area">
    <div id="topbar">
      <button class="view-btn active" id="vbtn-side" onclick="setView('side')">侧视图</button>
      <button class="view-btn" id="vbtn-top" onclick="setView('top')">俯视图</button>
      <button class="view-btn" id="vbtn-side2" onclick="setView('side2')">侧视图②</button>
      <button class="view-btn" id="vbtn-top2" onclick="setView('top2')">俯视图②</button>
      <button class="view-btn" id="vbtn-earth" onclick="setView('earth')">地球视角</button>
      <div class="tsep"></div>
      <div id="angle-display">0°</div>
    </div>

    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div id="moon-label">当前月相</div>
      <div id="moon-display" style="display:flex;align-items:center;justify-content:center;line-height:1;"></div>
    </div>

    <div id="bottom">
      <div class="phase-grid-mob" id="pg-mob"></div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="btn-auto-mob" onclick="toggleAuto()">▶ 播放</button>
        <button class="ctrl-btn" onclick="resetAngle()">↺</button>
        <span class="speed-label">速度</span>
        <input type="range" id="spd-mob" min="1" max="10" value="4">
      </div>
      <div class="info-row">
        <div class="info-text">
          <div class="info-phase-name" id="iname-mob">🌑 新月</div>
          <div class="info-desc" id="idesc-mob"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PHASES = [
  {name:'新月', icon:'🌑',angle:0, desc:'月球在地球与太阳之间，面向地球的一面处于暗侧，不可见。'},
  {name:'娥眉月',icon:'🌒',angle:45, desc:'左侧出现细弯亮弧，傍晚西方低空短暂可见。'},
  {name:'上弦月',icon:'🌓',angle:90, desc:'左半部分被照亮，形如半圆，日落时位于正南方。'},
  {name:'盈凸月',icon:'🌔',angle:135,desc:'超过半面被照亮，接近满月但尚未圆满。'},
  {name:'满月', icon:'🌕',angle:180,desc:'整轮明月，完全被阳光照亮，整夜高挂天空。'},
  {name:'亏凸月',icon:'🌖',angle:225,desc:'满月后右侧开始变暗，仍有超半面被照亮。'},
  {name:'下弦月',icon:'🌗',angle:270,desc:'右半侧被照亮，清晨东方天空可见。'},
  {name:'残月', icon:'🌘',angle:315,desc:'仅剩右侧细弧，清晨东方低空短暂可见。'},
];

let moonAngle=0, autoPlay=false, currentView='side', lastTime=0;
var earthTime=18.0; // 默认傍晚18点：太阳在西方地平线，最适合观察各月相

// Build phase buttons
function buildBtns(id) {
  const g=document.getElementById(id);
  PHASES.forEach((p,i)=>{
    const b=document.createElement('div');
    b.className='phase-btn'; b.dataset.idx=i;
    b.innerHTML='<span class="phase-icon">'+p.icon+'</span><span class="phase-label">'+p.name+'</span>';
    b.onclick=()=>{
      moonAngle=p.angle;
      // 地球视角：设置傍晚时分（太阳在西方地平线），最适合演示各月相位置
      // sunAngle=180° 对应 earthTime=18（太阳在西方地平线）
      earthTime=18.0;
      autoPlay=false;
      updateBtns();
    };
    g.appendChild(b);
  });
}
buildBtns('pg-desk');
buildBtns('pg-mob');

function toggleAuto(){autoPlay=!autoPlay;updateBtns();}
function updateBtns(){
  ['btn-auto-desk','btn-auto-mob'].forEach(function(id){
    var el=document.getElementById(id);
    if(!el)return;
    el.classList.toggle('active',autoPlay);
    el.textContent=autoPlay?'⏸ 暂停':'▶ 播放';
  });
}
function resetAngle(){moonAngle=0;autoPlay=false;updateBtns();}
function setView(v){
  currentView=v;
  ['side','top','side2','top2','earth'].forEach(function(x){
    document.getElementById('vbtn-'+x).classList.toggle('active',x===v);
  });
  sizeMoonDisplay();
}
function getSpeed(){
  var d=document.getElementById('spd-desk');
  var m=document.getElementById('spd-mob');
  return parseFloat((window.innerWidth>=640?d:m).value);
}
document.getElementById('spd-desk').oninput=function(e){document.getElementById('spd-mob').value=e.target.value;};
document.getElementById('spd-mob').oninput=function(e){document.getElementById('spd-desk').value=e.target.value;};

// Starfield
var sfC=document.getElementById('starfield');
var sfX=sfC.getContext('2d');
var stars=[];
function initStars(){
  sfC.width=window.innerWidth;sfC.height=window.innerHeight;
  stars=[];
  for(var i=0;i<280;i++){
    stars.push({x:Math.random()*sfC.width,y:Math.random()*sfC.height,r:Math.random()*1.2,a:Math.random(),da:(Math.random()-0.5)*0.003});
  }
}
function drawStars(){
  sfX.clearRect(0,0,sfC.width,sfC.height);
  stars.forEach(function(s){
    s.a=Math.max(0.05,Math.min(1,s.a+s.da));
    if(s.a<=0.05||s.a>=1)s.da*=-1;
    sfX.beginPath();sfX.arc(s.x,s.y,s.r,0,Math.PI*2);
    sfX.fillStyle='rgba(220,215,200,'+s.a+')';sfX.fill();
  });
}

// Main canvas
var mc=document.getElementById('main-canvas');
var cx=mc.getContext('2d');
function resizeCanvas(){
  var wrap=document.getElementById('canvas-wrap');
  mc.width=wrap.clientWidth;mc.height=wrap.clientHeight;
}

// Draw helpers
function drawSun(ctx,x,y,r){
  var g1=ctx.createRadialGradient(x,y,r*0.6,x,y,r*4);
  g1.addColorStop(0,'rgba(255,230,80,0.22)');g1.addColorStop(1,'rgba(255,100,0,0)');
  ctx.beginPath();ctx.arc(x,y,r*4,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
  var g2=ctx.createRadialGradient(x-r*0.25,y-r*0.25,0,x,y,r);
  g2.addColorStop(0,'#fff8d0');g2.addColorStop(0.4,'#ffda60');
  g2.addColorStop(0.85,'#ff9020');g2.addColorStop(1,'#c04000');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
}

function drawEarth(ctx,x,y,r){
  var g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
  g.addColorStop(0,'#6ab0e8');g.addColorStop(0.4,'#2a6ab0');
  g.addColorStop(0.8,'#1a4080');g.addColorStop(1,'#0a1830');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  var ng=ctx.createRadialGradient(x-r*0.6,y,0,x-r*0.1,y,r*1.2);
  ng.addColorStop(0,'rgba(0,0,0,0)');ng.addColorStop(0.55,'rgba(0,0,0,0.08)');ng.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=ng;ctx.fill();
  ctx.beginPath();ctx.arc(x,y,r*1.1,0,Math.PI*2);
  ctx.strokeStyle='rgba(100,180,255,0.1)';ctx.lineWidth=r*0.18;ctx.stroke();
  ctx.fillStyle='rgba(180,200,255,0.4)';
  ctx.font=(r*0.65)+'px Noto Serif SC';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('地',x,y+r*1.25);
}

// ── 统一坐标约定 ──
// 太阳永远在画面左方，光从左照来。
// moonAngle: 月球绕地球的角度，从"新月位置"算起，逆时针增大（从北极俯视）
// 0° = 新月 ：月球在地球左侧（太阳、月球、地球共线，月球居中）
// 90° = 上弦月：月球在地球上方（俯视图12点钟方向）
// 180°= 满月 ：月球在地球右侧（背向太阳）
// 270°= 下弦月：月球在地球下方
//
// drawMoon 中 "亮侧" 由太阳方向决定：太阳在左（-X方向）
// 月球在地球左侧(新月)时：面对太阳，但也背对地球，全暗
// 月球在地球上方(上弦月)时：太阳从左照，右半亮
// 月球在地球右侧(满月)时：全亮
// 月球在地球下方(下弦月)时：左半亮
// 规律：亮侧宽度 = r*sin(moonAngle)，正值亮右，负值亮左
// 终结线椭圆宽度 = |r*cos(moonAngle)|

function drawMoon(ctx,x,y,r,phase){
  // 太阳在左。月球逆时针转：
  // 0°新月(全暗) → 45°娥眉月(左细亮弧) → 90°上弦月(左半亮) → 135°盈凸月(左大亮)
  // → 180°满月(全亮) → 225°亏凸月(右大亮) → 270°下弦月(右半亮) → 315°残月(右细亮弧)
  var rad = phase * Math.PI / 180;
  var cosP = Math.cos(rad); // 0°→1 90°→0 180°→-1 270°→0
  var ellW = Math.abs(cosP * r); // 终结线椭圆半宽
  var norm = ((phase % 360) + 360) % 360;

  // 月球基础球面
  var mg = ctx.createRadialGradient(x-r*0.2,y-r*0.2,0,x,y,r);
  mg.addColorStop(0,'#e8e0cc'); mg.addColorStop(0.6,'#b8b0a0'); mg.addColorStop(1,'#706860');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=mg; ctx.fill();

  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();

  var DARK = 'rgba(8,12,22,0.95)';

  if(norm <= 22 || norm >= 339){
    // 新月：全暗
    ctx.fillStyle=DARK; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();

  } else if(norm <= 68){
    // 娥眉月：左侧细亮弧（先全涂暗，擦去左半圆，再用椭圆遮内侧）
    ctx.fillStyle=DARK; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='destination-out';
    // 擦去左半圆
    ctx.beginPath(); ctx.arc(x,y,r,Math.PI/2,-Math.PI/2); ctx.closePath(); ctx.fill();
    // 用椭圆把左半圆内侧涂回暗色，形成左侧细弧
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=DARK;
    ctx.beginPath(); ctx.ellipse(x-ellW,y,ellW,r,0,0,Math.PI*2); ctx.fill();

  } else if(norm <= 113){
    // 上弦月：左半亮，右半暗
    ctx.fillStyle=DARK;
    ctx.beginPath(); ctx.arc(x,y,r,-Math.PI/2,Math.PI/2); ctx.closePath(); ctx.fill();

  } else if(norm <= 158){
    // 盈凸月：左侧大亮，右侧细暗弧（右半涂暗，内侧椭圆擦去→右侧留细暗弧）
    ctx.fillStyle=DARK;
    ctx.beginPath(); ctx.arc(x,y,r,-Math.PI/2,Math.PI/2); ctx.closePath(); ctx.fill();
    ctx.globalCompositeOperation='destination-out';
    if(ellW>0.5){ ctx.beginPath(); ctx.ellipse(x+ellW,y,ellW,r,0,0,Math.PI*2); ctx.fill(); }
    ctx.globalCompositeOperation='source-over';

  } else if(norm <= 203){
    // 满月：全亮，不遮

  } else if(norm <= 248){
    // 亏凸月：右侧大亮，左侧细暗弧（左半涂暗，内侧椭圆擦去→左侧留细暗弧）
    ctx.fillStyle=DARK;
    ctx.beginPath(); ctx.arc(x,y,r,Math.PI/2,-Math.PI/2); ctx.closePath(); ctx.fill();
    ctx.globalCompositeOperation='destination-out';
    if(ellW>0.5){ ctx.beginPath(); ctx.ellipse(x-ellW,y,ellW,r,0,0,Math.PI*2); ctx.fill(); }
    ctx.globalCompositeOperation='source-over';

  } else if(norm <= 293){
    // 下弦月：右半亮，左半暗
    ctx.fillStyle=DARK;
    ctx.beginPath(); ctx.arc(x,y,r,Math.PI/2,-Math.PI/2); ctx.closePath(); ctx.fill();

  } else {
    // 残月：右侧细亮弧（先全涂暗，擦去右半圆，再用椭圆遮内侧）
    ctx.fillStyle=DARK; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath(); ctx.arc(x,y,r,-Math.PI/2,Math.PI/2); ctx.closePath(); ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=DARK;
    ctx.beginPath(); ctx.ellipse(x+ellW,y,ellW,r,0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();

  // 陨石坑
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
  ctx.globalAlpha=0.06;
  [[0.2,0.1,0.15],[-0.3,0.3,0.12],[0.1,-0.35,0.09],[-0.15,-0.1,0.07]].forEach(function(c){
    ctx.beginPath(); ctx.arc(x+c[0]*r,y+c[1]*r,c[2]*r,0,Math.PI*2);
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.stroke();
  });
  ctx.restore();

  // 亮侧高光（0~180°亮在左，180~360°亮在右）
  var litFrac = (1 - cosP) / 2;
  if(litFrac > 0.04){
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
    var hx = (norm <= 180) ? x - Math.sin(rad)*r*0.3 : x + Math.sin(rad)*r*0.3;
    var hi = ctx.createRadialGradient(hx,y-r*0.28,0,x,y,r);
    hi.addColorStop(0,'rgba(255,255,240,0.22)'); hi.addColorStop(0.45,'rgba(255,255,240,0)');
    ctx.fillStyle=hi; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  ctx.fillStyle='rgba(200,200,180,0.45)';
  ctx.font=(r*0.78)+'px Noto Serif SC'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('月',x,y+r*1.25);
}

function drawOrbit(ctx,ox,oy,r){
  ctx.beginPath();ctx.arc(ox,oy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,169,110,0.1)';ctx.setLineDash([3,6]);ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
}

function getP(){
  var W=mc.width,H=mc.height;
  var base=Math.min(W,H);
  var earthR=base*0.042;
  var moonR=earthR*0.27;
  var sunR=earthR*5.2;
  var orbitR=base*0.22;
  return {W:W,H:H,earthR:earthR,moonR:moonR,sunR:sunR,orbitR:orbitR};
}

function drawSideView(mirrorSun){
  var p=getP(),W=p.W,H=p.H,earthR=p.earthR,moonR=p.moonR,sunR=p.sunR,orbitR=p.orbitR;
  cx.clearRect(0,0,W,H);

  // 地球居中偏右（太阳在左时）或偏左（太阳在右时）
  var ex = mirrorSun ? W*0.42 : W*0.58;
  var ey=H*0.5;
  // 太阳位置：mirrorSun时在右侧，否则在左侧
  var sx = mirrorSun ? W*0.94 : W*0.06;
  var mrad=moonAngle*Math.PI/180;

  var orbitRx = orbitR * 1.0;
  var orbitRy = orbitR * 0.22;

  // 月球位置（逆时针，镜像后X翻转+Y翻转保持逆时针）
  // 原始逆时针：mx=ex-cos, my=ey+sin （0°左，90°下，180°右，270°上）
  // 镜像逆时针：mx=ex+cos, my=ey-sin （0°右，90°上，180°左，270°下）—— 仍是逆时针
  var mx, my;
  if(mirrorSun){
    mx = ex + orbitRx * Math.cos(mrad);
    my = ey - orbitRy * Math.sin(mrad);
  } else {
    mx = ex - orbitRx * Math.cos(mrad);
    my = ey + orbitRy * Math.sin(mrad);
  }

  // 光锥（从太阳方向照来）
  var lc;
  if(mirrorSun){
    lc=cx.createLinearGradient(sx-sunR,ey,ex-orbitRx,ey);
    lc.addColorStop(0,'rgba(255,220,80,0.12)');lc.addColorStop(1,'rgba(255,220,80,0)');
    cx.beginPath();
    cx.moveTo(sx-sunR,ey-sunR*0.6);cx.lineTo(ex-orbitRx,ey-earthR*3);
    cx.lineTo(ex-orbitRx,ey+earthR*3);cx.lineTo(sx-sunR,ey+sunR*0.6);
    cx.closePath();cx.fillStyle=lc;cx.fill();
    // 地球背光阴影锥（向左）
    var sc=cx.createLinearGradient(ex-earthR,ey,ex-orbitRx*1.6,ey);
    sc.addColorStop(0,'rgba(0,0,30,0.32)');sc.addColorStop(1,'rgba(0,0,30,0)');
    cx.beginPath();
    cx.moveTo(ex-earthR,ey-earthR*0.85);cx.lineTo(ex-orbitRx*1.6,ey-moonR*0.5);
    cx.lineTo(ex-orbitRx*1.6,ey+moonR*0.5);cx.lineTo(ex-earthR,ey+earthR*0.85);
    cx.closePath();cx.fillStyle=sc;cx.fill();
  } else {
    lc=cx.createLinearGradient(sx+sunR,ey,ex+orbitRx,ey);
    lc.addColorStop(0,'rgba(255,220,80,0.12)');lc.addColorStop(1,'rgba(255,220,80,0)');
    cx.beginPath();
    cx.moveTo(sx+sunR,ey-sunR*0.6);cx.lineTo(ex+orbitRx,ey-earthR*3);
    cx.lineTo(ex+orbitRx,ey+earthR*3);cx.lineTo(sx+sunR,ey+sunR*0.6);
    cx.closePath();cx.fillStyle=lc;cx.fill();
    // 地球背光阴影锥（向右）
    var sc2=cx.createLinearGradient(ex+earthR,ey,ex+orbitRx*1.6,ey);
    sc2.addColorStop(0,'rgba(0,0,30,0.32)');sc2.addColorStop(1,'rgba(0,0,30,0)');
    cx.beginPath();
    cx.moveTo(ex+earthR,ey-earthR*0.85);cx.lineTo(ex+orbitRx*1.6,ey-moonR*0.5);
    cx.lineTo(ex+orbitRx*1.6,ey+moonR*0.5);cx.lineTo(ex+earthR,ey+earthR*0.85);
    cx.closePath();cx.fillStyle=sc2;cx.fill();
  }

  // 椭圆轨道虚线
  cx.save();
  cx.beginPath();cx.ellipse(ex,ey,orbitRx,orbitRy,0,0,Math.PI*2);
  cx.strokeStyle='rgba(200,169,110,0.12)';cx.setLineDash([3,6]);cx.lineWidth=1;cx.stroke();
  cx.setLineDash([]);cx.restore();

  // 太阳
  drawSun(cx,sx,ey,sunR);
  var rayX1 = mirrorSun ? sx-sunR : sx+sunR;
  var rayX2 = mirrorSun ? ex+earthR : ex-earthR;
  var rg=cx.createLinearGradient(rayX1,ey,rayX2,ey);
  rg.addColorStop(0,'rgba(255,220,80,0.35)');rg.addColorStop(1,'rgba(255,220,80,0.04)');
  cx.beginPath();cx.moveTo(rayX1,ey);cx.lineTo(rayX2,ey);
  cx.strokeStyle=rg;cx.lineWidth=1.5;cx.stroke();
  cx.fillStyle='rgba(255,220,100,0.6)';
  cx.font=Math.max(10,sunR*0.32)+'px Noto Serif SC';cx.textAlign='center';cx.textBaseline='top';
  cx.fillText('太阳',sx,ey+sunR*1.05);

  cx.beginPath();cx.moveTo(ex,ey);cx.lineTo(mx,my);
  cx.strokeStyle='rgba(200,169,110,0.18)';cx.lineWidth=1;cx.stroke();

  drawEarth(cx,ex,ey,earthR);
  // 月球：mirrorSun时太阳在右→右半亮(270°)，否则左半亮(90°)
  drawMoon(cx,mx,my,moonR, mirrorSun ? 270 : 90);

  // 角度弧：两者都是逆时针
  if(moonAngle>3 && moonAngle<357){
    cx.beginPath();
    if(mirrorSun){
      cx.arc(ex,ey,earthR*2.4,0,-mrad,true);
    } else {
      cx.arc(ex,ey,earthR*2.4,Math.PI,Math.PI-mrad,true);
    }
    cx.strokeStyle='rgba(200,169,110,0.45)';cx.lineWidth=1.2;cx.stroke();
  }

  // 北南标注
  cx.fillStyle='rgba(200,169,110,0.5)';
  cx.font='12px Noto Serif SC';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('北',ex,ey-orbitRy-earthR*2.5);
  cx.fillText('南',ex,ey+orbitRy+earthR*2.5);
  cx.strokeStyle='rgba(200,169,110,0.3)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(ex,ey-orbitRy-earthR*1.2);cx.lineTo(ex,ey-orbitRy-earthR*1.8);cx.stroke();
  cx.beginPath();cx.moveTo(ex,ey+orbitRy+earthR*1.2);cx.lineTo(ex,ey+orbitRy+earthR*1.8);cx.stroke();

  // 标注太阳方向
  cx.fillStyle='rgba(200,169,110,0.3)';
  cx.font='10px Noto Serif SC';cx.textAlign='center';cx.textBaseline='top';
  cx.fillText(mirrorSun?'太阳在右（南半球视角）':'太阳在左（北半球视角）',W*0.5,6);
}

function drawTopView(mirrorSun){
  var p=getP(),W=p.W,H=p.H,earthR=p.earthR,moonR=p.moonR,sunR=p.sunR,orbitR=p.orbitR;
  cx.clearRect(0,0,W,H);
  var ex = mirrorSun ? W*0.48 : W*0.52;
  var ey=H*0.5;
  var sx = mirrorSun ? W*0.93 : W*0.07;
  var sy=H*0.5;
  var mrad=moonAngle*Math.PI/180;

  // 逆时针（镜像后X+Y都翻转保持逆时针方向）
  var mx, my;
  if(mirrorSun){
    mx = ex + orbitR * Math.cos(mrad);
    my = ey - orbitR * Math.sin(mrad);
  } else {
    mx = ex - orbitR * Math.cos(mrad);
    my = ey + orbitR * Math.sin(mrad);
  }

  // 光从太阳方向照来
  var lf;
  if(mirrorSun){
    lf=cx.createLinearGradient(sx,ey,ex-orbitR*1.3,ey);
  } else {
    lf=cx.createLinearGradient(sx,ey,ex+orbitR*1.3,ey);
  }
  lf.addColorStop(0,'rgba(255,220,80,0.07)');lf.addColorStop(1,'rgba(255,220,80,0)');
  cx.fillStyle=lf;cx.fillRect(0,0,W,H);

  // 地球背光阴影锥（背向太阳方向）
  cx.save();
  if(mirrorSun){
    cx.beginPath();
    cx.moveTo(ex-earthR,ey-earthR);cx.lineTo(ex-orbitR*1.4,ey-moonR*0.6);
    cx.lineTo(ex-orbitR*1.4,ey+moonR*0.6);cx.lineTo(ex-earthR,ey+earthR);
    cx.closePath();
    var sc3=cx.createLinearGradient(ex-earthR,ey,ex-orbitR*1.4,ey);
    sc3.addColorStop(0,'rgba(0,0,0,0.38)');sc3.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=sc3;cx.fill();
  } else {
    cx.beginPath();
    cx.moveTo(ex+earthR,ey-earthR);cx.lineTo(ex+orbitR*1.4,ey-moonR*0.6);
    cx.lineTo(ex+orbitR*1.4,ey+moonR*0.6);cx.lineTo(ex+earthR,ey+earthR);
    cx.closePath();
    var sc4=cx.createLinearGradient(ex+earthR,ey,ex+orbitR*1.4,ey);
    sc4.addColorStop(0,'rgba(0,0,0,0.38)');sc4.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=sc4;cx.fill();
  }
  cx.restore();

  drawOrbit(cx,ex,ey,orbitR);

  // 阳光箭头
  for(var i=-2;i<=2;i++){
    var arY=ey+i*earthR*0.55;
    var arX1,arX2;
    if(mirrorSun){
      arX1=sx-sunR*1.1; arX2=ex+earthR*1.2;
    } else {
      arX1=sx+sunR*1.1; arX2=ex-earthR*1.2;
    }
    cx.beginPath();cx.moveTo(arX1,arY);cx.lineTo(arX2,arY);
    var ag=cx.createLinearGradient(arX1,arY,arX2,arY);
    ag.addColorStop(0,'rgba(255,220,80,0.35)');ag.addColorStop(1,'rgba(255,220,80,0.04)');
    cx.strokeStyle=ag;cx.lineWidth=0.8;cx.stroke();
  }

  drawSun(cx,sx,sy,sunR);
  cx.fillStyle='rgba(255,220,100,0.6)';
  cx.font=Math.max(9,sunR*0.38)+'px Noto Serif SC';cx.textAlign='center';cx.textBaseline='top';
  cx.fillText('太阳',sx,sy+sunR*1.05);

  // 角度弧：两者都是逆时针
  if(moonAngle>3 && moonAngle<357){
    cx.beginPath();
    if(mirrorSun){
      // 镜像：0°在右(0rad)，逆时针往上扫 → anticlockwise=true，从0到-mrad（即2π-mrad）
      cx.arc(ex,ey,earthR*2.2,0,-mrad,true);
    } else {
      cx.arc(ex,ey,earthR*2.2,Math.PI,Math.PI-mrad,true);
    }
    cx.strokeStyle='rgba(200,169,110,0.5)';cx.lineWidth=1.5;cx.stroke();
  }

  cx.beginPath();cx.moveTo(ex,ey);cx.lineTo(mx,my);
  cx.strokeStyle='rgba(200,169,110,0.15)';cx.lineWidth=1;cx.stroke();

  // 地球（俯视）
  var eg=cx.createRadialGradient(ex-earthR*0.3,ey-earthR*0.3,0,ex,ey,earthR);
  eg.addColorStop(0,'#5aafe0');eg.addColorStop(0.5,'#2060a0');eg.addColorStop(1,'#102040');
  cx.beginPath();cx.arc(ex,ey,earthR,0,Math.PI*2);cx.fillStyle=eg;cx.fill();
  cx.beginPath();cx.arc(ex,ey,earthR*1.1,0,Math.PI*2);
  cx.strokeStyle='rgba(100,180,255,0.12)';cx.lineWidth=earthR*0.2;cx.stroke();
  cx.beginPath();cx.arc(ex,ey,earthR*0.12,0,Math.PI*2);
  cx.fillStyle='rgba(220,235,255,0.7)';cx.fill();
  cx.fillStyle='rgba(180,200,255,0.45)';
  cx.font=(earthR*0.7)+'px Noto Serif SC';cx.textAlign='center';cx.textBaseline='top';
  cx.fillText('地',ex,ey+earthR*1.2);

  // 月球：mirrorSun时右半亮(270°)，否则左半亮(90°)
  drawMoon(cx,mx,my,moonR, mirrorSun ? 270 : 90);

  // 标注
  cx.fillStyle='rgba(200,169,110,0.3)';
  cx.font='10px Noto Serif SC';cx.textAlign='center';cx.textBaseline='top';
  cx.fillText(mirrorSun?'太阳在右（南半球视角）':'太阳在左（北半球视角）',W*0.5,6);
}

function drawEarthView(){
  var W=mc.width, H=mc.height;
  cx.clearRect(0,0,W,H);

  // ── 太阳位置（天球弧） ──
  // earthTime: 6点→日出东方(右侧), 12点→正午正中, 18点→日落西方(左侧)
  // sunAngle: (earthTime-6)*15°，6点=0°(东/右), 12点=90°(顶), 18点=180°(西/左)
  // 画面：右=东，左=西，所以水平坐标用 +cos(sunRad) 让0°在右、180°在左
  var sunAngle=(earthTime-6)*15;
  var sunRad=sunAngle*Math.PI/180;
  // 右(东)升起 → 顶部 → 左(西)落下
  // 右=西，左=东，日月从左（东）升起，向右（西）落下
  // 6点日出在左(东)→cos(0°)=1, W*0.5-cos*W*0.42 = 左侧 ✓
  var sunX=W*0.5-Math.cos(sunRad)*(W*0.42);
  var sunY=H*0.7-Math.sin(sunRad)*(H*0.52);
  var sunHeight=Math.sin(sunRad);

  // ── 月球：比太阳慢 moonAngle 度（在天球上落后 moonAngle）──
  // 傍晚18点，sunAngle=180°
  // 新月(0°)：moonAngle=0，moonTimeAngle=180°，月球和太阳同位（西方落下）
  // 娥眉月(45°)：moonTimeAngle=135°，月球比太阳高一点，还在天空中
  // 上弦月(90°)：moonTimeAngle=90°，月球在正中天顶
  // 盈凸月(135°)：moonTimeAngle=45°，月球在东偏高处
  // 满月(180°)：moonTimeAngle=0°，月球刚从东方升起
  // 亏凸月(225°)：moonTimeAngle=-45°(=315°)，月球还在地平线以下，深夜才升
  // 下弦月(270°)：moonTimeAngle=-90°(=270°)，午夜前后从东升
  // 残月(315°)：moonTimeAngle=-135°(=225°)，黎明前才升
  var moonTimeAngle=sunAngle-moonAngle;
  var moonTimeRad=moonTimeAngle*Math.PI/180;
  var moonX=W*0.5-Math.cos(moonTimeRad)*(W*0.42);
  var moonY=H*0.7-Math.sin(moonTimeRad)*(H*0.52);
  var moonHeight=Math.sin(moonTimeRad);
  var isMoonVisible=moonHeight>-0.05;

  // ── 1. 天空颜色 ──
  var skyCol;
  if(sunHeight>0.15){ skyCol='#1a4a8a'; }
  else if(sunHeight>-0.1){
    var t=(sunHeight+0.1)/0.25;
    var r=Math.round(10+80*t), g=Math.round(10+40*t), b=Math.round(20+80*t);
    skyCol='rgb('+r+','+g+','+b+')';
  } else { skyCol='#02040a'; }
  cx.fillStyle=skyCol; cx.fillRect(0,0,W,H*0.7);

  // ── 2. 星空（夜晚可见）──
  var starOpacity=Math.max(0,Math.min(1,-sunHeight*2.5));
  if(starOpacity>0){
    stars.forEach(function(s){
      if(s.y>H*0.7)return;
      cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
      cx.fillStyle='rgba(220,215,200,'+(s.a*starOpacity)+')';cx.fill();
    });
  }

  // ── 3. 地面 ──
  var gnd=cx.createLinearGradient(0,H*0.7,0,H);
  gnd.addColorStop(0,sunHeight>0.1?'#1a2e10':'#080e05');
  gnd.addColorStop(1,'#040703');
  cx.fillStyle=gnd;cx.fillRect(0,H*0.7,W,H*0.3);

  // ── 4. 地平线 ──
  cx.beginPath();cx.moveTo(0,H*0.7);cx.lineTo(W,H*0.7);
  cx.strokeStyle='rgba(120,160,80,0.3)';cx.lineWidth=1;cx.stroke();

  // ── 5. 东西标注（左东右西）──
  cx.font='12px Noto Serif SC';
  cx.fillStyle='rgba(160,180,140,0.5)';
  cx.textAlign='left';cx.textBaseline='middle';
  cx.fillText('← 东',10,H*0.7+16);
  cx.textAlign='right';
  cx.fillText('西 →',W-10,H*0.7+16);

  // ── 6. 太阳 ──
  if(sunHeight>-0.2){
    // 光晕
    var sg=cx.createRadialGradient(sunX,sunY,0,sunX,sunY,Math.min(W,H)*0.12);
    var glowA=Math.max(0,sunHeight)*0.5+0.1;
    sg.addColorStop(0,'rgba(255,240,150,'+glowA+')');
    sg.addColorStop(1,'rgba(255,180,0,0)');
    cx.beginPath();cx.arc(sunX,sunY,Math.min(W,H)*0.12,0,Math.PI*2);
    cx.fillStyle=sg;cx.fill();
    // emoji
    var sunSz=Math.round(Math.min(W,H)*0.07);
    cx.font=sunSz+'px serif';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.globalAlpha=Math.min(1,sunHeight+0.3);
    cx.fillText('🌞',sunX,sunY);
    cx.globalAlpha=1;
  }

  // ── 7. 晨昏霞光 ──
  if(sunHeight>-0.15&&sunHeight<0.3){
    var hx=sunX<W*0.5?sunX:sunX; // 霞光中心跟随太阳
    var hw=cx.createRadialGradient(sunX,H*0.7,0,sunX,H*0.7,W*0.5);
    var hA=Math.max(0,0.3-Math.abs(sunHeight))*1.5;
    hw.addColorStop(0,'rgba(255,120,30,'+hA+')');
    hw.addColorStop(0.5,'rgba(255,60,0,'+(hA*0.3)+')');
    hw.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=hw;cx.fillRect(0,0,W,H);
  }

  // ── 8. 月球 ──
  if(isMoonVisible){
    // 确定当前月相 idx
    var norm=((moonAngle%360)+360)%360;
    var idx;
    if(norm<=22||norm>=339) idx=0;
    else if(norm<=68) idx=1;
    else if(norm<=113) idx=2;
    else if(norm<=158) idx=3;
    else if(norm<=203) idx=4;
    else if(norm<=248) idx=5;
    else if(norm<=293) idx=6;
    else idx=7;
    var moonIcon=PHASES[idx].icon;

    var moonSz=Math.round(Math.min(W,H)*0.09);
    // 月球光晕（夜晚）
    if(sunHeight<0){
      var litF=(1-Math.cos(norm*Math.PI/180))/2;
      var mglow=cx.createRadialGradient(moonX,moonY,0,moonX,moonY,moonSz*1.8);
      mglow.addColorStop(0,'rgba(200,185,140,'+(litF*0.4)+')');
      mglow.addColorStop(1,'rgba(200,185,140,0)');
      cx.beginPath();cx.arc(moonX,moonY,moonSz*1.8,0,Math.PI*2);
      cx.fillStyle=mglow;cx.fill();
    }
    // 月球 emoji
    cx.font=moonSz+'px serif';
    cx.textAlign='center';cx.textBaseline='middle';
    // 白天时月球半透明
    cx.globalAlpha=sunHeight>0?0.45:1.0;
    cx.fillText(moonIcon,moonX,moonY);
    cx.globalAlpha=1;
  }

  // ── 9. 标注 ──
  cx.fillStyle='rgba(140,170,140,0.45)';
  cx.font='11px Noto Serif SC';cx.textAlign='left';cx.textBaseline='bottom';
  cx.fillText('📍 从地球仰望天空',12,H*0.7-6);

  // 月球不可见时显示提示
  if(!isMoonVisible){
    cx.fillStyle='rgba(200,169,110,0.5)';
    cx.font='12px Noto Serif SC';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('🌙 月球尚未升起（地平线以下）',W*0.5,H*0.35);
  }

  // 当地时间（清晰显示，带背景）
  var hh=Math.floor(earthTime);
  var mm=Math.floor((earthTime%1)*60);
  var timeStr='🕐 '+(''+hh).padStart(2,'0')+':'+(''+mm).padStart(2,'0');
  cx.font='bold 13px monospace';
  var tw=cx.measureText(timeStr).width;
  var tx=W-14, ty=H*0.7-8;
  // 背景框
  cx.fillStyle='rgba(0,0,0,0.55)';
  cx.fillRect(tx-tw-10, ty-18, tw+16, 22);
  // 文字
  cx.fillStyle='rgba(220,190,110,0.95)';
  cx.textAlign='right';cx.textBaseline='bottom';
  cx.fillText(timeStr,tx,ty);
}

// Moon closeup: show emoji instead of canvas
function sizeMoonDisplay(){
  var W=window.innerWidth,H=window.innerHeight;
  var sz=W<640?Math.round(Math.min(W,H)*0.18):130;
  var md=document.getElementById('moon-display');
  md.style.width=sz+'px';md.style.height=sz+'px';
  md.style.fontSize=Math.round(sz*0.75)+'px';
  var ml=document.getElementById('moon-label');
  // side2/top2 时移到左上角，避开右侧太阳
  var isRight2=(currentView==='side2'||currentView==='top2');
  if(W<640){
    if(isRight2){
      md.style.left='10px';md.style.right='auto';md.style.top='46px';md.style.bottom='auto';
      ml.style.cssText='left:10px;right:auto;top:'+(46+sz+3)+'px;bottom:auto;font-size:8px;letter-spacing:0.1em;color:var(--gold-dim);text-align:center;pointer-events:none;';
    } else {
      md.style.right='10px';md.style.left='auto';md.style.top='46px';md.style.bottom='auto';
      ml.style.cssText='right:10px;left:auto;top:'+(46+sz+3)+'px;bottom:auto;font-size:8px;letter-spacing:0.1em;color:var(--gold-dim);text-align:center;pointer-events:none;';
    }
  } else {
    if(isRight2){
      md.style.left='18px';md.style.right='auto';md.style.bottom='18px';md.style.top='auto';
      ml.style.cssText='left:18px;right:auto;bottom:'+(18+sz+4)+'px;top:auto;font-size:9px;letter-spacing:0.14em;color:var(--gold-dim);text-align:center;pointer-events:none;';
    } else {
      md.style.right='18px';md.style.left='auto';md.style.bottom='18px';md.style.top='auto';
      ml.style.cssText='right:18px;left:auto;bottom:'+(18+sz+4)+'px;top:auto;font-size:9px;letter-spacing:0.14em;color:var(--gold-dim);text-align:center;pointer-events:none;';
    }
  }
}
function drawMoonClose(){
  var a=((moonAngle%360)+360)%360;
  var idx;
  if(a<=22||a>=339) idx=0;
  else if(a<=68) idx=1;
  else if(a<=113) idx=2;
  else if(a<=158) idx=3;
  else if(a<=203) idx=4;
  else if(a<=248) idx=5;
  else if(a<=293) idx=6;
  else idx=7;
  document.getElementById('moon-display').textContent=PHASES[idx].icon;
}

function updateInfo(){
  var a=((moonAngle%360)+360)%360;
  // 按用户指定的角度范围判定月相
  var idx;
  if(a<=22||a>=339) idx=0; // 新月
  else if(a<=68) idx=1; // 娥眉月
  else if(a<=113) idx=2; // 上弦月
  else if(a<=158) idx=3; // 盈凸月
  else if(a<=203) idx=4; // 满月
  else if(a<=248) idx=5; // 亏凸月
  else if(a<=293) idx=6; // 下弦月
  else idx=7; // 残月
  var best=PHASES[idx];
  var label=best.icon+' '+best.name;
  document.getElementById('iname-desk').textContent=label;
  document.getElementById('idesc-desk').textContent=best.desc;
  document.getElementById('iang-desk').textContent='夹角: '+Math.round(a)+'°';
  document.getElementById('iname-mob').textContent=label;
  document.getElementById('idesc-mob').textContent=best.desc;
  document.getElementById('angle-display').textContent=Math.round(a)+'°';
  var allBtns=document.querySelectorAll('.phase-btn');
  allBtns.forEach(function(btn){
    btn.classList.toggle('active',parseInt(btn.dataset.idx)===idx);
  });
}

function loop(ts){
  var dt=Math.min(ts-lastTime,50);lastTime=ts;
  if(autoPlay){
    if(currentView==='earth'){
      // 地球视角：只推进地球自转（太阳/月球在天空移动），月相固定不变
      earthTime=(earthTime+getSpeed()*dt*0.008*0.8)%24;
    } else {
      moonAngle=(moonAngle+getSpeed()*dt*0.008)%360;
      earthTime=(earthTime+getSpeed()*dt*0.008*0.4)%24;
    }
  }
  drawStars();
  if(currentView==='side')drawSideView(false);
  else if(currentView==='top')drawTopView(false);
  else if(currentView==='side2')drawSideView(true);
  else if(currentView==='top2')drawTopView(true);
  else drawEarthView();
  drawMoonClose();
  updateInfo();
  requestAnimationFrame(loop);
}

function onResize(){initStars();resizeCanvas();sizeMoonDisplay();}
window.addEventListener('resize',onResize);
onResize();
updateBtns();
requestAnimationFrame(loop);
</script>
</body>
</html>
