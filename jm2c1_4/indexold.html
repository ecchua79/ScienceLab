<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #0a0e1a; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── 替代 lucide-react 的内置 SVG 图标 ──────────────────────────────────
    const RotateCcw = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const Shuffle = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>;
    const Lightbulb = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
    const ArrowLeftRight = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/></svg>;
    const Trophy = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
    const Clock = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const ChevronRight = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;

    // ─── Data ──────────────────────────────────────────────────────────────────────
    const ELEMENTS_DATA = [
      { id: 1,  name: '氢',  symbol: 'H',  category: 'nonmetal'  },
      { id: 2,  name: '氦',  symbol: 'He', category: 'noble'     },
      { id: 3,  name: '锂',  symbol: 'Li', category: 'alkali'    },
      { id: 4,  name: '铍',  symbol: 'Be', category: 'alkaline'  },
      { id: 5,  name: '硼',  symbol: 'B',  category: 'metalloid' },
      { id: 6,  name: '碳',  symbol: 'C',  category: 'nonmetal'  },
      { id: 7,  name: '氮',  symbol: 'N',  category: 'nonmetal'  },
      { id: 8,  name: '氧',  symbol: 'O',  category: 'nonmetal'  },
      { id: 9,  name: '氟',  symbol: 'F',  category: 'halogen'   },
      { id: 10, name: '氖',  symbol: 'Ne', category: 'noble'     },
      { id: 11, name: '钠',  symbol: 'Na', category: 'alkali'    },
      { id: 12, name: '镁',  symbol: 'Mg', category: 'alkaline'  },
      { id: 13, name: '铝',  symbol: 'Al', category: 'metal'     },
      { id: 14, name: '硅',  symbol: 'Si', category: 'metalloid' },
      { id: 15, name: '磷',  symbol: 'P',  category: 'nonmetal'  },
      { id: 16, name: '硫',  symbol: 'S',  category: 'nonmetal'  },
      { id: 17, name: '氯',  symbol: 'Cl', category: 'halogen'   },
      { id: 18, name: '氩',  symbol: 'Ar', category: 'noble'     },
      { id: 19, name: '钾',  symbol: 'K',  category: 'alkali'    },
      { id: 20, name: '钙',  symbol: 'Ca', category: 'alkaline'  },
      { id: 21, name: '铁',  symbol: 'Fe', category: 'transition'},
      { id: 22, name: '铜',  symbol: 'Cu', category: 'transition'},
      { id: 23, name: '锌',  symbol: 'Zn', category: 'transition'},
      { id: 24, name: '银',  symbol: 'Ag', category: 'transition'},
      { id: 25, name: '钡',  symbol: 'Ba', category: 'alkaline'  },
      { id: 26, name: '铂',  symbol: 'Pt', category: 'transition'},
      { id: 27, name: '金',  symbol: 'Au', category: 'transition'},
      { id: 28, name: '汞',  symbol: 'Hg', category: 'transition'},
      { id: 29, name: '铅',  symbol: 'Pb', category: 'metal'     },
      { id: 30, name: '锡',  symbol: 'Sn', category: 'metal'     },
      { id: 31, name: '锰',  symbol: 'Mn', category: 'transition'},
      { id: 32, name: '碘',  symbol: 'I',  category: 'halogen'   },
    ];

    const CAT_COLORS = {
      alkali:'#f97316', alkaline:'#eab308', transition:'#06b6d4',
      metal:'#8b5cf6',  metalloid:'#10b981', nonmetal:'#3b82f6',
      halogen:'#ec4899', noble:'#a78bfa',
    };

    const LEVELS = [
      { level:1, boardSize:4, pairs:8,  hint:2, shuffle:2, swap:0, label:'初级实验室', emoji:'🧪' },
      { level:2, boardSize:6, pairs:18, hint:3, shuffle:3, swap:0, label:'进阶实验室', emoji:'⚗'  },
      { level:3, boardSize:7, pairs:20, hint:5, shuffle:5, swap:3, label:'终极实验室', emoji:'🔬' },
    ];

    // Level 3 hollow: inner 3×3 (rows 3-5, cols 3-5 in 1-indexed board coords) = passage
    const isHollow = (levelIdx, r, c) =>
      levelIdx === 2 && r >= 3 && r <= 5 && c >= 3 && c <= 5;

    // ─── Pure helpers ──────────────────────────────────────────────────────────────
    const shuffleArray = arr => {
      const a = [...arr];
      for (let i = a.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    };

    const checkStraight = (p1, p2, board) => {
      if (p1.r === p2.r) {
        const [lo,hi] = [Math.min(p1.c,p2.c), Math.max(p1.c,p2.c)];
        for (let c=lo+1; c<hi; c++) if (board[p1.r][c]) return false;
        return true;
      }
      if (p1.c === p2.c) {
        const [lo,hi] = [Math.min(p1.r,p2.r), Math.max(p1.r,p2.r)];
        for (let r=lo+1; r<hi; r++) if (board[r][p1.c]) return false;
        return true;
      }
      return false;
    };

    const findPath = (p1, p2, board, N) => {
      if (p1.r===p2.r || p1.c===p2.c)
        if (checkStraight(p1,p2,board)) return [p1,p2];
      for (const cn of [{r:p1.r,c:p2.c},{r:p2.r,c:p1.c}])
        if (!board[cn.r][cn.c] && checkStraight(p1,cn,board) && checkStraight(cn,p2,board))
          return [p1,cn,p2];
      for (let c=0; c<N; c++) {
        if (c===p1.c) continue;
        const c1={r:p1.r,c};
        if (board[c1.r][c1.c]) continue;
        if (checkStraight(p1,c1,board)) {
          const c2={r:p2.r,c};
          if (!board[c2.r][c2.c] && checkStraight(c1,c2,board) && checkStraight(c2,p2,board))
            return [p1,c1,c2,p2];
        }
      }
      for (let r=0; r<N; r++) {
        if (r===p1.r) continue;
        const c1={r,c:p1.c};
        if (board[c1.r][c1.c]) continue;
        if (checkStraight(p1,c1,board)) {
          const c2={r,c:p2.c};
          if (!board[c2.r][c2.c] && checkStraight(c1,c2,board) && checkStraight(c2,p2,board))
            return [p1,c1,c2,p2];
        }
      }
      return null;
    };

    const findHintPair = (board, bs, N, lvIdx=0) => {
      const tiles = [];
      for (let r=1; r<=bs; r++) for (let c=1; c<=bs; c++)
        if (board[r][c] && !isHollow(lvIdx,r,c)) tiles.push({r,c,tile:board[r][c]});
      for (let i=0; i<tiles.length; i++) for (let j=i+1; j<tiles.length; j++) {
        const {tile:t1,r:r1,c:c1}=tiles[i], {tile:t2,r:r2,c:c2}=tiles[j];
        if (t1.id===t2.id && t1.type!==t2.type)
          if (findPath({r:r1,c:c1},{r:r2,c:c2},board,N)) return [{r:r1,c:c1},{r:r2,c:c2}];
      }
      return null;
    };

    const hasMoves = (board,bs,N,lvIdx=0) => !!findHintPair(board,bs,N,lvIdx);

    const doShuffle = (board,bs,N,lvIdx=0) => {
      let b = board.map(r=>[...r]);
      for (let attempt=0; attempt<15; attempt++) {
        const tiles=[],pos=[];
        for (let r=1;r<=bs;r++) for (let c=1;c<=bs;c++)
          if (b[r][c] && !isHollow(lvIdx,r,c)) { tiles.push(b[r][c]); pos.push({r,c}); }
        const sh = shuffleArray(tiles);
        pos.forEach((p,i) => { b[p.r][p.c]=sh[i]; });
        if (hasMoves(b,bs,N,lvIdx)) break;
      }
      return b;
    };

    const buildBoard = (cfg, lvIdx=0) => {
      const bs = cfg.boardSize, N = bs+2;
      const elems = ELEMENTS_DATA.slice(0, cfg.pairs);
      let tiles = [];
      elems.forEach(el => {
        tiles.push({id:el.id,type:'name',  value:el.name,  category:el.category});
        tiles.push({id:el.id,type:'symbol',value:el.symbol,category:el.category});
      });
      tiles = shuffleArray(tiles);
      let board = Array(N).fill(null).map(()=>Array(N).fill(null));
      let idx=0;
      for (let r=1;r<=bs;r++) for (let c=1;c<=bs;c++) {
        if (isHollow(lvIdx,r,c)) continue; // leave hollow cells as null
        board[r][c]=tiles[idx++];
      }
      if (!hasMoves(board,bs,N,lvIdx)) board=doShuffle(board,bs,N,lvIdx);
      return board;
    };

    const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

    const fmtDT = d => {
      const pad = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}年${pad(d.getMonth()+1)}月${pad(d.getDate())}日 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    // ─── Particles ─────────────────────────────────────────────────────────────────
    const Particles = ({particles}) => (
      <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:50,overflow:'hidden'}}>
        {particles.map(p=>(
          <div key={p.id} style={{
            position:'absolute',left:p.x+'%',top:p.y+'%',
            width:p.size+'px',height:p.size+'px',
            background:p.color,borderRadius:'50%',
            animation:`particleFly ${p.dur}ms ease-out forwards`,
            animationDelay:p.delay+'ms',
            '--dx':p.dx+'px','--dy':p.dy+'px',
          }}/>
        ))}
      </div>
    );

    // ─── Skill Button ──────────────────────────────────────────────────────────────
    const SkillBtn = ({icon,label,count,color,disabled,onClick,active}) => (
      <button onClick={onClick} disabled={disabled} style={{
        background: active ? `${color}22` : 'rgba(255,255,255,.04)',
        border:`1px solid ${active ? color+'99' : disabled ? 'rgba(255,255,255,.06)' : 'rgba(255,255,255,.12)'}`,
        borderRadius:'10px', padding:'9px 14px',
        color: disabled ? 'rgba(148,163,184,.3)' : '#e2e8f0',
        fontWeight:600, fontSize:'13px',
        cursor: disabled ? 'not-allowed' : 'pointer',
        display:'flex', alignItems:'center', gap:'5px',
        transition:'all .15s', backdropFilter:'blur(8px)',
        boxShadow: active ? `0 0 14px ${color}44` : 'none',
      }}>
        <span style={{color: disabled ? 'rgba(148,163,184,.3)' : color}}>{icon}</span>
        {label}
        {count !== null && (
          <span style={{
            background: disabled ? 'rgba(255,255,255,.04)' : `${color}20`,
            border:`1px solid ${disabled ? 'rgba(255,255,255,.06)' : color+'44'}`,
            borderRadius:'6px', padding:'1px 6px', fontSize:'11px',
            color: disabled ? 'rgba(148,163,184,.3)' : color,
            fontFamily:'monospace', fontWeight:800,
          }}>{count}</span>
        )}
      </button>
    );

    // ─── Level Complete overlay ────────────────────────────────────────────────────
    const LevelComplete = ({level, time, onNext}) => {
      const isLast = level===3;
      const names = ['一','二','三'];
      return (
        <div style={{position:'absolute',inset:0,zIndex:60,display:'flex',alignItems:'center',justifyContent:'center',
          background:'rgba(10,14,26,.92)',backdropFilter:'blur(14px)',borderRadius:'14px',
          animation:'fadeZoom .4s cubic-bezier(.34,1.56,.64,1)'}}>
          <div style={{textAlign:'center',padding:'28px 24px',maxWidth:'280px'}}>
            <div style={{fontSize:'52px',marginBottom:'10px'}}>{isLast ? '🏆' : LEVELS[level-1].emoji}</div>
            <div style={{fontSize:'22px',fontWeight:900,color:'#e2e8f0',marginBottom:'4px'}}>
              第{names[level-1]}关通过！
            </div>
            <div style={{fontSize:'12px',color:'rgba(148,163,184,.6)',marginBottom:'14px'}}>
              {LEVELS[level-1].label}
            </div>
            <div style={{fontSize:'30px',fontWeight:800,color:'#00f5ff',fontFamily:'monospace',marginBottom:'18px'}}>
              {fmt(time)}
            </div>
            <div style={{display:'flex',justifyContent:'center',gap:'8px',marginBottom:'22px'}}>
              {[0,1,2].map(i=>(
                <span key={i} style={{color:'#f59e0b',fontSize:'26px',
                  animation:`starPop .5s ${i*.15}s cubic-bezier(.34,1.56,.64,1) both`}}>★</span>
              ))}
            </div>
            <button onClick={onNext} style={{
              background:'linear-gradient(135deg,#0891b2,#7c3aed)',border:'none',
              borderRadius:'12px',padding:'12px 28px',color:'#fff',fontWeight:800,fontSize:'15px',
              cursor:'pointer',display:'flex',alignItems:'center',gap:'7px',margin:'0 auto',
              boxShadow:'0 0 24px rgba(0,245,255,.3)',
            }}>
              {isLast ? '领取证书 🎓' : <><ChevronRight size={17}/>进入第{names[level]}关</>}
            </button>
          </div>
        </div>
      );
    };

    // ─── Name Input Modal ──────────────────────────────────────────────────────────
    const NameInput = ({onConfirm}) => {
      const [name,setName] = useState('');
      return (
        <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',
          background:'rgba(0,0,0,.75)',backdropFilter:'blur(10px)'}}>
          <div style={{
            background:'linear-gradient(160deg,#0f172a,#1e1b4b)',
            border:'1px solid rgba(0,245,255,.3)',borderRadius:'20px',
            padding:'36px 28px',width:'100%',maxWidth:'320px',textAlign:'center',
            animation:'fadeZoom .4s cubic-bezier(.34,1.56,.64,1)',
          }}>
            <div style={{fontSize:'44px',marginBottom:'10px'}}>🎓</div>
            <h2 style={{fontSize:'19px',fontWeight:900,color:'#e2e8f0',marginBottom:'6px'}}>
              全部关卡通关！
            </h2>
            <p style={{fontSize:'13px',color:'rgba(148,163,184,.65)',marginBottom:'22px',lineHeight:1.65}}>
              请输入您的姓名，<br/>为您生成专属通关证书
            </p>
            <input
              autoFocus value={name}
              onChange={e=>setName(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&name.trim()&&onConfirm(name.trim())}
              placeholder="请输入姓名…" maxLength={10}
              style={{
                width:'100%',background:'rgba(255,255,255,.07)',
                border:'1px solid rgba(0,245,255,.35)',borderRadius:'10px',
                padding:'11px 14px',color:'#e2e8f0',fontSize:'17px',outline:'none',
                marginBottom:'14px',textAlign:'center',fontWeight:700,letterSpacing:'3px',
                boxSizing:'border-box',
              }}
            />
            <button onClick={()=>name.trim()&&onConfirm(name.trim())} disabled={!name.trim()} style={{
              width:'100%',
              background: name.trim() ? 'linear-gradient(135deg,#0891b2,#7c3aed)' : 'rgba(255,255,255,.06)',
              border:'none',borderRadius:'12px',padding:'12px',
              color: name.trim() ? '#fff' : 'rgba(148,163,184,.3)',
              fontWeight:800,fontSize:'15px',cursor:name.trim()?'pointer':'not-allowed',transition:'all .2s',
            }}>生成证书 ✨</button>
          </div>
        </div>
      );
    };

    // ─── Certificate ───────────────────────────────────────────────────────────────
    const Certificate = ({name,totalTime,skillsUsed,completedAt,onRestart}) => (
      <div style={{
        minHeight:'100vh',
        background:'linear-gradient(135deg,#0a0e1a 0%,#0d1530 60%,#0a0e1a 100%)',
        display:'flex',alignItems:'center',justifyContent:'center',
        padding:'20px', fontFamily:"'Segoe UI',system-ui,sans-serif",
      }}>
        <style>{`
          @keyframes shimmerCert {
            0%{background-position:0% 50%} 100%{background-position:200% 50%}
          }
          @keyframes fadeZoomCert {
            from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)}
          }
        `}</style>
        <div style={{width:'100%',maxWidth:'400px',animation:'fadeZoomCert .6s cubic-bezier(.34,1.2,.64,1)'}}>
          <div style={{
            background:'linear-gradient(160deg,#0f172a 0%,#1e1b4b 55%,#0f172a 100%)',
            border:'1px solid rgba(0,245,255,.22)',borderRadius:'22px',
            overflow:'hidden',
            boxShadow:'0 0 60px rgba(0,245,255,.12),0 0 120px rgba(124,58,237,.08)',
            position:'relative',
          }}>
            {/* Top bar */}
            <div style={{height:'5px',background:'linear-gradient(90deg,#7c3aed,#00f5ff,#10b981,#f59e0b,#7c3aed)',backgroundSize:'300%',animation:'shimmerCert 4s linear infinite'}}/>

            {/* Corner ornaments */}
            {[[8,8],[8,'auto'],[`auto`,8],[`auto`,'auto']].map(([t,l],i)=>(
              <div key={i} style={{
                position:'absolute',
                top: i<2 ? 10 : 'auto', bottom: i>=2 ? 10 : 'auto',
                left: i%2===0 ? 10 : 'auto', right: i%2===1 ? 10 : 'auto',
                width:18,height:18,
                border:`1.5px solid rgba(0,245,255,${i%2===0?.45:.25})`,
                borderRadius:'3px',opacity:.7,
              }}/>
            ))}

            <div style={{padding:'32px 28px 26px'}}>
              {/* Badge */}
              <div style={{textAlign:'center',marginBottom:'22px'}}>
                <div style={{
                  display:'inline-flex',alignItems:'center',justifyContent:'center',
                  width:'72px',height:'72px',borderRadius:'50%',
                  background:'rgba(0,245,255,.07)',
                  border:'2px solid rgba(0,245,255,.35)',
                  fontSize:'36px',marginBottom:'14px',
                  boxShadow:'0 0 24px rgba(0,245,255,.2)',
                }}>⚛️</div>
                <div style={{fontSize:'10px',letterSpacing:'5px',color:'rgba(0,245,255,.65)',fontWeight:700,marginBottom:'5px'}}>
                  CHEMISTRY · MASTER
                </div>
                <div style={{fontSize:'20px',fontWeight:900,color:'#e2e8f0',letterSpacing:'3px',marginBottom:'10px'}}>
                  通 关 证 书
                </div>
                <div style={{width:'50px',height:'2px',background:'linear-gradient(90deg,transparent,#00f5ff,transparent)',margin:'0 auto'}}/>
              </div>

              {/* Recipient */}
              <div style={{textAlign:'center',marginBottom:'20px',padding:'14px',background:'rgba(0,245,255,.05)',borderRadius:'12px',border:'1px solid rgba(0,245,255,.13)'}}>
                <div style={{fontSize:'11px',color:'rgba(148,163,184,.5)',marginBottom:'5px',letterSpacing:'1px'}}>此证书颁发给</div>
                <div style={{fontSize:'26px',fontWeight:900,color:'#00f5ff',letterSpacing:'4px',textShadow:'0 0 20px rgba(0,245,255,.45)'}}>
                  {name}
                </div>
              </div>

              {/* Achievement */}
              <div style={{textAlign:'center',color:'rgba(203,213,225,.75)',fontSize:'12.5px',lineHeight:1.75,marginBottom:'20px'}}>
                已成功挑战全部 <span style={{color:'#10b981',fontWeight:700}}>三个关卡</span>，<br/>
                完成化学元素连连看全程考验，<br/>展现出色的化学元素掌握能力。
              </div>

              {/* Stats */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'18px'}}>
                {[
                  {icon:'⏱',label:'总完成时间',value:fmt(totalTime),color:'#00f5ff'},
                  {icon:'✨',label:'技能使用',value:`${skillsUsed} 次`,color:'#f59e0b'},
                  {icon:'🎯',label:'完成关卡',value:'全部 3 关',color:'#10b981'},
                  {icon:'⚗',label:'消除元素',value:'46 对',color:'#a78bfa'},
                ].map(s=>(
                  <div key={s.label} style={{background:'rgba(255,255,255,.04)',borderRadius:'10px',padding:'11px 8px',border:'1px solid rgba(255,255,255,.06)',textAlign:'center'}}>
                    <div style={{fontSize:'18px',marginBottom:'3px'}}>{s.icon}</div>
                    <div style={{fontSize:'15px',fontWeight:800,color:s.color,marginBottom:'2px'}}>{s.value}</div>
                    <div style={{fontSize:'10px',color:'rgba(148,163,184,.45)'}}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Level breakdown */}
              <div style={{marginBottom:'18px'}}>
                <div style={{fontSize:'10px',color:'rgba(148,163,184,.4)',marginBottom:'7px',letterSpacing:'2px',textAlign:'center'}}>— 关卡详情 —</div>
                {LEVELS.map((lv,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 11px',marginBottom:'4px',background:'rgba(255,255,255,.03)',borderRadius:'8px',border:'1px solid rgba(255,255,255,.05)'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                      <span style={{fontSize:'14px'}}>{lv.emoji}</span>
                      <span style={{fontSize:'11.5px',color:'rgba(203,213,225,.65)'}}>第{['一','二','三'][i]}关 · {lv.label}</span>
                    </div>
                    <div style={{display:'flex',gap:'3px'}}>
                      {[0,1,2].map(s=><span key={s} style={{color:'#f59e0b',fontSize:'12px'}}>★</span>)}
                    </div>
                  </div>
                ))}
              </div>

              {/* Date */}
              <div style={{textAlign:'center',marginBottom:'18px',padding:'10px',background:'rgba(255,255,255,.025)',borderRadius:'8px',border:'1px solid rgba(255,255,255,.05)'}}>
                <div style={{fontSize:'10px',color:'rgba(148,163,184,.4)',marginBottom:'3px'}}>颁发时间</div>
                <div style={{fontSize:'13px',color:'rgba(148,163,184,.7)',fontFamily:'monospace',letterSpacing:'0.5px'}}>{completedAt}</div>
              </div>

              <div style={{height:'1px',background:'linear-gradient(90deg,transparent,rgba(0,245,255,.25),transparent)',marginBottom:'18px'}}/>

              <button onClick={onRestart} style={{
                width:'100%',background:'linear-gradient(135deg,#0891b2,#7c3aed)',border:'none',
                borderRadius:'12px',padding:'13px',color:'#fff',fontWeight:800,fontSize:'14px',
                cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px',
                boxShadow:'0 0 20px rgba(0,245,255,.22)',
              }}>
                <RotateCcw size={16}/> 再次挑战
              </button>
            </div>

            {/* Bottom bar */}
            <div style={{height:'4px',background:'linear-gradient(90deg,#10b981,#7c3aed,#00f5ff,#f59e0b,#10b981)',backgroundSize:'300%',animation:'shimmerCert 4s linear infinite reverse'}}/>
          </div>
        </div>
      </div>
    );

    // ─── Main App ──────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState('playing');
      const [levelIdx, setLevelIdx] = useState(0);

      const [board, setBoard] = useState(null);
      const [selected, setSelected] = useState(null);
      const [path, setPath] = useState([]);
      const [matches, setMatches] = useState(0);
      const [isAnimating, setIsAnimating] = useState(false);
      const [disappearing, setDisappearing] = useState([]);

      const [timeElapsed, setTimeElapsed] = useState(0);

      const [hintCount, setHintCount] = useState(0);
      const [shuffleCount, setShuffleCount] = useState(0);
      const [swapCount, setSwapCount] = useState(0);
      const [swapMode, setSwapMode] = useState(false);
      const [swapFirst, setSwapFirst] = useState(null);
      const [hintTiles, setHintTiles] = useState([]);

      const [notice, setNotice] = useState('');
      const [particles, setParticles] = useState([]);
      const pid = useRef(0);

      const [totalTime, setTotalTime] = useState(0);
      const [totalSkills, setTotalSkills] = useState(0);
      const skillsThisLevel = useRef(0);

      const [playerName, setPlayerName] = useState('');
      const [completedAt, setCompletedAt] = useState('');

      const cfg = LEVELS[levelIdx];
      const bs = cfg.boardSize;
      const N  = bs + 2;

      const notify = useCallback((msg) => {
        setNotice(msg);
        setTimeout(()=>setNotice(''), 2200);
      }, []);

      const spawnParticles = useCallback((pos1, pos2) => {
        const step = 100/bs;
        const colors = ['#00f5ff','#7c3aed','#10b981','#f59e0b','#ec4899'];
        const np = [];
        [pos1,pos2].forEach(({r,c})=>{
          const x=(c-1)*step+step/2, y=(r-1)*step+step/2;
          for (let i=0; i<8; i++) {
            const angle=(Math.PI*2*i)/8;
            np.push({
              id:pid.current++, x, y,
              dx:Math.cos(angle)*(15+Math.random()*25),
              dy:Math.sin(angle)*(15+Math.random()*25),
              size:4+Math.random()*4,
              color:colors[Math.floor(Math.random()*colors.length)],
              dur:500+Math.random()*300, delay:Math.random()*100,
            });
          }
        });
        setParticles(prev=>[...prev,...np]);
        setTimeout(()=>{ const ids=np.map(p=>p.id); setParticles(prev=>prev.filter(p=>!ids.includes(p.id))); },1000);
      },[bs]);

      const initLevel = useCallback((idx, carryTime=0) => {
        const c = LEVELS[idx];
        setBoard(buildBoard(c, idx));
        setSelected(null); setPath([]); setMatches(0);
        setTimeElapsed(carryTime);
        setHintCount(c.hint); setShuffleCount(c.shuffle); setSwapCount(c.swap);
        setSwapMode(false); setSwapFirst(null); setHintTiles([]);
        setNotice(''); setParticles([]); setDisappearing([]);
        skillsThisLevel.current = 0;
      }, []);

      const resetAll = useCallback(()=>{
        setLevelIdx(0); setTotalTime(0); setTotalSkills(0); setPhase('playing');
        initLevel(0,0);
      },[initLevel]);

      useEffect(()=>{ resetAll(); },[]);

      useEffect(()=>{
        if (phase!=='playing') return;
        const t = setInterval(()=>setTimeElapsed(p=>p+1),1000);
        return ()=>clearInterval(t);
      },[phase]);

      const handleShuffle = useCallback((isAuto=false)=>{
        if (!board) return;
        if (!isAuto && shuffleCount<=0) return;
        setBoard(doShuffle(board,bs,N,levelIdx));
        setSelected(null); setHintTiles([]); setSwapMode(false); setSwapFirst(null);
        if (isAuto) notify('💥 死锁！已自动洗牌');
        else { setShuffleCount(p=>p-1); skillsThisLevel.current++; }
      },[board,bs,N,levelIdx,shuffleCount,notify]);

      const handleHint = ()=>{
        if (hintCount<=0||isAnimating||!board) return;
        const pair = findHintPair(board,bs,N,levelIdx);
        if (pair) { setHintTiles(pair); setHintCount(p=>p-1); skillsThisLevel.current++; setTimeout(()=>setHintTiles([]),3000); }
        else notify('⚠️ 暂无可消除的对');
      };

      const handleSwapToggle = ()=>{
        if (swapCount<=0) return;
        const entering = !swapMode;
        setSwapMode(entering);
        if (!entering) setSwapFirst(null);
        else notify('🔀 点选两张牌互换位置');
      };

      const handleLevelComplete = useCallback(()=>{
        setTotalSkills(prev=>prev+skillsThisLevel.current);
        setTotalTime(timeElapsed);
        setPhase('levelComplete');
      },[timeElapsed]);

      const handleNext = ()=>{
        if (levelIdx<2) {
          const next = levelIdx+1;
          setLevelIdx(next); setPhase('playing'); initLevel(next,timeElapsed);
        } else {
          setCompletedAt(fmtDT(new Date())); setPhase('nameInput');
        }
      };

      const handleTileClick = (r,c)=>{
        if (isAnimating||!board[r][c]) return;

        if (swapMode) {
          if (!swapFirst) { setSwapFirst({r,c}); return; }
          if (swapFirst.r===r&&swapFirst.c===c) { setSwapFirst(null); return; }
          const nb = board.map(row=>[...row]);
          const tmp=nb[swapFirst.r][swapFirst.c]; nb[swapFirst.r][swapFirst.c]=nb[r][c]; nb[r][c]=tmp;
          setBoard(nb); setSwapCount(p=>p-1); skillsThisLevel.current++;
          setSwapMode(false); setSwapFirst(null); notify('✅ 换位成功！');
          return;
        }

        if (!selected) { setSelected({r,c}); return; }
        if (selected.r===r&&selected.c===c) { setSelected(null); return; }

        const t1=board[selected.r][selected.c], t2=board[r][c];

        if (t1.id===t2.id&&t1.type!==t2.type) {
          const vp = findPath(selected,{r,c},board,N);
          if (vp) {
            setPath(vp); setIsAnimating(true); setHintTiles([]);
            const s={...selected}, e={r,c};
            setTimeout(()=>{
              spawnParticles({r:s.r,c:s.c},{r:e.r,c:e.c});
              setDisappearing([`${s.r}-${s.c}`,`${e.r}-${e.c}`]);
              setTimeout(()=>{
                const nb=board.map(row=>[...row]);
                nb[s.r][s.c]=null; nb[e.r][e.c]=null;
                setBoard(nb); setPath([]); setSelected(null); setDisappearing([]);
                setMatches(prev=>{
                  const nm=prev+1;
                  if (nm===cfg.pairs) { setTimeout(()=>handleLevelComplete(),300); }
                  else if (!hasMoves(nb,bs,N,levelIdx)) { setTimeout(()=>handleShuffle(true),400); }
                  return nm;
                });
                setIsAnimating(false);
              },250);
            },500);
            return;
          }
        }
        setSelected({r,c});
      };

      const step = 100/bs;
      const svgPt = p => ({x:(p.c-1)*step+step/2, y:(p.r-1)*step+step/2});
      const progress = matches/cfg.pairs;

      if (phase==='certificate')
        return <Certificate name={playerName} totalTime={totalTime} skillsUsed={totalSkills} completedAt={completedAt} onRestart={resetAll}/>;

      return (
        <div style={{background:'linear-gradient(135deg,#0a0e1a 0%,#0d1530 50%,#0a0e1a 100%)',minHeight:'100vh',fontFamily:"'Segoe UI',system-ui,sans-serif",color:'#e2e8f0'}}
          className="flex flex-col items-center py-3 px-2">

          <style>{`
            @keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
            @keyframes tileDisappear{0%{transform:scale(1);opacity:1;filter:brightness(1)}50%{transform:scale(1.3);opacity:.8;filter:brightness(2.5)}100%{transform:scale(0);opacity:0}}
            @keyframes glowPulse{0%,100%{box-shadow:0 0 8px #00f5ff55,0 0 20px #00f5ff22}50%{box-shadow:0 0 16px #00f5ffaa,0 0 40px #00f5ff44}}
            @keyframes swapPulse{0%,100%{box-shadow:0 0 8px #a855f755,0 0 18px #a855f720}50%{box-shadow:0 0 16px #a855f7cc,0 0 36px #a855f744}}
            @keyframes hintPulse{0%,100%{box-shadow:0 0 0 2px #fbbf24aa}50%{box-shadow:0 0 0 5px #fbbf24ff,0 0 18px #fbbf2466}}
            @keyframes fadeZoom{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
            @keyframes starPop{from{opacity:0;transform:scale(0) rotate(-30deg)}to{opacity:1;transform:scale(1) rotate(0)}}
            @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
            .td{animation:tileDisappear .25s ease-in forwards}
            .ts{animation:glowPulse 1s ease-in-out infinite}
            .th{animation:hintPulse .8s ease-in-out infinite}
            .tw{animation:swapPulse .8s ease-in-out infinite}
          `}</style>

          {/* Header */}
          <header className="w-full max-w-2xl mb-3">
            <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(0,245,255,.14)',backdropFilter:'blur(10px)',borderRadius:'14px',padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}}>
              {/* Level tabs */}
              <div style={{display:'flex',gap:'5px'}}>
                {LEVELS.map((lv,i)=>(
                  <div key={i} style={{
                    padding:'5px 9px',borderRadius:'8px',display:'flex',alignItems:'center',gap:'4px',
                    background: i===levelIdx ? 'rgba(0,245,255,.12)' : i<levelIdx ? 'rgba(16,185,129,.1)' : 'rgba(255,255,255,.04)',
                    border:`1px solid ${i===levelIdx?'rgba(0,245,255,.4)':i<levelIdx?'rgba(16,185,129,.3)':'rgba(255,255,255,.06)'}`,
                  }}>
                    <span style={{fontSize:'12px'}}>{i<levelIdx?'✅':i===levelIdx?lv.emoji:'○'}</span>
                    <span style={{fontSize:'11px',fontWeight:700,color:i===levelIdx?'#00f5ff':i<levelIdx?'#10b981':'rgba(148,163,184,.35)'}}>
                      第{['一','二','三'][i]}关
                    </span>
                  </div>
                ))}
              </div>
              {/* Stats */}
              <div style={{display:'flex',gap:'14px',alignItems:'center'}}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:'10px',color:'rgba(148,163,184,.5)',display:'flex',alignItems:'center',gap:'3px',marginBottom:'2px',justifyContent:'center'}}><Trophy size={9}/>进度</div>
                  <div style={{fontSize:'15px',fontWeight:800,color:'#10b981',fontVariantNumeric:'tabular-nums'}}>{matches}<span style={{color:'rgba(148,163,184,.35)',fontSize:'10px'}}>/{cfg.pairs}</span></div>
                </div>
                <div style={{width:'1px',height:'26px',background:'rgba(148,163,184,.1)'}}/>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:'10px',color:'rgba(148,163,184,.5)',display:'flex',alignItems:'center',gap:'3px',marginBottom:'2px',justifyContent:'center'}}><Clock size={9}/>耗时</div>
                  <div style={{fontSize:'15px',fontWeight:800,color:'#00f5ff',fontFamily:'monospace'}}>{fmt(timeElapsed)}</div>
                </div>
              </div>
            </div>
            {/* Progress */}
            <div style={{height:'3px',background:'rgba(255,255,255,.05)',borderRadius:'99px',marginTop:'5px',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${progress*100}%`,background:'linear-gradient(90deg,#00f5ff,#7c3aed)',borderRadius:'99px',transition:'width .5s cubic-bezier(.4,0,.2,1)',boxShadow:'0 0 8px #00f5ff88'}}/>
            </div>
          </header>

          {/* Board */}
          <main className="w-full max-w-2xl relative select-none">
            <div style={{
              background:'rgba(255,255,255,.025)',
              border:`1px solid ${swapMode?'rgba(168,85,247,.45)':'rgba(0,245,255,.1)'}`,
              borderRadius:'14px',padding:'5px',position:'relative',overflow:'hidden',
              aspectRatio:'1',transition:'border-color .3s',
              backgroundImage:'linear-gradient(rgba(0,245,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.025) 1px,transparent 1px)',
              backgroundSize:`${step}% ${step}%`,
            }}>
              <Particles particles={particles}/>

              {/* Grid */}
              {board && (
                <div style={{display:'grid',width:'100%',height:'100%',position:'relative',zIndex:10,
                  gridTemplateColumns:`0 repeat(${bs},1fr) 0`,
                  gridTemplateRows:`0 repeat(${bs},1fr) 0`,
                }}>
                  {board.map((row,r)=>row.map((cell,c)=>{
                    if (r===0||r===N-1||c===0||c===N-1)
                      return <div key={`${r}-${c}`} style={{width:0,height:0,overflow:'hidden'}}/>;

                    const isSel   = selected?.r===r&&selected?.c===c;
                    const isHint  = hintTiles.some(p=>p.r===r&&p.c===c);
                    const isDis   = disappearing.includes(`${r}-${c}`);
                    const isSwSel = swapFirst?.r===r&&swapFirst?.c===c;
                    const hollow  = isHollow(levelIdx, r, c);
                    const cat     = cell ? (CAT_COLORS[cell.category]??'#64748b') : '#64748b';

                    const symFS  = bs===4?'clamp(22px,5.5vw,48px)':bs===6?'clamp(16px,3.8vw,36px)':'clamp(17px,3.6vw,34px)';
                    const nameFS = bs===4?'clamp(19px,4.5vw,40px)':bs===6?'clamp(14px,3.2vw,30px)':'clamp(15px,3.0vw,28px)';
                    const numFS  = bs===4?'clamp(11px,1.5vw,15px)':bs===6?'clamp(9px,1.2vw,13px)':'clamp(10px,1.3vw,14px)';
                    const dotSz  = bs===4?8:bs===6?7:8;

                    if (hollow) return (
                      <div key={`${r}-${c}`} style={{padding:'3px'}}>
                        <div style={{
                          width:'100%',height:'100%',borderRadius:'8px',
                          background:'rgba(0,245,255,.04)',
                          border:'1px dashed rgba(0,245,255,.18)',
                          display:'flex',alignItems:'center',justifyContent:'center',
                          position:'relative',overflow:'hidden',
                        }}>
                          <div style={{width:'30%',height:'30%',borderRadius:'50%',background:'rgba(0,245,255,.12)',boxShadow:'0 0 12px 4px rgba(0,245,255,.12)'}}/>
                        </div>
                      </div>
                    );

                    return (
                      <div key={`${r}-${c}`} style={{padding:'3px'}}>
                        {cell ? (
                          <button
                            onClick={()=>handleTileClick(r,c)}
                            className={`relative w-full h-full rounded-lg flex items-center justify-center transition-transform duration-150 ${isDis?'td':''} ${isSwSel&&!isDis?'tw':''} ${isSel&&!isDis&&!swapMode?'ts':''} ${isHint&&!isSel&&!isDis?'th':''} ${!isSel&&!isHint&&!isDis&&!isSwSel?'hover:scale-105':''}`}
                            style={{
                              background:cell.type==='name'
                                ?'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,41,59,.93))'
                                :'linear-gradient(135deg,rgba(15,23,42,.97),rgba(30,27,75,.93))',
                              border:isSwSel?'2px solid #a855f7':isSel?'1.5px solid #00f5ff':isHint?'1.5px solid #fbbf24':swapMode?'1px solid rgba(168,85,247,.2)':'1px solid rgba(255,255,255,.07)',
                              cursor:'pointer',
                            }}>
                            <div style={{position:'absolute',top:'4px',right:'4px',width:dotSz+'px',height:dotSz+'px',borderRadius:'50%',background:cat,opacity:.9,boxShadow:`0 0 ${dotSz}px ${cat}88`}}/>
                            <div style={{position:'absolute',top:'3px',left:'4px',fontSize:numFS,color:'rgba(148,163,184,.48)',fontFamily:'monospace',fontWeight:700,lineHeight:1}}>
                              {cell.id}
                            </div>
                            <span style={{fontWeight:800,lineHeight:1,fontSize:cell.type==='symbol'?symFS:nameFS,color:cell.type==='symbol'?'#00f5ff':'#e2e8f0',fontFamily:cell.type==='symbol'?'monospace':'inherit',textShadow:cell.type==='symbol'?'0 0 10px #00f5ff88':'none'}}>
                              {cell.value}
                            </span>
                          </button>
                        ):(
                          <div style={{width:'100%',height:'100%'}}/>
                        )}
                      </div>
                    );
                  }))}
                </div>
              )}

              {/* SVG lines */}
              <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:20}}>
                <defs>
                  <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                {path.length>1&&(()=>{
                  const pts=path.map(p=>{const {x,y}=svgPt(p);return `${x}% ${y}%`;}).join(' ');
                  return <>
                    <polyline points={pts} fill="none" stroke="rgba(0,245,255,.22)" strokeWidth="10" strokeLinecap="round" strokeLinejoin="round"/>
                    <polyline points={pts} fill="none" stroke="#00f5ff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" filter="url(#gl)"/>
                    {path.map((p,i)=>{const {x,y}=svgPt(p);return <circle key={i} cx={`${x}%`} cy={`${y}%`} r="4.5" fill="#00f5ff" filter="url(#gl)"/>;})}
                  </>;
                })()}
              </svg>

              {/* Notice */}
              {notice&&<div style={{position:'absolute',top:'10px',left:'50%',zIndex:60,background:'rgba(0,0,0,.88)',border:'1px solid rgba(0,245,255,.3)',borderRadius:'99px',padding:'5px 16px',fontSize:'12px',fontWeight:700,color:'#00f5ff',whiteSpace:'nowrap',backdropFilter:'blur(8px)',animation:'slideDown .3s ease-out',transform:'translateX(-50%)'}}>{notice}</div>}

              {/* Level complete */}
              {phase==='levelComplete'&&<LevelComplete level={cfg.level} time={timeElapsed} onNext={handleNext}/>}
            </div>

            {/* Swap mode bar */}
            {swapMode&&(
              <div style={{marginTop:'7px',padding:'7px 12px',background:'rgba(168,85,247,.1)',border:'1px solid rgba(168,85,247,.3)',borderRadius:'10px',fontSize:'12px',color:'#c084fc',fontWeight:600,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
                <span>🔀 {swapFirst?'再点第二张牌完成换位':'请点选第一张牌'}</span>
                <button onClick={()=>{setSwapMode(false);setSwapFirst(null);}} style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'6px',padding:'2px 8px',color:'#c084fc',cursor:'pointer',fontSize:'11px',fontWeight:700}}>取消</button>
              </div>
            )}
          </main>

          {/* Controls */}
          <footer className="w-full max-w-2xl mt-3">
            <div style={{display:'flex',justifyContent:'center',flexWrap:'wrap',gap:'7px'}}>
              <SkillBtn icon={<Lightbulb size={14}/>} label="提示" count={hintCount} color="#fbbf24" disabled={isAnimating||hintCount<=0||phase!=='playing'} onClick={handleHint}/>
              <SkillBtn icon={<Shuffle size={14}/>} label="洗牌" count={shuffleCount} color="#00f5ff" disabled={isAnimating||shuffleCount<=0||phase!=='playing'} onClick={()=>handleShuffle(false)}/>
              {cfg.level===3&&<SkillBtn icon={<ArrowLeftRight size={14}/>} label="换位" count={swapCount} color="#a855f7" active={swapMode} disabled={swapCount<=0||phase!=='playing'} onClick={handleSwapToggle}/>}
              <SkillBtn icon={<RotateCcw size={14}/>} label="重新开始" count={null} color="#f87171" disabled={false} onClick={resetAll}/>
            </div>
          </footer>

          {phase==='nameInput'&&<NameInput onConfirm={n=>{setPlayerName(n);setPhase('certificate');}}/>}
        </div>
      );
    }

    // ─── Render Application ────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
